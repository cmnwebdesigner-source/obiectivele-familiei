<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Obiectivele Familiei</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}body{margin:0;font-family:Inter,Arial,sans-serif;background:#f8fafc;color:#0f172a;min-height:100vh}.app{max-width:430px;margin:0 auto;min-height:100vh;background:#f8fafc;box-shadow:0 0 30px rgba(15,23,42,.12);position:relative;padding-bottom:82px}.page{padding:18px 16px 96px}.fade{animation:fade .18s ease}@keyframes fade{from{opacity:.25;transform:translateY(6px)}to{opacity:1;transform:none}}.row{display:flex;align-items:center}.between{display:flex;align-items:center;justify-content:space-between}.muted{color:#64748b}.tiny{font-size:12px}.btn{border:0;border-radius:16px;padding:12px 14px;font-weight:800;background:#4f46e5;color:#fff;cursor:pointer}.btn:disabled{opacity:.6}.btn2{border:0;border-radius:14px;padding:10px 12px;font-weight:800;background:#eef2ff;color:#4f46e5}.btnRed{background:#ef4444;color:#fff}.btnGreen{background:#22c55e;color:#fff}.btnSoft{background:#f1f5f9;color:#0f172a}.iconBtn{width:42px;height:42px;border:0;border-radius:16px;background:#fff;color:#334155;box-shadow:0 4px 18px rgba(15,23,42,.06);font-size:16px}.card{background:#fff;border:1px solid #e2e8f0;border-radius:24px;padding:16px;box-shadow:0 10px 26px rgba(15,23,42,.05)}.sectionTitle{font-size:18px;font-weight:900;margin:20px 2px 10px}.sectionLine{height:4px;width:54px;border-radius:99px;background:#4f46e5;margin-top:6px}.sectionLine.red{background:#ef4444}.goal{background:#fff;border:1px solid #e2e8f0;border-radius:20px;padding:14px;margin-bottom:10px;position:relative}.goal.done{background:#f0fdf4;border-color:#bbf7d0}.complete{position:absolute;top:8px;right:8px;background:#22c55e;color:white;border-radius:999px;font-size:9px;font-weight:900;padding:3px 6px;letter-spacing:.3px}.bar{height:8px;background:#e2e8f0;border-radius:999px;overflow:hidden;margin:10px 0}.fill{height:100%;background:#4f46e5;border-radius:999px}.fill.red{background:#ef4444}.fill.green{background:#22c55e}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.input{width:100%;border:1px solid #e2e8f0;background:#f8fafc;border-radius:16px;padding:13px 14px;font-size:15px;outline:none}.input:focus{border-color:#4f46e5;background:#fff}.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:70px;background:#fff;border-top:1px solid #e2e8f0;display:flex;justify-content:space-around;align-items:center;border-radius:22px 22px 0 0;box-shadow:0 -8px 24px rgba(15,23,42,.08);z-index:50}.nav button{border:0;background:transparent;color:#94a3b8;font-weight:800;font-size:11px;display:flex;flex-direction:column;gap:4px;align-items:center}.nav button.active{color:#4f46e5}.nav i{font-size:19px}.avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;background:linear-gradient(135deg,#6366f1,#a855f7);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;border:3px solid #fff;box-shadow:0 6px 16px rgba(15,23,42,.12)}.avatar.big{width:92px;height:92px;font-size:30px}.modalWrap{position:fixed;inset:0;background:rgba(15,23,42,.55);display:flex;align-items:flex-end;justify-content:center;z-index:99}.modal{width:100%;max-width:430px;background:#fff;border-radius:28px 28px 0 0;padding:20px;box-shadow:0 -10px 40px rgba(0,0,0,.18)}.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);max-width:390px;width:calc(100% - 32px);background:#0f172a;color:white;padding:13px 16px;border-radius:18px;z-index:200;font-weight:800;box-shadow:0 14px 30px rgba(15,23,42,.25)}.dateStrip{display:flex;gap:8px;overflow:hidden;touch-action:pan-y;margin-top:12px}.day{min-width:54px;text-align:center;border:1px solid #e2e8f0;background:#fff;border-radius:16px;padding:9px 4px;font-weight:900;transition:.15s}.day.active{background:#4f46e5;color:#fff;border-color:#4f46e5;transform:translateY(-2px)}.trans{padding:11px 0;border-bottom:1px solid #e2e8f0}.calcDisplay{background:#0f172a;color:#fff;border-radius:24px;padding:18px;text-align:right;min-height:88px;display:flex;flex-direction:column;justify-content:center;word-break:break-word}.calcKeys{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px}.calcKeys button{height:56px;border:0;border-radius:18px;background:#fff;border:1px solid #e2e8f0;font-size:20px;font-weight:900}.calcKeys button.op{background:#eef2ff;color:#4f46e5}.calcKeys button.eq{background:#4f46e5;color:#fff}.gameArea{height:380px;background:linear-gradient(180deg,#eef2ff,#fff);border:1px solid #e2e8f0;border-radius:26px;position:relative;overflow:hidden;margin-top:14px}.moneyItem{position:absolute;border:0;border-radius:999px;min-width:52px;height:52px;font-size:20px;font-weight:900;box-shadow:0 8px 18px rgba(15,23,42,.15);background:#fff}.money{background:#dcfce7}.bad{background:#fee2e2}.boost{background:#fef3c7}.confetti{position:fixed;top:-20px;width:8px;height:12px;z-index:300;animation:fall 1.7s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}.dark body{}body.dark{background:#0f172a;color:#f8fafc}.dark .app{background:#0f172a}.dark .card,.dark .goal,.dark .modal,.dark .iconBtn,.dark .day,.dark .calcKeys button{background:#1e293b;border-color:#334155;color:#f8fafc}.dark .input{background:#0f172a;border-color:#334155;color:#fff}.dark .nav{background:#1e293b;border-color:#334155}.dark .btnSoft{background:#334155;color:#fff}.dark .muted{color:#94a3b8}.dark .calcDisplay{background:#020617}@media(max-width:370px){.page{padding-left:12px;padding-right:12px}.btn{padding:10px}.goal{padding:12px}}
  </style>
</head>
<body>
<div id="app" class="app"><div class="page"><div class="card">Se încarcă...</div></div></div>
<div id="modalRoot"></div>
<script>
const SUPABASE_URL = 'https://hfqsouqtqvyxegcrabnc.supabase.co';
const SUPABASE_KEY = 'sb_publishable_eqlbyUXpwcp-i-dPhFPsmA_wHqDW1AD';
let sb = null;
try { sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:true } }); }
catch(e){ document.getElementById('app').innerHTML = '<div class="page"><div class="card">Supabase nu s-a încărcat. Verifică internetul.</div></div>'; }
const app=document.getElementById('app'), modalRoot=document.getElementById('modalRoot');
let currentUser=null, currentProfile=null, profiles=[], goals=[], transactions=[], calcHistory=[], rooms=[], wallets=[];
let page='home', selectedDate=new Date(), activeGoalId=null, activeRoomId=null, realtime=null, renderLock=false;
let gameRuntime={roomId:null,timer:null,score:0,mult:1,boostUntil:0};
const fmt=n=>Number(n||0).toLocaleString('ro-RO',{maximumFractionDigits:2});
const todayISO=()=>new Date().toISOString().split('T')[0];
const dateISO=d=>new Date(d).toISOString().split('T')[0];
const roleName=r=>r==='sotie'?'Soție':'Soț';
const myEmail=()=>currentUser?.email||'';
function toast(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2600)}
function stopGameRuntime(){ if(gameRuntime.timer) clearInterval(gameRuntime.timer); gameRuntime={roomId:null,timer:null,score:0,mult:1,boostUntil:0}; }
function setPage(p,id){ stopGameRuntime(); page=p; if(id) { activeGoalId=id; activeRoomId=id; } renderApp(); }
function pFor(email){return profiles.find(p=>p.email===email)||{};}
function myProfile(){return pFor(myEmail())||currentProfile||{};}
function partnerRole(){return (myProfile().role||'sot')==='sot'?'sotie':'sot';}
function partnerTitle(){return (myProfile().role||'sot')==='sot'?'Soției':'Soțului';}
function avatar(email,size=''){const p=pFor(email); if(p.avatar) return `<img class="avatar ${size}" src="${p.avatar}">`; return `<div class="avatar ${size}">${(email||'?').charAt(0).toUpperCase()}</div>`;}
function moneyColor(amount){return Number(amount)<0?'#ef4444':'#22c55e'}
function escapeHtml(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));}
async function ensureProfile(){ if(!currentUser) return; const role=currentUser.user_metadata?.role||'sot'; await sb.from('profiles').upsert({id:currentUser.id,email:currentUser.email,role},{onConflict:'id'}); }
async function fetchData(doRender=true){ if(!currentUser) return; const [pr,go,tr,ch,rm,wa]=await Promise.all([
  sb.from('profiles').select('*'),
  sb.from('goals').select('*').order('created_at',{ascending:false}),
  sb.from('transactions').select('*').order('timestamp',{ascending:false}),
  sb.from('calculator_history').select('*').order('created_at',{ascending:false}).limit(40),
  sb.from('game_rooms').select('*').order('created_at',{ascending:false}).limit(30),
  sb.from('game_wallets').select('*')
]);
  if(pr.error) toast('Profiles: '+pr.error.message); else profiles=pr.data||[];
  if(go.error) toast('Goals: '+go.error.message); else goals=go.data||[];
  if(tr.error) toast('Transactions: '+tr.error.message); else transactions=tr.data||[];
  if(ch.error) console.warn(ch.error); else calcHistory=ch.data||[];
  if(rm.error) console.warn(rm.error); else rooms=rm.data||[];
  if(wa.error) console.warn(wa.error); else wallets=wa.data||[];
  currentProfile=pFor(myEmail());
  if(doRender && !renderLock) renderApp();
}
function setupRealtime(){ if(realtime) sb.removeChannel(realtime); realtime=sb.channel('app-live')
 .on('postgres_changes',{event:'*',schema:'public',table:'goals'},()=>fetchData(page!=='game-room'))
 .on('postgres_changes',{event:'*',schema:'public',table:'transactions'},()=>fetchData(page!=='game-room'))
 .on('postgres_changes',{event:'*',schema:'public',table:'profiles'},()=>fetchData(true))
 .on('postgres_changes',{event:'*',schema:'public',table:'calculator_history'},()=>fetchData(page==='calculator'))
 .on('postgres_changes',{event:'*',schema:'public',table:'game_rooms'},()=>fetchData(page!=='game-room'))
 .on('postgres_changes',{event:'*',schema:'public',table:'game_wallets'},()=>fetchData(page!=='game-room'))
 .subscribe();}
async function start(){ if(!sb) return; const {data}=await sb.auth.getSession(); currentUser=data.session?.user||null; if(currentUser){ await ensureProfile(); await fetchData(false); setupRealtime(); renderApp(); } else renderAuth(true); sb.auth.onAuthStateChange(async(_e,s)=>{ currentUser=s?.user||null; if(currentUser){ await ensureProfile(); await fetchData(false); setupRealtime(); renderApp(); } else renderAuth(true); });}
function renderAuth(login=true){ app.innerHTML=`<div class="page fade" style="min-height:100vh;display:flex;align-items:center"><div style="width:100%"><div style="text-align:center;margin-bottom:28px"><div style="width:78px;height:78px;margin:auto;border-radius:50%;background:#eef2ff;color:#4f46e5;display:flex;align-items:center;justify-content:center;font-size:32px"><i class="fas fa-heart"></i></div><h1>Obiectivele Familiei</h1><p class="muted">${login?'Conectare cont':'Creare cont nou'}</p></div><div class="card">
${login?'':`<p class="tiny muted" style="font-weight:800;margin-top:0">Alege profilul:</p><div class="grid2" style="margin-bottom:12px"><button id="roleSot" class="btn" onclick="window.signupRole='sot';markRole()">Soț</button><button id="roleSotie" class="btn2" onclick="window.signupRole='sotie';markRole()">Soție</button></div>`}
<input id="email" class="input" type="email" autocomplete="email" placeholder="Email"><div style="height:10px"></div><input id="pass" class="input" type="password" autocomplete="${login?'current-password':'new-password'}" placeholder="Parolă"><p class="tiny muted">Salvează parola pentru o conectare mai rapidă.</p><button id="authBtn" class="btn" style="width:100%" onclick="handleAuth(${login})">${login?'Conectare':'Creează cont'}</button></div><div style="text-align:center;margin-top:16px"><button class="btn2" onclick="renderAuth(${!login})">${login?'Nu ai cont? Creează unul':'Ai deja cont? Conectează-te'}</button></div></div></div>`; window.signupRole=window.signupRole||'sot'; markRole();}
function markRole(){const a=document.getElementById('roleSot'),b=document.getElementById('roleSotie'); if(!a||!b)return; if(window.signupRole==='sot'){a.className='btn';b.className='btn2'}else{a.className='btn2';b.className='btn btnRed'}}
async function handleAuth(login){const email=document.getElementById('email').value.trim(),password=document.getElementById('pass').value,btn=document.getElementById('authBtn'); if(!email||!password)return toast('Completează email și parolă'); btn.disabled=true; btn.textContent='Se încarcă...'; let res; if(login) res=await sb.auth.signInWithPassword({email,password}); else res=await sb.auth.signUp({email,password,options:{data:{role:window.signupRole||'sot'}}}); if(res.error){toast(res.error.message);btn.disabled=false;btn.textContent=login?'Conectare':'Creează cont';} }
function renderApp(){ if(!currentUser){renderAuth(true);return} document.body.classList.toggle('dark',localStorage.getItem('theme')==='dark'); if(page==='home') renderHome(); else if(page==='games') renderGames(); else if(page==='profile') renderProfile(); else if(page==='calculator') renderCalculator(); else if(page==='goal-stats') renderGoalStats(); else if(page==='game-room') renderGameRoom(); }
function layout(content,nav=true){ app.innerHTML=`<div class="page fade">${content}</div>${nav?navHtml():''}`; }
function topBar(title,sub='',back=null){return `<div class="between" style="margin-bottom:18px"><div class="row" style="gap:10px">${back?`<button class="iconBtn" onclick="setPage('${back}')"><i class="fas fa-arrow-left"></i></button>`:''}<div><h2 style="margin:0;font-size:24px">${title}</h2>${sub?`<div class="tiny muted">${sub}</div>`:''}</div></div><div class="row" style="gap:8px"><button class="iconBtn" onclick="setPage('calculator')"><i class="fas fa-calculator"></i></button><button class="iconBtn" onclick="setPage('profile')">${avatar(myEmail()).replace('avatar','avatar').replace('class="avatar"','class="avatar" style="width:32px;height:32px;border-width:0"')}</button></div></div>`}
function navHtml(){return `<div class="nav"><button class="${page==='home'?'active':''}" onclick="setPage('home')"><i class="fas fa-home"></i>Acasă</button><button class="${page==='games'?'active':''}" onclick="setPage('games')"><i class="fas fa-gamepad"></i>Jocuri</button><button onclick="openAddGoal()" style="margin-top:-30px"><span style="width:58px;height:58px;border-radius:50%;background:#4f46e5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 10px 24px rgba(79,70,229,.35)"><i class="fas fa-plus"></i></span></button><button class="${page==='profile'?'active':''}" onclick="setPage('profile')"><i class="fas fa-user"></i>Profil</button></div>`}
function renderHome(){const mine=goals.filter(g=>g.owner===myEmail()), partner=goals.filter(g=>g.owner!==myEmail()); const myRole=roleName(myProfile().role); const offered=transactions.filter(t=>t.from_role===myEmail()&&Number(t.amount)>0).reduce((s,t)=>s+Number(t.amount),0); const received=transactions.filter(t=>t.to_role===myEmail()&&Number(t.amount)>0).reduce((s,t)=>s+Number(t.amount),0); layout(`${topBar('Salut, '+myRole+'!','Situația obiectivelor voastre')}
<div class="grid2"><div class="card"><div class="tiny muted"><b>Ai oferit</b></div><div style="font-size:24px;font-weight:900">${fmt(offered)} <span class="tiny muted">RON</span></div></div><div class="card"><div class="tiny muted"><b>Ai primit</b></div><div style="font-size:24px;font-weight:900">${fmt(received)} <span class="tiny muted">RON</span></div></div></div>
<div class="sectionTitle">Obiectivele mele<div class="sectionLine"></div></div>${mine.length?mine.map(g=>goalCard(g,true,false)).join(''):'<div class="card muted tiny">Niciun obiectiv adăugat.</div>'}
<div class="sectionTitle">Obiectivele ${partnerTitle()}<div class="sectionLine red"></div></div>${partner.length?partner.map(g=>goalCard(g,false,true)).join(''):'<div class="card muted tiny">Partenerul nu are obiective.</div>'}
${calendarHtml()}`); setTimeout(bindDateSwipe,50);}
function goalCard(g,isMine,isPartner){const cur=Number(g.current||0),tar=Number(g.target||0),p=tar?Math.min(100,Math.round(cur/tar*100)):0,done=p>=100; const red=isPartner?'red':''; return `<div class="goal ${done?'done':''}" onclick="setPage('goal-stats','${g.id}')">${done?'<span class="complete">COMPLET</span>':''}<div class="between" style="gap:20px"><b style="padding-right:48px">${escapeHtml(g.title)}</b><span style="font-weight:900;white-space:nowrap">${fmt(cur)}<span class="tiny muted">/${fmt(tar)}</span></span></div><div class="bar"><div class="fill ${done?'green':red}" style="width:${p}%"></div></div><div class="between"><span class="tiny muted"><b>${p}%</b></span><div class="row" style="gap:8px">${isMine?`<button class="btn2" onclick="event.stopPropagation();openMoney('${g.id}','add')">Pune</button><button class="btn2" onclick="event.stopPropagation();openMoney('${g.id}','remove')">Scoate</button>`:`<button class="btn btnRed" onclick="event.stopPropagation();openMoney('${g.id}','add')">Pune</button>`}</div></div></div>`}
function calendarHtml(){const start=new Date(selectedDate); start.setDate(start.getDate()-3); let days=''; for(let i=0;i<7;i++){const d=new Date(start);d.setDate(start.getDate()+i);const active=dateISO(d)===dateISO(selectedDate);days+=`<button class="day ${active?'active':''}" onclick="selectedDate=new Date('${dateISO(d)}');renderApp()"><div class="tiny">${d.toLocaleDateString('ro-RO',{weekday:'short'})}</div><div>${d.getDate()}</div></button>`} const dayTrans=transactions.filter(t=>String(t.date)===dateISO(selectedDate)); const total=dayTrans.reduce((s,t)=>s+Number(t.amount),0); return `<div class="sectionTitle">Istoric<div class="sectionLine"></div></div><div class="card"><div class="between"><button class="iconBtn" onclick="selectedDate.setDate(selectedDate.getDate()-1);renderApp()"><i class="fas fa-chevron-left"></i></button><b>${selectedDate.toLocaleDateString('ro-RO',{day:'numeric',month:'long'})}</b><button class="iconBtn" onclick="selectedDate.setDate(selectedDate.getDate()+1);renderApp()"><i class="fas fa-chevron-right"></i></button></div><div id="dateStrip" class="dateStrip">${days}</div><div style="margin-top:14px" class="between"><b>Toată ziua</b><b style="color:${moneyColor(total)}">${total>=0?'+':''}${fmt(total)} RON</b></div><div>${dayTrans.length?dayTrans.map(t=>`<div class="trans"><div class="between"><div><b>${escapeHtml(t.goal_title)}</b><div class="tiny muted">${t.from_role===myEmail()?'Tu':'Partenerul'} • ${new Date(t.timestamp).toLocaleTimeString('ro-RO',{hour:'2-digit',minute:'2-digit'})}</div></div><b style="color:${moneyColor(t.amount)}">${Number(t.amount)>0?'+':''}${fmt(t.amount)}</b></div></div>`).join(''):'<p class="tiny muted">Nicio mișcare în ziua asta.</p>'}</div></div>`}
function bindDateSwipe(){const el=document.getElementById('dateStrip'); if(!el)return; let sx=0,dx=0; el.ontouchstart=e=>{sx=e.touches[0].clientX;dx=0}; el.ontouchmove=e=>{dx=e.touches[0].clientX-sx; el.style.transform=`translateX(${dx/3}px)`}; el.ontouchend=()=>{el.style.transform=''; if(Math.abs(dx)>45){selectedDate.setDate(selectedDate.getDate()+(dx<0?1:-1));renderApp();}}}
function renderGoalStats(){const g=goals.find(x=>x.id===activeGoalId); if(!g){setPage('home');return} const ts=transactions.filter(t=>String(t.goal_id)===String(g.id)); const by={}; ts.forEach(t=>{by[t.date]=(by[t.date]||0)+Number(t.amount)}); const rows=Object.keys(by).sort().reverse().map(d=>`<div class="trans"><div class="between"><b>${new Date(d).toLocaleDateString('ro-RO')}</b><b style="color:${moneyColor(by[d])}">${by[d]>=0?'+':''}${fmt(by[d])} RON</b></div></div>`).join(''); const pus=ts.filter(t=>Number(t.amount)>0).reduce((s,t)=>s+Number(t.amount),0), scos=ts.filter(t=>Number(t.amount)<0).reduce((s,t)=>s+Math.abs(Number(t.amount)),0); layout(`${topBar('Statistici obiectiv',escapeHtml(g.title),'home')}<div class="card"><h2 style="margin-top:0">${escapeHtml(g.title)}</h2><div class="grid2"><div><div class="tiny muted">Pus</div><b style="font-size:22px;color:#22c55e">${fmt(pus)}</b></div><div><div class="tiny muted">Scos</div><b style="font-size:22px;color:#ef4444">${fmt(scos)}</b></div></div><div style="height:12px"></div><div class="between"><span class="muted">Curent</span><b>${fmt(g.current)} / ${fmt(g.target)} RON</b></div></div><div class="sectionTitle">Pe zile<div class="sectionLine"></div></div><div class="card">${rows||'<p class="tiny muted">Nu există mișcări încă.</p>'}</div>`,false);}
function openAddGoal(){modalRoot.innerHTML=`<div class="modalWrap"><div class="modal"><h2>Adaugă obiectiv</h2><input id="goalTitle" class="input" placeholder="Titlu obiectiv"><div style="height:10px"></div><input id="goalTarget" class="input" type="number" placeholder="Suma necesară RON"><div class="grid2" style="margin-top:14px"><button class="btnSoft btn" onclick="closeModal()">Anulează</button><button class="btn" onclick="saveGoal()">Salvează</button></div></div></div>`}
function closeModal(){modalRoot.innerHTML=''}
async function saveGoal(){const title=document.getElementById('goalTitle').value.trim(),target=Number(document.getElementById('goalTarget').value); if(!title||target<=0)return toast('Completează obiectivul'); const {error}=await sb.from('goals').insert({title,target,current:0,owner:myEmail()}); if(error)return toast(error.message); closeModal(); await fetchData(true);}
function openMoney(id,type){const g=goals.find(x=>x.id===id); modalRoot.innerHTML=`<div class="modalWrap"><div class="modal"><h2>${type==='remove'?'Scoate bani':'Pune bani'}</h2><p class="muted">${escapeHtml(g.title)}</p><input id="moneyAmount" class="input" type="number" placeholder="Suma RON"><div class="grid2" style="margin-top:14px"><button class="btnSoft btn" onclick="closeModal()">Anulează</button><button class="btn ${type==='remove'?'btnRed':'btnGreen'}" onclick="saveMoney('${id}','${type}')">${type==='remove'?'Scoate':'Pune'}</button></div></div></div>`}
async function saveMoney(id,type){const amount=Number(document.getElementById('moneyAmount').value); if(amount<=0)return toast('Sumă invalidă'); const g=goals.find(x=>x.id===id); const delta=type==='remove'?-amount:amount; const newVal=Math.max(0,Number(g.current||0)+delta); const was=Number(g.current||0)<Number(g.target||0); let r=await sb.from('goals').update({current:newVal}).eq('id',id); if(r.error)return toast(r.error.message); r=await sb.from('transactions').insert({goal_id:id,goal_title:g.title,amount:delta,from_role:myEmail(),to_role:g.owner,date:todayISO(),timestamp:new Date().toISOString()}); if(r.error)toast('Istoric: '+r.error.message); closeModal(); if(was&&newVal>=Number(g.target||0)) confetti(); await fetchData(true);}
function renderProfile(){const p=myProfile(); const partner=profiles.find(x=>x.role===partnerRole()); layout(`${topBar('Profil','','home')}<div class="card" style="text-align:center"><label style="cursor:pointer">${avatar(myEmail(),'big')}<input type="file" accept="image/*" style="display:none" onchange="uploadAvatar(event)"></label><h2>${roleName(p.role)}</h2><p class="muted tiny">${myEmail()}</p></div><div class="sectionTitle">Partener<div class="sectionLine red"></div></div><div class="card row" style="gap:12px">${partner?avatar(partner.email):'<div class="avatar">?</div>'}<div><b>${partner?roleName(partner.role):'Nu apare încă'}</b><div class="tiny muted">${partner?.email||'Creează și celălalt cont'}</div></div></div><div style="height:14px"></div><button class="btn2" style="width:100%" onclick="toggleTheme()">Schimbă tema</button><div style="height:10px"></div><button class="btn btnRed" style="width:100%" onclick="sb.auth.signOut()">Deconectare</button>`);}
async function uploadAvatar(e){const file=e.target.files[0]; if(!file)return; if(file.size>450000)return toast('Poza e prea mare. Alege una mai mică.'); const reader=new FileReader(); reader.onload=async()=>{const {error}=await sb.from('profiles').upsert({id:currentUser.id,email:myEmail(),role:myProfile().role||currentUser.user_metadata?.role||'sot',avatar:reader.result},{onConflict:'id'}); if(error)toast(error.message); else {toast('Poza s-a salvat');fetchData(true)}}; reader.readAsDataURL(file);}
function toggleTheme(){localStorage.setItem('theme',localStorage.getItem('theme')==='dark'?'light':'dark');renderApp()}
function renderCalculator(){layout(`${topBar('Calculator rapid','Calcule salvate cu notiță','home')}<div class="calcDisplay"><div id="calcExpr" class="muted tiny">0</div><div id="calcResult" style="font-size:30px;font-weight:900">0</div></div><div class="calcKeys">${['7','8','9','/','4','5','6','*','1','2','3','-','0','.','C','+'].map(k=>`<button class="${'+-*/'.includes(k)?'op':''}" onclick="calcPress('${k}')">${k}</button>`).join('')}<button onclick="calcBack()"><i class="fas fa-delete-left"></i></button><button class="eq" style="grid-column:span 3" onclick="calcEqual()">=</button></div><div class="card" style="margin-top:14px"><input id="calcNote" class="input" placeholder="Adaugă o notiță"><button class="btn" style="width:100%;margin-top:10px" onclick="saveCalc()">Salvează calcul</button></div><div class="sectionTitle">Calcule salvate<div class="sectionLine"></div></div>${calcHistory.length?calcHistory.map(c=>`<div class="goal"><b>${escapeHtml(c.expression)} = ${escapeHtml(c.result)}</b><div class="tiny muted">${escapeHtml(c.note||'Fără notiță')} • ${new Date(c.created_at).toLocaleString('ro-RO')}</div></div>`).join(''):'<div class="card tiny muted">Nu ai calcule salvate.</div>'}`,false); window.calcExpr='';}
function calcUpdate(){document.getElementById('calcExpr').textContent=window.calcExpr||'0'}
function calcPress(k){if(k==='C')window.calcExpr='';else window.calcExpr=(window.calcExpr||'')+k;calcUpdate()}
function calcBack(){window.calcExpr=(window.calcExpr||'').slice(0,-1);calcUpdate()}
function calcEqual(){try{if(!/^[0-9+\-*/. ()]+$/.test(window.calcExpr||''))throw new Error(); const r=Function('return '+window.calcExpr)(); document.getElementById('calcResult').textContent=String(Math.round(r*100)/100); }catch(e){toast('Calcul invalid')}}
async function saveCalc(){const expr=window.calcExpr||'', result=document.getElementById('calcResult').textContent, note=document.getElementById('calcNote').value.trim(); if(!expr)return toast('Nu ai calcul'); const {error}=await sb.from('calculator_history').insert({user_email:myEmail(),expression:expr,result,note}); if(error)toast(error.message); else {toast('Calcul salvat');fetchData(true)}}
function renderGames(){const w=wallets.find(x=>x.user_email===myEmail())?.balance||0; const pending=rooms.filter(r=>r.status==='pending'&&r.creator_email!==myEmail()&&!r.opponent_email); const mine=rooms.filter(r=>[r.creator_email,r.opponent_email].includes(myEmail())&&r.status!=='finished'); layout(`${topBar('Jocuri','Provocări între voi doi')}<div class="card"><div class="between"><div><div class="tiny muted">Sold Jocuri</div><b style="font-size:28px">${fmt(w)} RON</b></div><button class="btn" onclick="openWithdraw()">Retrage</button></div></div><div class="sectionTitle">Prinde banii<div class="sectionLine"></div></div><div class="card"><p class="muted tiny">Pariați o sumă, celălalt apasă Sunt de acord, apoi pornește jocul la amândoi. Primul la 100 câștigă.</p><div class="grid2"><button class="btn2" onclick="createGame(5)">Pariu 5 lei</button><button class="btn2" onclick="createGame(10)">Pariu 10 lei</button></div><div class="row" style="gap:8px;margin-top:10px"><input id="customBet" class="input" type="number" placeholder="Altă sumă"><button class="btn" onclick="createGame(Number(document.getElementById('customBet').value))">Pariază</button></div></div>${pending.length?`<div class="sectionTitle">Invitații<div class="sectionLine red"></div>${pending.map(r=>`<div class="goal"><b>${r.creator_email}</b><div class="tiny muted">Pariu: ${fmt(r.bet_amount)} RON</div><button class="btn btnRed" style="margin-top:10px" onclick="acceptGame('${r.id}')">Sunt de acord</button></div>`).join('')}`:''}${mine.length?`<div class="sectionTitle">Jocuri active<div class="sectionLine"></div>${mine.map(r=>`<div class="goal"><div class="between"><div><b>${r.status==='pending'?'Așteaptă acceptul':r.status}</b><div class="tiny muted">Pariu ${fmt(r.bet_amount)} RON</div></div><button class="btn2" onclick="setPage('game-room','${r.id}')">Deschide</button></div></div>`).join('')}`:''}`);}
async function createGame(bet){if(!bet||bet<=0)return toast('Alege pariul'); const {error}=await sb.from('game_rooms').insert({creator_email:myEmail(),bet_amount:bet,status:'pending',scores:{[myEmail()]:0}}); if(error)toast(error.message); else {toast('Invitație creată');fetchData(true)}}
async function acceptGame(id){const r=rooms.find(x=>x.id===id); const start=new Date(Date.now()+4200).toISOString(); const scores={}; scores[r.creator_email]=0; scores[myEmail()]=0; const {error}=await sb.from('game_rooms').update({opponent_email:myEmail(),status:'countdown',agreed_at:new Date().toISOString(),start_at:start,scores}).eq('id',id); if(error)toast(error.message); else {activeRoomId=id; page='game-room'; await fetchData(true)}}
function renderGameRoom(){const r=rooms.find(x=>x.id===activeRoomId); if(!r){setPage('games');return} const myScore=Number(r.scores?.[myEmail()]||0), otherEmail=r.creator_email===myEmail()?r.opponent_email:r.creator_email, otherScore=Number(r.scores?.[otherEmail]||0); if(r.status==='countdown'&&new Date(r.start_at).getTime()<=Date.now()){sb.from('game_rooms').update({status:'playing'}).eq('id',r.id).then(()=>fetchData(true));}
let body=''; if(r.status==='pending') body='<div class="card"><h2>Așteaptă acceptul...</h2><p class="muted">Partenerul trebuie să apese Sunt de acord.</p></div>'; else if(r.status==='countdown'){const sec=Math.max(0,Math.ceil((new Date(r.start_at).getTime()-Date.now())/1000)); body=`<div class="card" style="text-align:center;padding:40px"><div class="muted">Pornește în</div><div style="font-size:72px;font-weight:900">${sec||'Start'}</div></div>`; setTimeout(()=>fetchData(true),700);} else if(r.status==='playing'){body=`<div class="card"><div class="between"><div><div class="tiny muted">Tu</div><b id="myScore">${myScore}</b></div><div><div class="tiny muted">Partener</div><b id="otherScore">${otherScore}</b></div><div><div class="tiny muted">Pariu</div><b>${fmt(r.bet_amount)} RON</b></div></div></div><div id="gameArea" class="gameArea"><div class="tiny muted" style="position:absolute;left:14px;top:12px">Prinde banii. Evită bombele.</div></div>`; setTimeout(()=>startGameRuntime(r,myScore),50);} else {body=`<div class="card" style="text-align:center"><h2>${r.winner_email===myEmail()?'Ai câștigat!':'A câștigat partenerul'}</h2><p class="muted">Câștigător: ${escapeHtml(r.winner_email||'-')}</p><button class="btn" onclick="setPage('games')">Joacă din nou</button></div>`} layout(`${topBar('Prinde banii','Primul la 100 câștigă','games')}${body}`,false);}
function startGameRuntime(room,initial){const area=document.getElementById('gameArea'); if(!area||gameRuntime.roomId===room.id)return; stopGameRuntime(); gameRuntime.roomId=room.id; gameRuntime.score=initial; gameRuntime.timer=setInterval(()=>spawnItem(room.id),650);}
function spawnItem(roomId){const area=document.getElementById('gameArea'); const room=rooms.find(r=>r.id===roomId); if(!area||!room||room.status!=='playing'){stopGameRuntime();return} const item=document.createElement('button'); const roll=Math.random(); let type='money',txt='💰',val=10,cls='money'; if(roll>.82){type='bomb';txt='💣';val=-25;cls='bad'} else if(roll>.70){type='trap';txt='🪤';val=-10;cls='bad'} else if(roll>.58){type='x2';txt='x2';val=0;cls='boost'} else if(roll>.48){type='fast';txt='⚡';val=0;cls='boost'} item.className='moneyItem '+cls; item.textContent=txt; item.style.left=Math.random()*(area.clientWidth-60)+'px'; item.style.top=Math.random()*(area.clientHeight-70)+40+'px'; item.onclick=()=>hitItem(item,type,val,roomId); area.appendChild(item); setTimeout(()=>item.remove(),1300)}
async function hitItem(el,type,val,roomId){el.remove(); if(type==='x2'){gameRuntime.mult=2;toast('X2 timp de 3 secunde');setTimeout(()=>gameRuntime.mult=1,3000);return} if(type==='fast'){toast('Fulger activ');return} let delta=val>0?val*gameRuntime.mult:val; gameRuntime.score=Math.max(0,gameRuntime.score+delta); const sc=document.getElementById('myScore'); if(sc)sc.textContent=gameRuntime.score; await sb.rpc('update_game_score',{p_room_id:roomId,p_score:gameRuntime.score}); if(gameRuntime.score>=100)finishGame(roomId)}
async function finishGame(roomId){stopGameRuntime(); const room=rooms.find(r=>r.id===roomId); const {data,error}=await sb.from('game_rooms').update({status:'finished',winner_email:myEmail(),finished_at:new Date().toISOString()}).eq('id',roomId).eq('status','playing').select().single(); if(!error&&data){await sb.rpc('add_game_wallet_balance',{p_user_email:myEmail(),p_amount:Number(room.bet_amount)}); await sb.from('game_transactions').insert({user_email:myEmail(),room_id:roomId,amount:Number(room.bet_amount),type:'win',note:'Câștig joc'}); confetti(); toast('Ai câștigat pariul!');} await fetchData(true)}
function openWithdraw(){const w=Number(wallets.find(x=>x.user_email===myEmail())?.balance||0); const mine=goals.filter(g=>g.owner===myEmail()); modalRoot.innerHTML=`<div class="modalWrap"><div class="modal"><h2>Retrage la obiectiv</h2><p class="muted">Sold disponibil: ${fmt(w)} RON</p><input id="withdrawAmount" class="input" type="number" placeholder="Sumă"><div style="height:10px"></div><select id="withdrawGoal" class="input">${mine.map(g=>`<option value="${g.id}">${escapeHtml(g.title)}</option>`).join('')}</select><div class="grid2" style="margin-top:14px"><button class="btnSoft btn" onclick="closeModal()">Anulează</button><button class="btn" onclick="withdrawToGoal()">Retrage</button></div></div></div>`}
async function withdrawToGoal(){const amount=Number(document.getElementById('withdrawAmount').value),gid=document.getElementById('withdrawGoal').value,g=goals.find(x=>x.id===gid); if(amount<=0||!g)return toast('Date invalide'); let r=await sb.rpc('add_game_wallet_balance',{p_user_email:myEmail(),p_amount:-amount}); if(r.error)return toast(r.error.message); await sb.from('goals').update({current:Number(g.current||0)+amount}).eq('id',gid); await sb.from('transactions').insert({goal_id:gid,goal_title:g.title,amount,from_role:myEmail(),to_role:myEmail(),date:todayISO(),timestamp:new Date().toISOString()}); await sb.from('game_transactions').insert({user_email:myEmail(),amount:-amount,type:'withdraw',note:'Retras la '+g.title}); closeModal();toast('Retras la obiectiv');fetchData(true)}
function confetti(){for(let i=0;i<45;i++){const c=document.createElement('div');c.className='confetti';c.style.left=Math.random()*100+'vw';c.style.background=['#4f46e5','#ef4444','#22c55e','#f59e0b'][i%4];c.style.animationDelay=(Math.random()*0.5)+'s';document.body.appendChild(c);setTimeout(()=>c.remove(),2200)}}
window.handleAuth=handleAuth;window.renderAuth=renderAuth;window.markRole=markRole;window.setPage=setPage;window.openAddGoal=openAddGoal;window.closeModal=closeModal;window.saveGoal=saveGoal;window.openMoney=openMoney;window.saveMoney=saveMoney;window.uploadAvatar=uploadAvatar;window.toggleTheme=toggleTheme;window.calcPress=calcPress;window.calcBack=calcBack;window.calcEqual=calcEqual;window.saveCalc=saveCalc;window.createGame=createGame;window.acceptGame=acceptGame;window.openWithdraw=openWithdraw;window.withdrawToGoal=withdrawToGoal;
window.addEventListener('error',e=>{console.error(e); app.innerHTML='<div class="page"><div class="card"><h2>Eroare în aplicație</h2><p class="muted">'+escapeHtml(e.message)+'</p></div></div>'});
start();
</script>
</body>
