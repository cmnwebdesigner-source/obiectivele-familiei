<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Obiectivele Familiei</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600;700&display=swap');

    :root {
      --bg: #f4f7fb;
      --panel: rgba(255,255,255,.92);
      --panel-2: rgba(15,23,42,.04);
      --line: rgba(15,23,42,.08);
      --line-soft: rgba(15,23,42,.06);
      --text: #07111f;
      --muted: #64748b;
      --muted-2: #94a3b8;
      --gold: #2563eb;
      --gold-2: #1d4ed8;
      --gold-3: #0f172a;
      --metal: #475569;
      --danger: #ef4444;
      --success: #16a34a;
      --shadow: 0 24px 70px rgba(15,23,42,.18);
      --soft-shadow: 0 14px 40px rgba(15,23,42,.10);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% -8%, rgba(37,99,235,.18), transparent 30%),
        radial-gradient(circle at 90% 4%, rgba(239,68,68,.10), transparent 34%),
        radial-gradient(circle at 50% 105%, rgba(22,163,74,.10), transparent 38%),
        linear-gradient(180deg, #ffffff 0%, #f4f7fb 58%, #eef3f9 100%);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    button, input, textarea { font-family: inherit; }
    button { border: 0; cursor: pointer; }
    input, textarea { outline: none; }

    .app-shell {
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.99), rgba(244,247,251,.99)),
        radial-gradient(circle at 50% 0%, rgba(37,99,235,.10), transparent 36%);
      box-shadow: var(--shadow);
      overflow: hidden;
      border-left: 1px solid rgba(15,23,42,.07);
      border-right: 1px solid rgba(15,23,42,.07);
    }

    .app-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.42), transparent 60%);
    }

    .screen {
      min-height: 100vh;
      padding: 18px 16px 92px;
      overflow-y: auto;
      scrollbar-width: none;
      animation: none;
      overscroll-behavior: contain;
    }
    .screen::-webkit-scrollbar { display:none; }

    .screen.no-nav { padding-bottom: 22px; }
    .screen.soft-render { animation: none !important; }

    @keyframes fade {
      from { opacity: .75; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .glass {
      background: rgba(255,255,255,.88);
      border: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(15,23,42,.08);
      backdrop-filter: blur(14px);
    }

    .top-card {
      border-radius: 32px;
      padding: 18px;
      background:
        linear-gradient(135deg, rgba(37,99,235,.10), rgba(255,255,255,.92) 48%, rgba(22,163,74,.055)),
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.78));
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: var(--soft-shadow), inset 0 1px 0 rgba(255,255,255,.88);
      position: relative;
      overflow: hidden;
    }
    .top-card::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,.06) 45%, transparent 65%);
      transform: translateX(-70%);
    }

    .section { margin-top: 18px; }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 2px 10px;
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -.02em;
    }
    .section-head small { color: var(--muted); font-weight: 400; }
    .clear-history-btn {
      border: 0;
      background: rgba(239,68,68,.08);
      color: #dc2626;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 10px;
      font-weight: 500;
      line-height: 1;
    }
    .clear-history-btn:active { transform: scale(.96); }

    .card {
      border-radius: 26px;
      padding: 15px;
      background: rgba(255,255,255,.90);
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 12px 26px rgba(15,23,42,.06), inset 0 1px 0 rgba(255,255,255,.9);
    }

    .goal-card {
      border-radius: 25px;
      padding: 15px;
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 14px 32px rgba(15,23,42,.07), inset 0 1px 0 rgba(255,255,255,.92);
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      overflow: hidden;
    }
    .goal-card:active { transform: scale(.988); background: rgba(255,255,255,.98); border-color: rgba(37,99,235,.24); }
    .goal-card-top { display:grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items:start; margin-bottom: 12px; }
    .goal-title-row { display:flex; align-items:center; gap:7px; min-width:0; }
    .goal-title { font-size: 13px; font-weight: 450; letter-spacing: .04em; text-transform: uppercase; color: var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
    .goal-owner { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .goal-money { font-size: 12px; color: var(--text); font-weight: 450; white-space: nowrap; text-align:right; line-height:1.35; }
    .goal-money .muted { display:block; font-size: 10px; }
    .muted { color: var(--muted); }

    .progress {
      height: 7px;
      border-radius: 99px;
      background: rgba(15,23,42,.08);
      overflow: hidden;
    }
    .progress > span {
      display: block;
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
      transition: width .28s ease;
    }
    .progress.partner > span { background: linear-gradient(90deg, #ef4444, #fb7185); }
    .progress.done > span { background: linear-gradient(90deg, #16a34a, #86efac); }

    .badge {
      font-size: 9px;
      padding: 4px 7px;
      border-radius: 99px;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #ffffff;
      border: 1px solid rgba(255,255,255,.50);
      letter-spacing: .05em;
      line-height: 1;
      box-shadow: 0 8px 18px rgba(22,163,74,.25);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .done-message {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 11px;
      font-weight: 500;
      color: #15803d;
      background: rgba(22,163,74,.12);
      border: 1px solid rgba(22,163,74,.20);
      white-space: nowrap;
    }
    body.dark-mode .done-message {
      color: #86efac;
      background: rgba(22,163,74,.16);
      border-color: rgba(134,239,172,.20);
    }


    .completed-contributions {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .contribution-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .02em;
      color: #166534;
      background: rgba(22,163,74,.10);
      border: 1px solid rgba(22,163,74,.18);
      white-space: nowrap;
    }
    .contribution-chip.partner-wife {
      color: #b91c1c;
      background: rgba(239,68,68,.10);
      border-color: rgba(239,68,68,.18);
    }
    .contribution-chip.partner-husband {
      color: #1d4ed8;
      background: rgba(37,99,235,.10);
      border-color: rgba(37,99,235,.18);
    }
    body.dark-mode .contribution-chip {
      color: #86efac;
      background: rgba(22,163,74,.14);
      border-color: rgba(134,239,172,.18);
    }
    body.dark-mode .contribution-chip.partner-wife {
      color: #fca5a5;
      background: rgba(239,68,68,.15);
      border-color: rgba(252,165,165,.18);
    }
    body.dark-mode .contribution-chip.partner-husband {
      color: #93c5fd;
      background: rgba(37,99,235,.16);
      border-color: rgba(147,197,253,.18);
    }

    .btn {
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 450;
      letter-spacing: .01em;
      transition: transform .12s ease, opacity .12s ease, filter .12s ease;
    }
    .btn:active { transform: scale(.97); }
    .btn-gold { background: linear-gradient(135deg, #0f172a, #2563eb 72%, #60a5fa); color: #fff; box-shadow: 0 10px 22px rgba(37,99,235,.18); }
    .btn-soft { background: rgba(15,23,42,.055); color: var(--text); border: 1px solid rgba(15,23,42,.08); }
    .btn-danger { background: rgba(239,68,68,.10); color: #dc2626; border: 1px solid rgba(239,68,68,.18); }
    .btn-full { width: 100%; padding: 14px 16px; border-radius: 18px; }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(15,23,42,.08);
      color: #0f172a;
      box-shadow: 0 8px 24px rgba(15,23,42,.06);
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 18px;
      background: linear-gradient(135deg, #2563eb, #0f172a);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
      font-weight:600;
    }
    .avatar.large { width: 86px; height: 86px; border-radius: 30px; font-size: 28px; }
    .avatar img { width:100%; height:100%; object-fit:cover; }

    .input {
      width: 100%;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(15,23,42,.10);
      color: var(--text);
      padding: 14px 14px;
      border-radius: 18px;
      font-size: 14px;
    }
    .input::placeholder { color: rgba(100,116,139,.70); }
    .input:focus { border-color: rgba(37,99,235,.34); box-shadow: 0 0 0 4px rgba(37,99,235,.08); }
    .label { font-size: 12px; color: var(--muted); margin: 0 0 7px 4px; }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 430px;
      width: 100%;
      height: 76px;
      padding: 10px 22px max(10px, env(safe-area-inset-bottom));
      display:flex;
      align-items:center;
      justify-content:space-between;
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(15,23,42,.08);
      z-index: 40;
    }
    .nav-item {
      color: var(--muted);
      width: 76px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 4px;
      font-size: 10px;
      background: transparent;
    }
    .nav-item.active { color: #2563eb; }
    .nav-plus {
      width: 58px;
      height: 58px;
      border-radius: 24px;
      background: linear-gradient(135deg, #0f172a, #2563eb);
      color: #fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 12px 28px rgba(37,99,235,.24);
      margin-top: -24px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.68);
      backdrop-filter: blur(8px);
      z-index: 70;
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }
    .sheet {
      width:100%;
      max-width:430px;
      border-radius: 30px 30px 0 0;
      padding: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.99), rgba(247,250,252,.99));
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 -20px 50px rgba(15,23,42,.18);
      animation: sheetUp .16s ease-out;
    }
    @keyframes sheetUp { from { transform: translateY(18px); opacity: .8; } to { transform: translateY(0); opacity:1; } }
    .grab { width:42px; height:4px; border-radius:99px; background:rgba(15,23,42,.16); margin:0 auto 18px; }

    .calendar-card {
      border-radius: 27px;
      padding: 13px;
      background: linear-gradient(180deg, rgba(255,255,255,.058), rgba(255,255,255,.030));
      border: 1px solid rgba(255,255,255,.085);
      user-select: none;
      box-shadow: 0 14px 30px rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.055);
    }
    .calendar-month { font-size: 12px; color: var(--muted); text-transform: capitalize; text-align:center; max-width: 190px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .day-pill {
      flex: 1;
      min-width: 0;
      border-radius: 18px;
      padding: 9px 3px;
      color: var(--muted);
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.045);
    }
    .day-pill.active {
      color: #15120a;
      background: linear-gradient(135deg, #b98a2f, #f6dc8e 60%, #c99f44);
      border-color: rgba(245,220,143,.28);
      box-shadow: 0 12px 22px rgba(201,159,68,.16);
    }
    .day-label { font-size: 9px; text-transform: uppercase; opacity:.76; letter-spacing:.04em; }
    .day-number { font-size: 17px; font-weight: 450; line-height: 1.1; }

    .stat-grid { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .stat-mini { padding: 13px 10px; border-radius: 20px; background: rgba(255,255,255,.052); border: 1px solid rgba(255,255,255,.085); }
    .stat-mini span { font-size: 11px; color: var(--muted); display:block; margin-bottom:6px; }
    .stat-mini b { font-size: 15px; color: var(--text); font-weight: 500; }

    .calc-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 9px; }
    .calc-key { height: 56px; border-radius: 20px; background: rgba(255,255,255,.075); color: var(--text); font-size: 17px; font-weight: 500; border: 1px solid rgba(255,255,255,.08); }
    .calc-key.op { color: #2563eb; background: rgba(214,177,93,.12); }
    .calc-key.clear { color: #ff9a9a; background: rgba(227,93,93,.12); }


    .quick-actions { display:flex; align-items:center; gap:8px; }
    .avatar-btn { padding:0; border:0; background:transparent; border-radius:999px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:inherit; }
    .avatar-btn:active { transform: scale(.96); }
    .summary-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px; }
    .summary-tile {
      border-radius: 24px;
      padding: 14px;
      background: rgba(255,255,255,.76);
      border: 1px solid rgba(15,23,42,.07);
      box-shadow: 0 10px 25px rgba(15,23,42,.055);
      min-width:0;
    }
    .summary-tile.offered { background: linear-gradient(145deg, rgba(239,68,68,.09), rgba(255,255,255,.88)); }
    .summary-tile.received { background: linear-gradient(145deg, rgba(22,163,74,.10), rgba(255,255,255,.88)); }
    .summary-icon { width:34px; height:34px; border-radius:14px; display:flex; align-items:center; justify-content:center; margin-bottom:10px; color:#fff; }
    .summary-icon.red { background:linear-gradient(135deg,#ef4444,#fb7185); }
    .summary-icon.green { background:linear-gradient(135deg,#16a34a,#86efac); }
    .calendar-compact {
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:10px;
    }
    .calendar-compact .day-pill { min-height:72px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .history-list .card { background:rgba(255,255,255,.86); }

    .confetti-piece {
      position: fixed;
      top: -10px;
      width: 7px;
      height: 12px;
      border-radius: 3px;
      z-index: 999;
      animation: fall 1.4s ease-out forwards;
    }
    @keyframes fall { to { transform: translateY(105vh) rotate(680deg); opacity:0; } }

    .loading {
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color: #2563eb;
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .loading-wrap { display:flex; flex-direction:column; align-items:center; gap:14px; }
    .loading-mark {
      width: 46px;
      height: 46px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(37,99,235,.16), rgba(255,255,255,.92));
      border: 1px solid rgba(37,99,235,.16);
      position:relative;
      box-shadow: 0 18px 45px rgba(0,0,0,.28);
    }
    .loading-mark::after {
      content:'';
      position:absolute;
      inset: 14px;
      border-radius: 999px;
      background: #2563eb;
      box-shadow: 0 0 24px rgba(37,99,235,.28);
      animation: pulseGold 1.2s ease-in-out infinite;
    }
    @keyframes pulseGold { 0%,100% { transform:scale(.72); opacity:.55; } 50% { transform:scale(1); opacity:1; } }
  

    /* FIX FINAL: tema reală, carduri rezumat premium, calendar normal */
    body.dark-mode {
      --bg: #070b12;
      --panel: rgba(15,23,42,.88);
      --panel-2: rgba(255,255,255,.05);
      --line: rgba(255,255,255,.10);
      --line-soft: rgba(255,255,255,.07);
      --text: #f8fafc;
      --muted: #a6b4c8;
      --muted-2: #74839a;
      --gold: #60a5fa;
      --gold-2: #3b82f6;
      --gold-3: #eff6ff;
      --metal: #94a3b8;
      --shadow: 0 28px 80px rgba(0,0,0,.42);
      --soft-shadow: 0 18px 46px rgba(0,0,0,.28);
      background:
        radial-gradient(circle at 8% -8%, rgba(37,99,235,.22), transparent 30%),
        radial-gradient(circle at 90% 4%, rgba(239,68,68,.12), transparent 34%),
        radial-gradient(circle at 50% 105%, rgba(22,163,74,.12), transparent 38%),
        linear-gradient(180deg, #070b12 0%, #0f172a 58%, #111827 100%);
    }
    body.dark-mode .app-shell {
      background:
        linear-gradient(180deg, rgba(9,13,22,.99), rgba(15,23,42,.99)),
        radial-gradient(circle at 50% 0%, rgba(37,99,235,.16), transparent 36%);
      border-left-color: rgba(255,255,255,.08);
      border-right-color: rgba(255,255,255,.08);
    }
    body.dark-mode .glass,
    body.dark-mode .card,
    body.dark-mode .goal-card,
    body.dark-mode .sheet,
    body.dark-mode .summary-tile,
    body.dark-mode .input,
    body.dark-mode .icon-btn,
    body.dark-mode .bottom-nav {
      background: rgba(15,23,42,.86);
      border-color: rgba(255,255,255,.10);
      color: var(--text);
      box-shadow: 0 16px 40px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.04);
    }
    body.dark-mode .top-card {
      background:
        linear-gradient(135deg, rgba(37,99,235,.18), rgba(15,23,42,.92) 48%, rgba(22,163,74,.12)),
        linear-gradient(180deg, rgba(15,23,42,.98), rgba(15,23,42,.78));
      border-color: rgba(255,255,255,.10);
    }
    .summary-hero {
      border-radius: 30px;
      padding: 16px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.96), rgba(244,247,251,.92)),
        radial-gradient(circle at 15% 0%, rgba(37,99,235,.13), transparent 45%),
        radial-gradient(circle at 95% 15%, rgba(22,163,74,.12), transparent 44%);
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 22px 55px rgba(15,23,42,.10), inset 0 1px 0 rgba(255,255,255,.94);
      overflow: hidden;
      position: relative;
    }
    .summary-hero:before {
      content:'';
      position:absolute;
      inset:-60px -60px auto auto;
      width:160px;
      height:160px;
      border-radius:999px;
      background: radial-gradient(circle, rgba(37,99,235,.16), transparent 66%);
      pointer-events:none;
    }
    .summary-hero-top { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; position:relative; }
    .summary-title { font-size:18px; line-height:1.12; font-weight:500; letter-spacing:-.04em; color:var(--text); }
    .summary-sub { font-size:11px; color:var(--muted); margin-top:4px; }
    .summary-pill { border-radius:999px; padding:9px 11px; font-size:11px; color:#fff; background:linear-gradient(135deg,#0f172a,#2563eb); box-shadow:0 10px 22px rgba(37,99,235,.20); white-space:nowrap; }
    .summary-grid { display:grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap:10px; position:relative; }
    .summary-tile {
      border-radius: 22px;
      padding: 13px;
      min-width:0;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(15,23,42,.075);
      box-shadow: 0 12px 28px rgba(15,23,42,.055);
    }
    .summary-tile.offered { background: linear-gradient(145deg, rgba(239,68,68,.10), rgba(255,255,255,.92)); }
    .summary-tile.received { background: linear-gradient(145deg, rgba(22,163,74,.12), rgba(255,255,255,.92)); }
    .summary-icon { width:36px; height:36px; border-radius:15px; display:flex; align-items:center; justify-content:center; margin-bottom:9px; color:#fff; box-shadow:0 10px 20px rgba(15,23,42,.10); }

    .piggy-flying-coin {
      position: fixed;
      z-index: 10000;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 800;
      color: #7c2d12;
      background: radial-gradient(circle at 32% 28%, #fff7b8 0 12%, #fde047 30%, #f59e0b 70%, #b45309 100%);
      box-shadow: 0 10px 22px rgba(245,158,11,.35), inset 0 1px 0 rgba(255,255,255,.55);
      pointer-events: none;
      transform: translate(-50%, -50%) scale(.9);
      animation: piggyCoinFly .72s cubic-bezier(.16, .9, .22, 1) forwards;
      --coin-x: 0px;
      --coin-y: -120px;
    }
    @keyframes piggyCoinFly {
      0% { opacity: 0; transform: translate(-50%, -50%) scale(.65) rotate(-18deg); }
      14% { opacity: 1; transform: translate(-50%, -50%) scale(1.05) rotate(8deg); }
      78% { opacity: 1; transform: translate(calc(-50% + var(--coin-x)), calc(-50% + var(--coin-y))) scale(.72) rotate(340deg); }
      100% { opacity: 0; transform: translate(calc(-50% + var(--coin-x)), calc(-50% + var(--coin-y))) scale(.28) rotate(430deg); }
    }

    };

    const goalBelongsToFamily = (g) => g?.owner === currentUser?.email || (!!familyCode && g?.family_code === familyCode);
    const transactionBelongsToFamily = (t) => t?.from_role === currentUser?.email || t?.to_role === currentUser?.email || (!!familyCode && t?.family_code === familyCode);
    const todayISO = () => new Date().toISOString().split('T')[0];
    const addDays = (dateStr, days) => { const d = new Date(dateStr + 'T12:00:00'); d.setDate(d.getDate() + days); return d.toISOString().split('T')[0]; };
    const formatFullDate = (dateStr) => new Date(dateStr + 'T12:00:00').toLocaleDateString('ro-RO', { weekday:'long', day:'2-digit', month:'long' });

      subscription = supabase.channel('smooth-sync')
        .on('postgres_changes', { event:'*', schema:'public', table:'goals' }, scheduleSoftRefresh)
        .on('postgres_changes', { event:'*', schema:'public', table:'transactions' }, scheduleSoftRefresh)
        .on('postgres_changes', { event:'*', schema:'public', table:'profiles' }, scheduleSoftRefresh)
        .on('postgres_changes', { event:'*', schema:'public', table:'calculator_history' }, scheduleSoftRefresh)
        .on('postgres_changes', { event:'*', schema:'public', table:'game_rooms' }, scheduleSoftRefresh)
        .on('postgres_changes', { event:'*', schema:'public', table:'game_wallets' }, scheduleSoftRefresh)
        .on('postgres_changes', { event:'*', schema:'public', table:'game_transactions' }, scheduleSoftRefresh)
        .subscribe();
    }

    function scheduleSoftRefresh() {
      clearTimeout(refreshTimer);
      if (Date.now() < suppressSoftUntil) {
        refreshTimer = setTimeout(() => fetchData({ render: false }), Math.max(500, suppressSoftUntil - Date.now()));
        return;
      }
      refreshTimer = setTimeout(() => {
        // Nu redesenăm paginile sensibile, ca să nu se vadă saltul la refresh.
        const quietPages = ['home', 'moneyHistory', 'calendar', 'calculator', 'flappyGame'].includes(currentPage);
        if (quietPages) {
          fetchData({ render: false });
        } else {
          fetchData({ soft: true, render: true });
        }
      }, 900);
    }

    function renderApp(soft = false) {
      const openSheet = modal.innerHTML.trim().length > 0;
      if (soft && openSheet) return;
      const oldScreen = app.querySelector('.screen');
      const scrollTop = oldScreen ? oldScreen.scrollTop : 0;
      let content = '';
      let nav = true;
      if (currentPage === 'home') content = homeHTML();
      else if (currentPage === 'profile') content = profileHTML();
      else if (currentPage === 'partner') content = partnerHTML();
      else if (currentPage === 'calculator') { content = calculatorHTML(); nav = false; }
      else if (currentPage === 'calendar') { content = calendarPageHTML(); nav = false; }
      else if (currentPage === 'piggy') { content = piggyPageHTML(); nav = false; }
      else if (currentPage === 'games') { content = gamesPageHTML(); nav = false; }
      else if (currentPage === 'moneyHistory') { content = moneyHistoryPageHTML(); nav = false; }
      else if (currentPage === 'goalStats') { content = statsHTML(); nav = false; }
      else if (currentPage === 'goalList') { content = goalListPageHTML(); nav = false; }
      else content = homeHTML();
      app.innerHTML = `<div class="screen ${nav ? '' : 'no-nav'} ${soft ? 'soft-render' : ''}">${content}</div>${nav ? bottomNavHTML() : ''}`;
      const restored = app.querySelector('.screen');
      if (restored && (soft || currentPage === 'home' || currentPage === 'moneyHistory')) {
        restored.style.scrollBehavior = 'auto';
        restored.scrollTop = scrollTop;
        requestAnimationFrame(() => { const again = app.querySelector('.screen'); if (again) again.scrollTop = scrollTop; });
      }
    }

        .forEach(t => {
          const email = t.from_role || 'necunoscut';
          sums[email] = (sums[email] || 0) + Number(t.amount || 0);

      const entries = Object.entries(sums).filter(([, value]) => value > 0).sort((a, b) => b[1] - a[1]);
      if (!entries.length) return '';
      return `<div class="completed-contributions">${entries.map(([email, value]) => {
        const role = getRole(email);

        return `<span class="contribution-chip ${cls}">${escapeHTML(label)} +${money(value)} RON</span>`;

      const weekNames = ['Lu','Ma','Mi','Jo','Vi','Sâ','Du'];
      const cells = [];
      for (let i = 0; i < 42; i++) {
        const d = new Date(gridStart);
        d.setDate(gridStart.getDate() + i);
        const iso = d.toISOString().split('T')[0];
        const outside = d.getMonth() !== m;
        const active = iso === selectedDate;
        const today = iso === todayISO();
        const dot = hasMoneyOnDate(iso);
        cells.push(`<button class="month-day ${outside ? 'outside' : ''} ${today ? 'today' : ''} ${active ? 'active' : ''}" onclick="window.appActions.setDate('${iso}')"><span>${d.getDate()}</span>${dot ? '<span class="day-dot"></span>' : '<span style="height:5px"></span>'}</button>`);
      }
      return `
        <div class="month-card">
          <div class="month-head">
            <button class="month-nav" onclick="window.appActions.shiftSelectedMonth(-1)" aria-label="Luna anterioară">${svg.back}</button>

    function getGoalListForCategory(kind, email) {
      if (kind === 'common_active' || kind === 'common_done') {
        const common = goals.filter(g => isCommonGoal(g) && goalBelongsToFamily(g));
        return kind === 'common_active'
          ? common.filter(g => Number(g.current || 0) < Number(g.target || 0))
          : common.filter(g => Number(g.current || 0) >= Number(g.target || 0));
      }
      const list = goals.filter(g => !isCommonGoal(g) && g.owner === email && goalBelongsToFamily(g));
      return kind === 'owner_done'
        ? list.filter(g => Number(g.current || 0) >= Number(g.target || 0))
        : list.filter(g => Number(g.current || 0) < Number(g.target || 0));
    }

      if (kind === 'common_active') return 'Obiective comune active';
      if (kind === 'common_done') return 'Obiective comune finalizate';

      return 'Obiective active';

    function avatarFileToBase64(file) {
      return new Promise((resolve, reject) => {
        if (!file || !file.type || !file.type.startsWith('image/')) {
          reject(new Error('Alege o poză validă.'));
          return;
        }

        const imageUrl = URL.createObjectURL(file);
        const img = new Image();

        img.onload = () => {
          try {
            const width = img.naturalWidth || img.width;
            const height = img.naturalHeight || img.height;
            if (!width || !height) throw new Error('Poza nu poate fi citită.');

            // Crop pătrat pe centru, apoi redimensionare. Așa se mulează în avatar ca pe Instagram.
            const cropSize = Math.min(width, height);
            const sx = Math.round((width - cropSize) / 2);
            const sy = Math.round((height - cropSize) / 2);
            const outSize = 640;

            const canvas = document.createElement('canvas');
            canvas.width = outSize;
            canvas.height = outSize;
            const ctx = canvas.getContext('2d', { alpha: false });
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, outSize, outSize);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(img, sx, sy, cropSize, cropSize, 0, 0, outSize, outSize);

            URL.revokeObjectURL(imageUrl);
            resolve(canvas.toDataURL('image/jpeg', 0.82));
          } catch (err) {
            URL.revokeObjectURL(imageUrl);
            reject(err);
          }
        };

        img.onerror = () => {
          URL.revokeObjectURL(imageUrl);
          reject(new Error('Nu pot citi poza asta. Încearcă JPG sau PNG.'));
        };

        img.src = imageUrl;
      });
    }

    function setupFlappyGameView() {
      const room = activeFlappyRoom();
      if (!room) return;
      selectedGameRoomId = room.id;
      clearInterval(flappyCountdownTimer);
      if (room.status === 'countdown') {
        const tick = async () => {
          const left = Math.ceil((new Date(room.start_at).getTime() - Date.now()) / 1000);
          const count = document.getElementById('flappyCount');
          const msg = document.getElementById('flappyMessage');
          if (count) count.textContent = left > 0 ? String(left) : 'Start';
          if (msg) msg.textContent = left > 0 ? 'Jocul începe imediat' : 'Pornește!';
          if (left <= 0) {
            clearInterval(flappyCountdownTimer);
            await supabase.from('game_rooms').update({ status:'playing' }).eq('id', room.id).neq('status','finished');
            const local = gameRooms.find(r => r.id === room.id);
            if (local) local.status = 'playing';
            startFlappyLocal(room.id);
          }
        };
        tick();
        flappyCountdownTimer = setInterval(tick, 350);
      } else if (room.status === 'playing') {
        startFlappyLocal(room.id);
      } else {
        stopFlappyLoop();
        drawFlappyStill();
      }
    }

    function drawFlappyStill() {
      const canvas = document.getElementById('flappyCanvas');

      const ctx = canvas.getContext('2d');
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#9ee7ff'; ctx.fillRect(0,0,canvas.width,canvas.height);
      ctx.fillStyle = '#8bd46b'; ctx.fillRect(0,canvas.height-80,canvas.width,80);
      ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.arc(canvas.width/2, canvas.height/2, 18, 0, Math.PI*2); ctx.fill();
    }

    function stopFlappyLoop() {
      if (flappyLoop) cancelAnimationFrame(flappyLoop);
      flappyLoop = null;
      if (flappyState) flappyState.running = false;
    }

    function startFlappyLocal(roomId) {
      const canvas = document.getElementById('flappyCanvas');
      if (!canvas || (flappyState?.roomId === roomId && flappyState.running)) return;
      stopFlappyLoop();
      const ctx = canvas.getContext('2d');
      const state = {
        roomId,
        running:true,
        ended:false,
        bird:{ x:86, y:220, v:0, r:14 },
        pipes:[],
        score:0,
        frame:0,
        lastRpcScore:0,
        gravity:.34,
        flap:-6.2
      };
      flappyState = state;
      const overlay = document.getElementById('flappyOverlay');
      if (overlay) overlay.style.display = 'none';
      const flap = () => { if (state.running && !state.ended) state.bird.v = state.flap; };
      canvas.onpointerdown = (e) => { e.preventDefault(); flap(); };
      window.onkeydown = (e) => { if (currentPage === 'flappyGame' && (e.code === 'Space' || e.key === 'ArrowUp')) { e.preventDefault(); flap(); } };

      const finish = async () => {
        if (state.ended) return;
        state.ended = true;
        state.running = false;
        const ov = document.getElementById('flappyOverlay');
        const cnt = document.getElementById('flappyCount');
        const msg = document.getElementById('flappyMessage');
        if (ov) ov.style.display = 'flex';
        if (cnt) cnt.textContent = 'Gata';
        if (msg) msg.textContent = 'Așteptăm rezultatul final...';
        try {
          const res = await supabase.rpc('finish_flappy_player', { p_room_id: roomId, p_player_email: currentUser.email, p_score: state.score });
          if (res.error) throw res.error;
          await fetchData({ soft:true, render:true });
        } catch (err) {
          alert('Eroare la finalizarea jocului: ' + (err.message || err));
        }
      };

      const loop = () => {
        if (!state.running) return;
        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0,0,W,H);
        ctx.fillStyle = '#9ee7ff'; ctx.fillRect(0,0,W,H);
        ctx.fillStyle = 'rgba(255,255,255,.65)';
        ctx.beginPath(); ctx.arc(55,70,22,0,Math.PI*2); ctx.arc(78,72,28,0,Math.PI*2); ctx.arc(104,70,20,0,Math.PI*2); ctx.fill();

        state.frame++;
        state.bird.v += state.gravity;
        state.bird.y += state.bird.v;
        if (state.frame % 92 === 0) {
          const gap = 138;
          const top = 70 + Math.random() * 230;
          state.pipes.push({ x:W + 20, top, gap, passed:false });
        }
        ctx.fillStyle = '#22c55e';
        state.pipes.forEach(pipe => {
          pipe.x -= 2.35;
          ctx.fillRect(pipe.x, 0, 54, pipe.top);
          ctx.fillRect(pipe.x, pipe.top + pipe.gap, 54, H - 80 - (pipe.top + pipe.gap));
          ctx.fillStyle = '#16a34a';
          ctx.fillRect(pipe.x - 4, pipe.top - 16, 62, 16);
          ctx.fillRect(pipe.x - 4, pipe.top + pipe.gap, 62, 16);
          ctx.fillStyle = '#22c55e';
          if (!pipe.passed && pipe.x + 54 < state.bird.x) {
            pipe.passed = true;
            state.score++;
            const my = document.getElementById('myFlappyScore');
            if (my) my.textContent = state.score;
            if (state.score !== state.lastRpcScore) {
              state.lastRpcScore = state.score;
              supabase.rpc('update_flappy_score', { p_room_id: roomId, p_player_email: currentUser.email, p_score: state.score }).then(()=>{});
            }
          }
        });
        state.pipes = state.pipes.filter(p => p.x > -70);
        ctx.fillStyle = '#7ccf55'; ctx.fillRect(0,H-80,W,80);
        ctx.fillStyle = '#5dbb45'; ctx.fillRect(0,H-80,W,10);
        ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.arc(state.bird.x,state.bird.y,state.bird.r,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#111827'; ctx.beginPath(); ctx.arc(state.bird.x+5,state.bird.y-5,3,0,Math.PI*2); ctx.fill();
        ctx.fillStyle = '#fb923c'; ctx.beginPath(); ctx.moveTo(state.bird.x+14,state.bird.y); ctx.lineTo(state.bird.x+28,state.bird.y+5); ctx.lineTo(state.bird.x+14,state.bird.y+10); ctx.closePath(); ctx.fill();

        let hit = state.bird.y - state.bird.r < 0 || state.bird.y + state.bird.r > H - 80;
        for (const p of state.pipes) {
          const inX = state.bird.x + state.bird.r > p.x && state.bird.x - state.bird.r < p.x + 54;
          const inGap = state.bird.y - state.bird.r > p.top && state.bird.y + state.bird.r < p.top + p.gap;
          if (inX && !inGap) { hit = true; break; }
        }
        if (hit) { finish(); return; }
        flappyLoop = requestAnimationFrame(loop);
      };
      flappyLoop = requestAnimationFrame(loop);
    }

      openMoney(id, mode) {

      },
      async applyMoney(id, mode) {
        const amountRaw = parseAmount(document.getElementById('moneyAmountInput')?.value || '');
        const g = goals.find(x => x.id === id);
        if (!g || !Number.isFinite(amountRaw) || amountRaw <= 0) return alert('Sumă invalidă.');
        if (isGoalDone(g)) return alert('Obiectiv finalizat. Nu mai poți modifica suma.');
        if (mode === 'remove' && g.owner !== currentUser.email) return alert('Poți scoate doar din obiectivul tău.');

        const old = Number(g.current || 0);
        const target = Number(g.target || 0);
        const oldCents = toCents(old);
        const targetCents = toCents(target);
        const amountCents = toCents(amountRaw);
        const remainingCents = Math.max(0, targetCents - oldCents);

        if (amountCents <= 0) return alert('Sumă invalidă.');
        if (mode === 'remove' && amountCents > oldCents) return alert('Nu poți scoate mai mult decât există.');
        if (mode !== 'remove' && amountCents > remainingCents) return alert('Poți pune maxim ' + money(fromCents(remainingCents)) + ' RON. Ce este peste obiectiv nu se acceptă.');
        if (mode !== 'remove' && remainingCents <= 0) return alert('Obiectiv finalizat. Nu mai poți modifica suma.');

        const requestedDeltaCents = mode === 'remove' ? -amountCents : amountCents;
        const requestedDelta = fromCents(requestedDeltaCents);
        const optimistic = fromCents(oldCents + requestedDeltaCents);
        const optimisticDelta = requestedDelta;

        const btn = document.getElementById('moneyBtn');
        if (btn) { btn.textContent = 'Se salvează...'; btn.disabled = true; }

        g.current = optimistic;
        const localTransaction = {
          id: 'local-' + Date.now(),
          goal_id: id,
          goal_title: String(g.title || '').toUpperCase(),
          amount: optimisticDelta,
          from_role: currentUser.email,
          to_role: g.owner,
          date: todayISO(),
          timestamp: new Date().toISOString(),
          family_code: familyCode,
          hidden_in_history: false
        };
        transactions.unshift(localTransaction);
        this.closeModal();
        suppressSoftUntil = Date.now() + 1300;
        renderApp(true);

        try {
          let finalAmount = optimistic;
          const upd = await supabase.from('goals').update({ current: optimistic }).eq('id', id).select('current').maybeSingle();
          if (upd.error) throw upd.error;
          if (upd.data?.current !== undefined) finalAmount = Number(upd.data.current);

          const actualDelta = finalAmount - old;
          if (actualDelta === 0) throw new Error('Obiectiv finalizat. Nu mai poți modifica suma.');

          g.current = finalAmount;
          localTransaction.amount = actualDelta;
          const tr = await supabase.from('transactions').insert([{ goal_id:id, goal_title:String(g.title || '').toUpperCase(), amount:actualDelta, from_role:currentUser.email, to_role:g.owner, date:todayISO(), timestamp:new Date().toISOString(), family_code: familyCode }]).select('*').maybeSingle();
          if (tr.error) throw tr.error;
          if (tr.data) transactions = transactions.map(t => t.id === localTransaction.id ? tr.data : t);
          suppressSoftUntil = Date.now() + 1600;
          if (old < target && finalAmount >= target) markGoalCompleted(g);
          scheduleSoftRefresh();
        } catch (error) {
          g.current = old;
          transactions = transactions.filter(t => t.id !== localTransaction.id);
          renderApp();
          alert('Eroare la bani: ' + (error.message || error));
        }
      },

      async addPiggyCoin(amount, event) {
        const raw = Number(amount);
        const cents = raw >= 1 ? Math.round(raw) : toCents(raw);
        const value = fromCents(cents);
        if (!currentUser || !Number.isFinite(value) || cents <= 0) return;

        const beforeBalance = piggyBalance();
        const afterBalance = fromCents(toCents(beforeBalance) + cents);
        const milestoneReached = PIGGY_MILESTONES.some(m => toCents(beforeBalance) < toCents(m.target) && toCents(afterBalance) >= toCents(m.target));
        animatePiggyCoin(event, cents);

        const localId = 'local-piggy-' + Date.now() + '-' + Math.random().toString(16).slice(2);
        const nowIso = new Date().toISOString();
        const localTransaction = {
          id: localId,
          goal_id: null,
          goal_title: PIGGY_TITLE,
          amount: value,
          from_role: currentUser.email,
          to_role: currentUser.email,
          date: todayISO(),
          timestamp: nowIso,
          family_code: familyCode,
          hidden_in_history: false
        };

        transactions.unshift(localTransaction);
        suppressSoftUntil = Date.now() + 1200;
        renderApp(true);
        if (milestoneReached) setTimeout(showConfetti, 120);

        piggySaveQueue = piggySaveQueue.catch(() => {}).then(async () => {
          const tr = await supabase.from('transactions').insert([{
            goal_id: null,
            goal_title: PIGGY_TITLE,
            amount: value,
            from_role: currentUser.email,
            to_role: currentUser.email,
            date: todayISO(),
            timestamp: nowIso,
            family_code: familyCode,
            hidden_in_history: false
          }]).select('*').maybeSingle();

          if (tr.error) throw tr.error;
          if (tr.data) transactions = transactions.map(t => t.id === localId ? tr.data : t);
          suppressSoftUntil = Date.now() + 1600;
          scheduleSoftRefresh();
        }).catch((error) => {
          transactions = transactions.filter(t => t.id !== localId);
          renderApp(true);
          alert('Eroare la pușculiță: ' + (error.message || error));
        });
      },


      async breakPiggy() {
        await piggySaveQueue.catch(() => {});
        const balance = piggyBalance();
        if (!currentUser || balance <= 0) return;
        if (!confirm('Spargi pușculița și o resetezi de la 0?')) return;
        const value = -fromCents(toCents(balance));
        const localTransaction = {
          id: 'local-piggy-break-' + Date.now(),
          goal_id: null,
          goal_title: PIGGY_TITLE,
          amount: value,
          from_role: currentUser.email,
          to_role: currentUser.email,
          date: todayISO(),
          timestamp: new Date().toISOString(),
          family_code: familyCode,
          hidden_in_history: false
        };
        transactions.unshift(localTransaction);
        suppressSoftUntil = Date.now() + 1300;
        showConfetti();
        renderApp(true);
        try {
          const tr = await supabase.from('transactions').insert([{
            goal_id: null,
            goal_title: PIGGY_TITLE,
            amount: value,
            from_role: currentUser.email,
            to_role: currentUser.email,
            date: todayISO(),
            timestamp: new Date().toISOString(),
            family_code: familyCode,
            hidden_in_history: false
          }]).select('*').maybeSingle();
          if (tr.error) throw tr.error;
          if (tr.data) transactions = transactions.map(t => t.id === localTransaction.id ? tr.data : t);
          suppressSoftUntil = Date.now() + 1600;
          scheduleSoftRefresh();
        } catch (error) {
          transactions = transactions.filter(t => t.id !== localTransaction.id);
          renderApp(true);
          alert('Eroare la resetarea pușculiței: ' + (error.message || error));
        }
      },



      async sendFlappyInvite(opponentEmailValue) {
        const custom = parseAmount(document.getElementById('customBetInput')?.value || '');
        const bet = Number.isFinite(custom) && custom > 0 ? custom : Number(selectedBetAmount || 5);
        if (!opponentEmailValue || opponentEmailValue === currentUser.email) return alert('Nu găsesc contul partenerului. Intră și pe contul celălalt o dată.');
        if (!Number.isFinite(bet) || bet <= 0) return alert('Pariu invalid.');
        try {
          const active = gameRoomsForMe().find(r => ['invite','accepted','countdown','playing'].includes(r.status));
          if (active) {
            selectedGameRoomId = active.id;
            currentPage = 'flappyLobby';
            renderApp();
            return alert('Există deja o rundă activă. Folosește-o pe aceea sau așteaptă să se termine.');
          }
          const payload = {
            family_code: familyCode,
            game_type: GAME_TYPE_FLAPPY,
            creator_email: currentUser.email,
            opponent_email: opponentEmailValue,
            bet_amount: bet,
            status: 'invite',
            scores: {},
            finished_players: {}
          };
          const { data, error } = await supabase.from('game_rooms').insert([payload]).select('*').maybeSingle();
          if (error) throw error;
          if (data) {
            gameRooms.unshift(data);
            selectedGameRoomId = data.id;
          }
          renderApp(true);
          scheduleSoftRefresh();
        } catch (error) {
          alert('Eroare la invitație: ' + (error.message || error));
        }
      },
      async respondFlappyInvite(id, accept) {
        try {
          modal.innerHTML = '';
          inviteModalRoomId = '';
          const patch = accept ? { status:'accepted', opponent_email: currentUser.email } : { status:'refused' };
          const { data, error } = await supabase.from('game_rooms').update(patch).eq('id', id).select('*').maybeSingle();
          if (error) throw error;
          if (data) gameRooms = [data, ...gameRooms.filter(r => r.id !== id)];
          selectedGameRoomId = id;
          currentPage = accept ? 'flappyLobby' : 'games';
          renderApp(true);
          scheduleSoftRefresh();
        } catch (error) {
          alert('Eroare la răspuns: ' + (error.message || error));
        }
      },
      async startFlappyRoom(id) {
        const room = gameRooms.find(r => r.id === id);
        if (!room) return;
        if (room.creator_email !== currentUser.email) return alert('Doar cel care a trimis invitația pornește jocul.');
        if (room.status !== 'accepted') return alert('Jocul nu este acceptat încă.');
        try {
          const startAt = new Date(Date.now() + 3800).toISOString();
          const scores = { [room.creator_email]:0, [room.opponent_email]:0 };
          const { data, error } = await supabase.from('game_rooms').update({ status:'countdown', start_at:startAt, scores, finished_players:{} }).eq('id', id).select('*').maybeSingle();
          if (error) throw error;
          if (data) gameRooms = [data, ...gameRooms.filter(r => r.id !== id)];
          selectedGameRoomId = id;
          currentPage = 'flappyGame';
          renderApp(true);
          scheduleSoftRefresh();
        } catch (error) {
          alert('Eroare la start: ' + (error.message || error));
        }
      },
      async saveFamilyCode() {
        const newCode = normalizeFamilyCode(document.getElementById('familyCodeSettingsInput')?.value || familyCode || DEFAULT_FAMILY_CODE);
        if (!newCode) return alert('Scrie un cod familie.');
        const oldCode = familyCode;
        familyCode = newCode;
        localStorage.setItem(userFamilyStorageKey(), familyCode);
        localStorage.setItem('familyCodeLocked:' + currentUser.id, '1');
        try {
          const up = await supabase.from('profiles').upsert({ id: currentUser.id, email: currentUser.email, role: getRole(currentUser.email), family_code: familyCode }, { onConflict: 'id' });
          if (up.error) throw up.error;
          await supabase.from('goals').update({ family_code: familyCode }).eq('owner', currentUser.email);
          await supabase.from('transactions').update({ family_code: familyCode }).or(`from_role.eq.${currentUser.email},to_role.eq.${currentUser.email}`);
          dataLoadedOnce = false;
          completedNotified = new Set();
          await fetchData({ soft: true });
          familyCodeStatus = '';
          renderApp(true);
        } catch (error) {
          familyCode = oldCode;
          localStorage.setItem(userFamilyStorageKey(), familyCode);
          alert('Eroare la cod familie: ' + (error.message || error));
        }
      },
      openProfileMenu() {
        modal.innerHTML = `<div class="modal-backdrop"><div class="sheet"><div class="grab"></div><h3 class="text-xl font-medium mb-1">Profil</h3><p class="text-sm muted mb-4">Alege ce vrei să faci cu contul tău.</p><div class="space-y-2"><button class="btn btn-danger btn-full profile-menu-action" onclick="window.appActions.logout()">${svg.logOut} Deconectare</button><button class="btn btn-delete-account btn-full profile-menu-action" onclick="window.appActions.openDeleteAccount()">${svg.trash} Șterge Cont</button><button class="btn btn-soft btn-full" onclick="window.appActions.closeModal()">Închide</button></div></div></div>`;
      },
      openDeleteAccount() {
        modal.innerHTML = `<div class="modal-backdrop"><div class="sheet"><div class="grab"></div><h3 class="text-xl font-medium mb-1">Șterge cont</h3><p class="text-sm muted mb-4">Asta șterge contul tău, obiectivele tale, calculele tale și datele tale din aplicație. Acțiunea nu se poate anula.</p><div class="grid grid-cols-2 gap-2"><button class="btn btn-soft btn-full" onclick="window.appActions.closeModal()">Anulează</button><button class="btn btn-delete-account btn-full" onclick="window.appActions.deleteAccount()">Șterge Cont</button></div></div></div>`;
      },
      async deleteAccount() {
        try {
          const email = currentUser?.email;
          if (!email) throw new Error('Nu ești conectat.');
          await supabase.from('transactions').delete().or(`from_role.eq.${email},to_role.eq.${email}`);
          const ownGoals = goals.filter(g => g.owner === email).map(g => g.id);
          for (const gid of ownGoals) await supabase.from('transactions').delete().eq('goal_id', gid);
          await supabase.from('goals').delete().eq('owner', email);
          await supabase.from('calculator_history').delete().eq('user_email', email);
          await supabase.from('profiles').delete().eq('email', email);
          localStorage.removeItem(PIN_SESSION_KEY);
          currentUser = null;
          goals = [];
          transactions = [];
          profiles = [];
          calculatorHistory = [];
          modal.innerHTML = '';
          authHTML(true);
        } catch (error) {
          alert('Eroare la ștergere cont: ' + (error.message || error));
        }
      },
      async uploadAvatar(e) {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const avatar = await avatarFileToBase64(file);
          const role = getRole(currentUser.email);
          const { error } = await supabase.from('profiles').upsert({ id:currentUser.id, email:currentUser.email, role, avatar, family_code: familyCode }, { onConflict:'id' });
          if (error) return alert(error.message);
          const p = getProfile(currentUser.email);
          if (p) p.avatar = avatar;
          else profiles.push({ id:currentUser.id, email:currentUser.email, role, avatar, family_code: familyCode });
          renderApp(true);
          scheduleSoftRefresh();
        } catch (error) {
          alert(error.message || 'Nu am putut procesa poza.');
        } finally {
          e.target.value = '';
        }
      },
      async deleteTransactionsByIds(ids, label = 'istoric') {
        const cleanIds = (ids || []).filter(id => id && !String(id).startsWith('local-'));
        if (!cleanIds.length) return;
        if (!confirm('Ștergi acest istoric?')) return;
        const before = transactions.slice();
        transactions = transactions.filter(t => !cleanIds.includes(t.id));
        suppressSoftUntil = Date.now() + 900;
        renderApp(true);
        const { error } = await supabase.from('transactions').delete().in('id', cleanIds);
        if (error) {
          transactions = before;
          renderApp(true);
          alert('Eroare la ștergere ' + label + ': ' + error.message);
          return;
        }
        scheduleSoftRefresh();
      },
      async clearDayHistory(event) {
        if (event) event.stopPropagation();
        const ids = visibleTransactions()
          .filter(t => transactionBelongsToFamily(t) && !isPiggyTransaction(t) && String(t.date).slice(0,10) === selectedDate)
          .map(t => t.id);
        await window.appActions.deleteTransactionsByIds(ids, 'istoric zi');
      },
      async clearPiggyHistory(type) {
        const ids = piggyHistoryTransactions()
          .filter(t => type === 'break' ? Number(t.amount || 0) < 0 : Number(t.amount || 0) > 0)
          .map(t => t.id)
          .filter(id => id && !String(id).startsWith('local-'));
        if (!ids.length) return;
        if (!confirm('Ștergi doar afișarea acestui istoric? Suma din pușculiță rămâne neschimbată.')) return;
        const before = transactions.slice();
        transactions = transactions.map(t => ids.includes(t.id) ? { ...t, hidden_in_history: true } : t);
        suppressSoftUntil = Date.now() + 900;
        renderApp(true);
        const { error } = await supabase.from('transactions').update({ hidden_in_history: true }).in('id', ids);
        if (error) {
          transactions = before;
          renderApp(true);
          alert('Eroare la ștergere istoric pușculiță: ' + error.message);
          return;
        }
        scheduleSoftRefresh();
      },
      async clearGoalHistory(goalId) {
        const ids = transactions
          .filter(t => transactionBelongsToFamily(t) && t.goal_id === goalId)
          .map(t => t.id);
        await window.appActions.deleteTransactionsByIds(ids, 'istoric obiectiv');
      },
      async clearCalculatorHistory() {
        if (!calculatorHistory.length) return;
        if (!confirm('Ștergi istoricul calculatorului?')) return;
        const before = calculatorHistory.slice();
        calculatorHistory = [];
        renderApp(true);
        const { error } = await supabase.from('calculator_history').delete().eq('user_email', currentUser.email);
        if (error) {
          calculatorHistory = before;
          renderApp(true);
          alert('Eroare la ștergere istoric: ' + error.message);
          return;
        }
        scheduleSoftRefresh();
      },
      toggleTheme() { const dark = document.body.classList.toggle('dark-mode'); localStorage.setItem('appTheme', dark ? 'dark' : 'light'); },
      async logout() {
        try { if (subscription) { await supabase.removeChannel(subscription); subscription = null; } } catch (_) {}
        try { modal.innerHTML = ''; } catch (_) {}
        try { stopFlappyLoop(); clearInterval(flappyCountdownTimer); } catch (_) {}
        localStorage.removeItem(PIN_SESSION_KEY);
        localStorage.removeItem('keepLoggedIn');
        currentUser = null;
        familyCode = '';
        familyCodeStatus = '';
        goals = [];
        transactions = [];
        profiles = [];
        calculatorHistory = [];
        gameRooms = [];
        gameWallets = [];
        gameTransactions = [];
        selectedGameRoomId = '';
        currentPage = 'home';
        previousPage = 'home';
        dataLoadedOnce = false;
        completedNotified = new Set();
        completedHold = {};
        suppressSoftUntil = 0;
        authHTML(true);
      },
      calcPress(v) { if (v === 'C') { calcExpression=''; calcResult='0'; renderApp(); return; } calcExpression += v === '×' ? '*' : v === '÷' ? '/' : v; renderApp(); },
      calcBack() { calcExpression = calcExpression.slice(0,-1); renderApp(); },
      calcEquals() { try { if (!/^[0-9+\-*/().\s]+$/.test(calcExpression)) throw new Error(); const r = Function('"use strict";return ('+calcExpression+')')(); calcResult = Number.isFinite(Number(r)) ? String(Math.round(Number(r)*100)/100) : 'Eroare'; } catch { calcResult='Eroare'; } renderApp(); },
      async saveCalc() {
        if (!calcExpression || calcResult === '0' || calcResult === 'Eroare') return alert('Fă întâi un calcul valid.');
        const note = document.getElementById('calcNoteInput')?.value.trim() || '';
        const btn = document.getElementById('saveCalcBtn');
        if (btn) { btn.disabled = true; btn.textContent = 'Se salvează...'; }
        const payload = { user_email:currentUser.email, expression:calcExpression, result:calcResult, note };
        const { data, error } = await supabase.from('calculator_history').insert([payload]).select().single();
        if (error) {
          if (btn) { btn.disabled = false; btn.textContent = 'Salvează Calcul'; }
          return alert(error.message);
        }
        const saved = data || { ...payload, id:'local-calc-' + Date.now(), created_at:new Date().toISOString() };
        calculatorHistory = [saved, ...calculatorHistory.filter(c => c.id !== saved.id)].slice(0, 30);
        suppressSoftUntil = Date.now() + 1400;
        const scroller = app.querySelector('.screen');
        const y = scroller ? scroller.scrollTop : 0;
        renderApp(true);
        requestAnimationFrame(() => {
          const next = app.querySelector('.screen');
          if (next) next.scrollTop = y;
        });
        setTimeout(() => fetchData({ render:false }), 800);
      }
    };

    async function start() {
      try {
        const savedEmail = localStorage.getItem(PIN_SESSION_KEY);
        const picked = Object.values(PIN_USERS).find(u => u.email === savedEmail);
        if (picked) {
          currentUser = {
            id: picked.id,
            email: picked.email,
            user_metadata: { role: picked.role, family_code: DEFAULT_FAMILY_CODE }
          };
          familyCode = DEFAULT_FAMILY_CODE;
          currentPage = 'home';
          previousPage = 'home';
          selectedGoalId = null;
          await ensureOwnProfile();
          dataLoadedOnce = false;
          completedNotified = new Set();
          await fetchData();
          setupRealtime();
        } else {
          authHTML(true);
        }
      } catch (e) {
        console.error(e);
        app.innerHTML = `<div class="screen no-nav flex flex-col justify-center"><div class="card text-center"><h2 class="text-xl font-medium mb-2">Eroare la pornire</h2><p class="text-sm muted mb-4">${escapeHTML(e.message || e)}</p><button class="btn btn-gold btn-full" onclick="location.reload()">Reîncarcă</button></div></div>`;
      }
    }

    start();
  </script>
</body>
</html>
