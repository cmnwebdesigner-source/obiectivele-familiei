<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Obiectivele Familiei</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600;700&display=swap');

    :root {
      --bg: #f4f7fb;
      --panel: rgba(255,255,255,.92);
      --panel-2: rgba(15,23,42,.04);
      --line: rgba(15,23,42,.08);
      --line-soft: rgba(15,23,42,.06);
      --text: #07111f;
      --muted: #64748b;
      --muted-2: #94a3b8;
      --gold: #2563eb;
      --gold-2: #1d4ed8;
      --gold-3: #0f172a;
      --metal: #475569;
      --danger: #ef4444;
      --success: #16a34a;
      --shadow: 0 24px 70px rgba(15,23,42,.18);
      --soft-shadow: 0 14px 40px rgba(15,23,42,.10);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% -8%, rgba(37,99,235,.18), transparent 30%),
        radial-gradient(circle at 90% 4%, rgba(239,68,68,.10), transparent 34%),
        radial-gradient(circle at 50% 105%, rgba(22,163,74,.10), transparent 38%),
        linear-gradient(180deg, #ffffff 0%, #f4f7fb 58%, #eef3f9 100%);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    button, input, textarea { font-family: inherit; }
    button { border: 0; cursor: pointer; }
    input, textarea { outline: none; }

    .app-shell {
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.99), rgba(244,247,251,.99)),
        radial-gradient(circle at 50% 0%, rgba(37,99,235,.10), transparent 36%);
      box-shadow: var(--shadow);
      overflow: hidden;
      border-left: 1px solid rgba(15,23,42,.07);
      border-right: 1px solid rgba(15,23,42,.07);
    }

    .app-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.42), transparent 60%);
    }

    .screen {
      min-height: 100vh;
      padding: 18px 16px 92px;
      overflow-y: auto;
      scrollbar-width: none;
      animation: fade .18s ease-out;
    }
    .screen::-webkit-scrollbar { display:none; }

    .screen.no-nav { padding-bottom: 22px; }

    @keyframes fade {
      from { opacity: .75; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .glass {
      background: rgba(255,255,255,.88);
      border: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(15,23,42,.08);
      backdrop-filter: blur(14px);
    }

    .top-card {
      border-radius: 32px;
      padding: 18px;
      background:
        linear-gradient(135deg, rgba(37,99,235,.10), rgba(255,255,255,.92) 48%, rgba(22,163,74,.055)),
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.78));
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: var(--soft-shadow), inset 0 1px 0 rgba(255,255,255,.88);
      position: relative;
      overflow: hidden;
    }
    .top-card::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,.06) 45%, transparent 65%);
      transform: translateX(-70%);
    }

    .section { margin-top: 18px; }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 2px 10px;
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -.02em;
    }
    .section-head small { color: var(--muted); font-weight: 400; }

    .card {
      border-radius: 26px;
      padding: 15px;
      background: rgba(255,255,255,.90);
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 12px 26px rgba(15,23,42,.06), inset 0 1px 0 rgba(255,255,255,.9);
    }

    .goal-card {
      border-radius: 25px;
      padding: 15px;
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 14px 32px rgba(15,23,42,.07), inset 0 1px 0 rgba(255,255,255,.92);
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      overflow: hidden;
    }
    .goal-card:active { transform: scale(.988); background: rgba(255,255,255,.98); border-color: rgba(37,99,235,.24); }
    .goal-card-top { display:grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items:start; margin-bottom: 12px; }
    .goal-title-row { display:flex; align-items:center; gap:7px; min-width:0; }
    .goal-title { font-size: 13px; font-weight: 450; letter-spacing: .04em; text-transform: uppercase; color: var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
    .goal-owner { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .goal-money { font-size: 12px; color: var(--text); font-weight: 450; white-space: nowrap; text-align:right; line-height:1.35; }
    .goal-money .muted { display:block; font-size: 10px; }
    .muted { color: var(--muted); }

    .progress {
      height: 7px;
      border-radius: 99px;
      background: rgba(15,23,42,.08);
      overflow: hidden;
    }
    .progress > span {
      display: block;
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
      transition: width .28s ease;
    }
    .progress.partner > span { background: linear-gradient(90deg, #ef4444, #fb7185); }
    .progress.done > span { background: linear-gradient(90deg, #16a34a, #86efac); }

    .badge {
      font-size: 8px;
      padding: 3px 6px;
      border-radius: 99px;
      background: rgba(97,196,135,.16);
      color: #9ef0bd;
      border: 1px solid rgba(97,196,135,.25);
      letter-spacing: .05em;
      line-height: 1;
    }

    .btn {
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 450;
      letter-spacing: .01em;
      transition: transform .12s ease, opacity .12s ease, filter .12s ease;
    }
    .btn:active { transform: scale(.97); }
    .btn-gold { background: linear-gradient(135deg, #0f172a, #2563eb 72%, #60a5fa); color: #fff; box-shadow: 0 10px 22px rgba(37,99,235,.18); }
    .btn-soft { background: rgba(15,23,42,.055); color: var(--text); border: 1px solid rgba(15,23,42,.08); }
    .btn-danger { background: rgba(239,68,68,.10); color: #dc2626; border: 1px solid rgba(239,68,68,.18); }
    .btn-full { width: 100%; padding: 14px 16px; border-radius: 18px; }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(15,23,42,.08);
      color: #0f172a;
      box-shadow: 0 8px 24px rgba(15,23,42,.06);
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 18px;
      background: linear-gradient(135deg, #2563eb, #0f172a);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
      font-weight:600;
    }
    .avatar.large { width: 86px; height: 86px; border-radius: 30px; font-size: 28px; }
    .avatar img { width:100%; height:100%; object-fit:cover; }

    .input {
      width: 100%;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(15,23,42,.10);
      color: var(--text);
      padding: 14px 14px;
      border-radius: 18px;
      font-size: 14px;
    }
    .input::placeholder { color: rgba(100,116,139,.70); }
    .input:focus { border-color: rgba(37,99,235,.34); box-shadow: 0 0 0 4px rgba(37,99,235,.08); }
    .label { font-size: 12px; color: var(--muted); margin: 0 0 7px 4px; }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 430px;
      width: 100%;
      height: 76px;
      padding: 10px 22px max(10px, env(safe-area-inset-bottom));
      display:flex;
      align-items:center;
      justify-content:space-between;
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(15,23,42,.08);
      z-index: 40;
    }
    .nav-item {
      color: var(--muted);
      width: 76px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 4px;
      font-size: 10px;
      background: transparent;
    }
    .nav-item.active { color: #2563eb; }
    .nav-plus {
      width: 58px;
      height: 58px;
      border-radius: 24px;
      background: linear-gradient(135deg, #0f172a, #2563eb);
      color: #fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 12px 28px rgba(37,99,235,.24);
      margin-top: -24px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.68);
      backdrop-filter: blur(8px);
      z-index: 70;
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }
    .sheet {
      width:100%;
      max-width:430px;
      border-radius: 30px 30px 0 0;
      padding: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.99), rgba(247,250,252,.99));
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 -20px 50px rgba(15,23,42,.18);
      animation: sheetUp .16s ease-out;
    }
    @keyframes sheetUp { from { transform: translateY(18px); opacity: .8; } to { transform: translateY(0); opacity:1; } }
    .grab { width:42px; height:4px; border-radius:99px; background:rgba(15,23,42,.16); margin:0 auto 18px; }

    .calendar-card {
      border-radius: 27px;
      padding: 13px;
      background: linear-gradient(180deg, rgba(255,255,255,.058), rgba(255,255,255,.030));
      border: 1px solid rgba(255,255,255,.085);
      user-select: none;
      box-shadow: 0 14px 30px rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.055);
    }
    .calendar-month { font-size: 12px; color: var(--muted); text-transform: capitalize; text-align:center; max-width: 190px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .day-pill {
      flex: 1;
      min-width: 0;
      border-radius: 18px;
      padding: 9px 3px;
      color: var(--muted);
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.045);
    }
    .day-pill.active {
      color: #15120a;
      background: linear-gradient(135deg, #b98a2f, #f6dc8e 60%, #c99f44);
      border-color: rgba(245,220,143,.28);
      box-shadow: 0 12px 22px rgba(201,159,68,.16);
    }
    .day-label { font-size: 9px; text-transform: uppercase; opacity:.76; letter-spacing:.04em; }
    .day-number { font-size: 17px; font-weight: 450; line-height: 1.1; }

    .stat-grid { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .stat-mini { padding: 13px 10px; border-radius: 20px; background: rgba(255,255,255,.052); border: 1px solid rgba(255,255,255,.085); }
    .stat-mini span { font-size: 11px; color: var(--muted); display:block; margin-bottom:6px; }
    .stat-mini b { font-size: 15px; color: var(--text); font-weight: 500; }

    .calc-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 9px; }
    .calc-key { height: 56px; border-radius: 20px; background: rgba(255,255,255,.075); color: var(--text); font-size: 17px; font-weight: 500; border: 1px solid rgba(255,255,255,.08); }
    .calc-key.op { color: #2563eb; background: rgba(214,177,93,.12); }
    .calc-key.clear { color: #ff9a9a; background: rgba(227,93,93,.12); }


    .quick-actions { display:flex; align-items:center; gap:8px; }
    .summary-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px; }
    .summary-tile {
      border-radius: 24px;
      padding: 14px;
      background: rgba(255,255,255,.76);
      border: 1px solid rgba(15,23,42,.07);
      box-shadow: 0 10px 25px rgba(15,23,42,.055);
      min-width:0;
    }
    .summary-tile.offered { background: linear-gradient(145deg, rgba(239,68,68,.09), rgba(255,255,255,.88)); }
    .summary-tile.received { background: linear-gradient(145deg, rgba(22,163,74,.10), rgba(255,255,255,.88)); }
    .summary-icon { width:34px; height:34px; border-radius:14px; display:flex; align-items:center; justify-content:center; margin-bottom:10px; color:#fff; }
    .summary-icon.red { background:linear-gradient(135deg,#ef4444,#fb7185); }
    .summary-icon.green { background:linear-gradient(135deg,#16a34a,#86efac); }
    .calendar-compact {
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:10px;
    }
    .calendar-compact .day-pill { min-height:72px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .history-list .card { background:rgba(255,255,255,.86); }

    .confetti-piece {
      position: fixed;
      top: -10px;
      width: 7px;
      height: 12px;
      border-radius: 3px;
      z-index: 999;
      animation: fall 1.4s ease-out forwards;
    }
    @keyframes fall { to { transform: translateY(105vh) rotate(680deg); opacity:0; } }

    .loading {
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color: #2563eb;
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .loading-wrap { display:flex; flex-direction:column; align-items:center; gap:14px; }
    .loading-mark {
      width: 46px;
      height: 46px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(37,99,235,.16), rgba(255,255,255,.92));
      border: 1px solid rgba(37,99,235,.16);
      position:relative;
      box-shadow: 0 18px 45px rgba(0,0,0,.28);
    }
    .loading-mark::after {
      content:'';
      position:absolute;
      inset: 14px;
      border-radius: 999px;
      background: #2563eb;
      box-shadow: 0 0 24px rgba(37,99,235,.28);
      animation: pulseGold 1.2s ease-in-out infinite;
    }
    @keyframes pulseGold { 0%,100% { transform:scale(.72); opacity:.55; } 50% { transform:scale(1); opacity:1; } }
  </style>
</head>
<body>
  <div id="app" class="app-shell"><div class="loading"><div class="loading-wrap"><div class="loading-mark"></div><span>Se încarcă</span></div></div></div>
  <div id="modalContainer"></div>
  <div id="confettiRoot"></div>

  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

    const supabaseUrl = 'https://hfqsouqtqvyxegcrabnc.supabase.co';
    const supabaseKey = 'sb_publishable_eqlbyUXpwcp-i-dPhFPsmA_wHqDW1AD';
    const supabase = createClient(supabaseUrl, supabaseKey, { auth: { persistSession: true, autoRefreshToken: true } });

    let currentUser = null;
    let goals = [];
    let transactions = [];
    let profiles = [];
    let calculatorHistory = [];
    let currentPage = 'home';
    let previousPage = 'home';
    let selectedDate = new Date().toISOString().split('T')[0];
    let selectedGoalId = null;
    let subscription = null;
    let refreshTimer = null;
    let calcExpression = '';
    let calcResult = '0';
    let swipeStartX = 0;
    let swipeMoved = false;
    window.selectedSignupRole = 'sot';

    const app = document.getElementById('app');
    const modal = document.getElementById('modalContainer');

    const svg = {
      home: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1v-9.5Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>',
      user: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M20 21a8 8 0 0 0-16 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="1.8"/></svg>',
      plus: '<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>',
      calc: '<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><rect x="5" y="3" width="14" height="18" rx="3" stroke="currentColor" stroke-width="1.8"/><path d="M8 7h8M8 12h.01M12 12h.01M16 12h.01M8 16h.01M12 16h.01M16 16h.01" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>',
      back: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M15 18 9 12l6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      calendar: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="4" y="5" width="16" height="15" rx="3" stroke="currentColor" stroke-width="1.8"/><path d="M8 3v4M16 3v4M4 10h16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>',
      moon: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M20 14.4A7.7 7.7 0 0 1 9.6 4a8 8 0 1 0 10.4 10.4Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/></svg>',
      camera: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M7 7h2l1.5-2h3L15 7h2a3 3 0 0 1 3 3v7a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3v-7a3 3 0 0 1 3-3Z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="13.5" r="3" stroke="currentColor" stroke-width="1.8"/></svg>',
      logOut: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M10 6H6a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h4M14 8l4 4-4 4M18 12H9" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>'
    };

    const money = (v) => Number(v || 0).toLocaleString('ro-RO', { maximumFractionDigits: 2 });
    const todayISO = () => new Date().toISOString().split('T')[0];
    const addDays = (dateStr, days) => { const d = new Date(dateStr + 'T12:00:00'); d.setDate(d.getDate() + days); return d.toISOString().split('T')[0]; };
    const formatFullDate = (dateStr) => new Date(dateStr + 'T12:00:00').toLocaleDateString('ro-RO', { weekday:'long', day:'2-digit', month:'long' });
    const getProfile = (email) => profiles.find(p => p.email === email);
    const getRole = (email) => email === currentUser?.email ? (getProfile(email)?.role || currentUser?.user_metadata?.role || 'sot') : (getProfile(email)?.role || 'sotie');
    const roleLabel = (role) => role === 'sotie' ? 'Soție' : 'Soț';
    const ownerLabel = (email) => email === currentUser?.email ? 'Tu' : roleLabel(getRole(email));
    const partnerEmail = () => profiles.find(p => p.email && p.email !== currentUser?.email)?.email || goals.find(g => g.owner !== currentUser?.email)?.owner || null;

    async function safeFetch(promise) { try { const { data, error } = await promise; if (error) { console.error(error); return []; } return data || []; } catch (error) { console.error(error); return []; } }

    async function ensureOwnProfile() {
      if (!currentUser) return;
      const role = currentUser.user_metadata?.role || window.selectedSignupRole || 'sot';
      await supabase.from('profiles').upsert({ id: currentUser.id, email: currentUser.email, role }, { onConflict: 'id' });
    }

    async function fetchData({ render = true, soft = false } = {}) {
      if (!currentUser) return;
      const [g, t, p, c] = await Promise.all([
        safeFetch(supabase.from('goals').select('*').order('created_at', { ascending: false })),
        safeFetch(supabase.from('transactions').select('*').order('timestamp', { ascending: false })),
        safeFetch(supabase.from('profiles').select('*').order('created_at', { ascending: true })),
        safeFetch(supabase.from('calculator_history').select('*').eq('user_email', currentUser.email).order('created_at', { ascending: false }).limit(30))
      ]);
      goals = g; transactions = t; profiles = p; calculatorHistory = c;
      if (render) renderApp(soft);
    }

    function setupRealtime() {
      if (subscription) supabase.removeChannel(subscription);
      subscription = supabase.channel('smooth-sync')
        .on('postgres_changes', { event:'*', schema:'public', table:'goals' }, scheduleSoftRefresh)
        .on('postgres_changes', { event:'*', schema:'public', table:'transactions' }, scheduleSoftRefresh)
        .on('postgres_changes', { event:'*', schema:'public', table:'profiles' }, scheduleSoftRefresh)
        .on('postgres_changes', { event:'*', schema:'public', table:'calculator_history' }, scheduleSoftRefresh)
        .subscribe();
    }

    function scheduleSoftRefresh() {
      clearTimeout(refreshTimer);
      refreshTimer = setTimeout(() => fetchData({ soft: true }), 280);
    }

    function renderApp(soft = false) {
      const openSheet = modal.innerHTML.trim().length > 0;
      if (soft && openSheet) return;
      const oldScreen = app.querySelector('.screen');
      const scrollTop = oldScreen ? oldScreen.scrollTop : 0;
      let content = '';
      let nav = true;
      if (currentPage === 'home') content = homeHTML();
      else if (currentPage === 'profile') content = profileHTML();
      else if (currentPage === 'partner') content = partnerHTML();
      else if (currentPage === 'calculator') { content = calculatorHTML(); nav = false; }
      else if (currentPage === 'calendar') { content = calendarPageHTML(); nav = false; }
      else if (currentPage === 'goalStats') { content = statsHTML(); nav = false; }
      else content = homeHTML();
      app.innerHTML = `<div class="screen ${nav ? '' : 'no-nav'}">${content}</div>${nav ? bottomNavHTML() : ''}`;
      if (soft) requestAnimationFrame(() => { const s = app.querySelector('.screen'); if (s) s.scrollTop = scrollTop; });
    }

    function avatarHTML(email = currentUser?.email, large = false) {

    function homeHTML() {

      const otherGoals = goals.filter(g => g.owner !== currentUser.email);

      const offered = transactions.filter(t => t.from_role === currentUser.email && t.to_role !== currentUser.email).reduce((s,t) => s + Math.max(0, Number(t.amount || 0)), 0);
      const received = transactions.filter(t => t.to_role === currentUser.email && t.from_role !== currentUser.email).reduce((s,t) => s + Math.max(0, Number(t.amount || 0)), 0);

    function goalCard(goal, isMine) {
      const current = Number(goal.current || 0);
      const target = Number(goal.target || 1);
      const percent = Math.min(100, Math.round((current / target) * 100));
      const done = percent >= 100;
      const cleanTitle = String(goal.title || '').toUpperCase();
      return `
        <div class="goal-card" onclick="window.appActions.openStats('${goal.id}')">
          <div class="goal-card-top">
            <div class="min-w-0">
              <div class="goal-title-row">
                <p class="goal-title">${escapeHTML(cleanTitle)}</p>
                ${done ? '<span class="badge">COMPLET</span>' : ''}
              </div>
              <p class="goal-owner">${ownerLabel(goal.owner)}</p>
            </div>
            <p class="goal-money">${money(current)} RON <span class="muted">din ${money(target)} RON</span></p>
          </div>
          <div class="progress ${goal.owner !== currentUser.email ? 'partner' : ''} ${done ? 'done' : ''}"><span style="width:${percent}%"></span></div>
          <div class="flex items-center justify-between mt-3 gap-3">
            <span class="text-xs muted shrink-0">${percent}%</span>
            <div class="flex gap-2 flex-wrap justify-end">
              ${isMine ? `<button class="btn btn-gold" onclick="event.stopPropagation(); window.appActions.openMoney('${goal.id}','add')">Pune</button><button class="btn btn-soft" onclick="event.stopPropagation(); window.appActions.openMoney('${goal.id}','remove')">Scoate</button>` : (!done ? `<button class="btn btn-gold" onclick="event.stopPropagation(); window.appActions.openMoney('${goal.id}','gift')">Oferă</button>` : '')}
            </div>
          </div>
        </div>`;
    }

    function calendarHTML() {
      const days = [-1,0,1].map(n => addDays(selectedDate, n));
      return `
        <div class="calendar-card">
          <div class="flex items-center justify-between mb-3">
            <button class="btn btn-soft" aria-label="Ziua anterioară" onclick="window.appActions.shiftDate(-1)">${svg.back}</button>

          <div class="calendar-compact">
            ${days.map((d) => {
              const date = new Date(d + 'T12:00:00');
              const label = d === selectedDate ? 'Ales' : d === todayISO() ? 'Azi' : date.toLocaleDateString('ro-RO', { weekday: 'short' });
              return `<button class="day-pill ${d === selectedDate ? 'active' : ''}" onclick="window.appActions.setDate('${d}')"><span class="day-label">${label}</span><span class="day-number">${date.getDate()}</span></button>`;
            }).join('')}
          </div>
        </div>`;
    }

    function calendarPageHTML() {
      const selectedTransactions = transactions.filter(t => String(t.date).slice(0,10) === selectedDate);
      const totalDay = selectedTransactions.reduce((s,t) => s + Number(t.amount || 0), 0);
      return `
        ${backButton()}
        <div class="top-card mb-4">
          <div class="flex items-center gap-3 mb-2"><span class="icon-btn">${svg.calendar}</span><div><p class="muted text-xs">Calendar</p><h2 class="text-2xl font-medium tracking-[-.03em]">Istoric bani</h2></div></div>

      const list = goals.filter(g => g.owner !== currentUser.email);

      const done = list.filter(g => Number(g.current || 0) >= Number(g.target || 0));
      return `

        <div class="section"><div class="section-head"><span>Obiective finalizate</span><small>${done.length}</small></div><div class="space-y-3">${done.length ? done.map(g => goalCard(g,false)).join('') : emptyHTML('Nimic aici momentan.')}</div></div>`;

          <div class="mx-auto mb-3" style="width:max-content">
            <label style="position:relative; display:block; cursor:pointer;">
              ${avatarHTML(currentUser.email, true)}

              <input type="file" accept="image/*" style="display:none" onchange="window.appActions.uploadAvatar(event)">

    function calculatorHTML() {
      const keys = ['7','8','9','÷','4','5','6','×','1','2','3','-','0','.','C','+'];
      return `
        ${backButton()}
        <div class="top-card mb-4"><p class="muted text-xs">Calculator</p><div class="text-[30px] min-h-[38px] font-medium break-all">${calcResult}</div><p class="muted text-sm break-all">${calcExpression || '0'}</p></div>
        <div class="calc-grid mb-4">${keys.map(k => `<button class="calc-key ${['÷','×','-','+'].includes(k) ? 'op' : k==='C' ? 'clear' : ''}" onclick="window.appActions.calcPress('${k}')">${k}</button>`).join('')}</div>
        <div class="grid grid-cols-2 gap-2 mb-4"><button class="btn btn-soft btn-full" onclick="window.appActions.calcBack()">Șterge</button><button class="btn btn-gold btn-full" onclick="window.appActions.calcEquals()">=</button></div>
        <div class="card mb-4"><p class="label">Notiță</p><textarea id="calcNoteInput" class="input" rows="2" placeholder="Pentru ce e calculul?"></textarea><button id="saveCalcBtn" class="btn btn-gold btn-full mt-3" onclick="window.appActions.saveCalc()">Salvează Calcul</button></div>
        <div class="section"><div class="section-head"><span>Calcule salvate</span><small>${calculatorHistory.length}</small></div><div class="space-y-2">${calculatorHistory.length ? calculatorHistory.map(c => `<div class="card"><p class="text-sm">${escapeHTML(c.expression)} = ${escapeHTML(c.result)}</p>${c.note ? `<p class="text-xs muted mt-1">${escapeHTML(c.note)}</p>` : ''}</div>`).join('') : emptyHTML('Nu ai calcule salvate.')}</div></div>`;
    }

    function statsHTML() {
      const goal = goals.find(g => g.id === selectedGoalId);
      if (!goal) return `${backButton()}${emptyHTML('Obiectivul nu mai există.')}`;
      const list = transactions.filter(t => t.goal_id === goal.id);
      const added = list.filter(t => Number(t.amount) > 0).reduce((s,t) => s + Number(t.amount), 0);
      const removed = list.filter(t => Number(t.amount) < 0).reduce((s,t) => s + Math.abs(Number(t.amount)), 0);
      const current = Number(goal.current || 0), target = Number(goal.target || 1);
      const percent = Math.min(100, Math.round((current / target) * 100));
      const byDate = {};
      list.forEach(t => { const d = String(t.date).slice(0,10); (byDate[d] ||= []).push(t); });
      const dates = Object.keys(byDate).sort((a,b) => b.localeCompare(a));
      return `
        ${backButton()}
        <div class="top-card mb-4"><p class="muted text-xs">Statistici</p><h2 class="text-2xl font-medium tracking-[-.03em]">${escapeHTML(String(goal.title || '').toUpperCase())}</h2><p class="muted text-sm mt-1">${money(current)} din ${money(target)} RON</p><div class="progress mt-4 ${percent>=100?'done':''}"><span style="width:${percent}%"></span></div></div>
        <div class="stat-grid mb-4"><div class="stat-mini"><span>Pus</span><b>${money(added)}</b></div><div class="stat-mini"><span>Scos</span><b>${money(removed)}</b></div><div class="stat-mini"><span>Mișcări</span><b>${list.length}</b></div></div>
        <div class="section"><div class="section-head"><span>Pe zile</span></div><div class="space-y-3">${dates.length ? dates.map(d => `<div class="card"><div class="flex justify-between mb-2"><span class="text-sm capitalize">${formatFullDate(d)}</span><span class="text-sm muted">${byDate[d].length}</span></div><div class="space-y-2">${byDate[d].map(transactionRow).join('')}</div></div>`).join('') : emptyHTML('Nu există încă statistici.')}</div></div>`;
    }

    function transactionRow(t) {
      const amount = Number(t.amount || 0);
      const color = amount < 0 ? 'var(--danger)' : 'var(--success)';
      const text = amount < 0 ? 'S-a scos din' : (t.from_role === t.to_role ? 'S-a pus la' : 'S-a oferit la');
      return `<div class="card" style="padding:11px 12px"><div class="flex items-center justify-between gap-3"><p class="text-xs muted">${text} <span style="color:var(--text)">${escapeHTML(String(t.goal_title || '').toUpperCase())}</span></p><p class="text-xs" style="color:${color}; white-space:nowrap;">${amount > 0 ? '+' : ''}${money(amount)}</p></div></div>`;
    }

    function bottomNavHTML() {
      return `<nav class="bottom-nav"><button class="nav-item ${currentPage==='home'?'active':''}" onclick="window.appActions.switchPage('home')">${svg.home}<span>Acasă</span></button><button class="nav-plus" onclick="window.appActions.openAddGoal()">${svg.plus}</button><button class="nav-item ${currentPage==='profile'?'active':''}" onclick="window.appActions.switchPage('profile')">${svg.user}<span>Profil</span></button></nav>`;
    }

    function backButton() { return `<button class="btn btn-soft mb-4 flex items-center gap-2" onclick="window.appActions.goBack()">${svg.back} Înapoi</button>`; }
    function emptyHTML(text) { return `<div class="card text-center"><p class="text-sm muted">${text}</p></div>`; }
    function escapeHTML(v) { return String(v ?? '').replace(/[&<>'"]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#039;','"':'&quot;'}[m])); }

    function showConfetti() {
      const root = document.getElementById('confettiRoot');
      const colors = ['#2563eb','#ef4444','#16a34a','#0f172a','#60a5fa'];
      for (let i=0;i<36;i++) {
        const p = document.createElement('div');
        p.className = 'confetti-piece';
        p.style.left = Math.random()*100 + 'vw';
        p.style.background = colors[Math.floor(Math.random()*colors.length)];
        p.style.animationDelay = Math.random()*0.25 + 's';
        root.appendChild(p);
        setTimeout(() => p.remove(), 1700);
      }
    }

    window.appActions = {
      toggleAuthMode: authHTML,
      selectRole(role) {
        window.selectedSignupRole = role;
        const a = document.getElementById('roleSot');
        const b = document.getElementById('roleSotie');
        if (!a || !b) return;
        a.className = role === 'sot' ? 'btn btn-gold' : 'btn btn-soft';
        b.className = role === 'sotie' ? 'btn btn-gold' : 'btn btn-soft';
      },
      async handleAuth(isLogin) {
        const email = document.getElementById('emailInput').value.trim();
        const password = document.getElementById('passInput').value;
        const keep = document.getElementById('keepLoggedInput')?.checked !== false;
        const btn = document.getElementById('authBtn');
        if (!email || !password) return alert('Completează emailul și parola.');
        btn.textContent = 'Se procesează...'; btn.disabled = true;
        try {
          let result;
          if (isLogin) result = await supabase.auth.signInWithPassword({ email, password });
          else result = await supabase.auth.signUp({ email, password, options: { data: { role: window.selectedSignupRole } } });
          if (result.error) throw result.error;
          localStorage.setItem('keepLogged', keep ? '1' : '0');
          currentUser = result.data.user || result.data.session?.user;
          if (!currentUser) {
            const { data } = await supabase.auth.getSession();
            currentUser = data.session?.user || null;
          }
          if (!currentUser) throw new Error('Cont creat, dar sesiunea nu este activă. Încearcă să te conectezi.');
          await ensureOwnProfile();
          await fetchData();
          setupRealtime();
        } catch (e) {
          alert('Eroare: ' + (e.message || e));
          btn.textContent = isLogin ? 'Conectare' : 'Creează cont'; btn.disabled = false;
        }
      },
      switchPage(page) { previousPage = currentPage; currentPage = page; renderApp(); },
      goBack() { currentPage = previousPage && previousPage !== currentPage ? previousPage : 'home'; renderApp(); },
      openCalculator() { previousPage = currentPage; currentPage = 'calculator'; renderApp(); },
      openCalendar() { previousPage = currentPage; currentPage = 'calendar'; renderApp(); },
      openStats(id) { selectedGoalId = id; previousPage = currentPage; currentPage = 'goalStats'; renderApp(); },
      setDate(d) { selectedDate = d; renderApp(); },
      shiftDate(n) { selectedDate = addDays(selectedDate, n); renderApp(); },
      swipeStart(e) { if (e.target.closest('button')) return; swipeStartX = e.clientX; swipeMoved = true; },
      swipeEnd(e) { if (!swipeMoved) return; const diff = e.clientX - swipeStartX; swipeMoved = false; if (Math.abs(diff) > 45) this.shiftDate(diff < 0 ? 1 : -1); },
      swipeCancel() { swipeMoved = false; },
      openAddGoal() {
        modal.innerHTML = `<div class="modal-backdrop"><div class="sheet"><div class="grab"></div><h3 class="text-xl font-medium mb-4">Adaugă obiectiv</h3><div class="space-y-3"><div><p class="label">Titlu</p><input id="goalTitleInput" class="input" placeholder="VACANȚĂ" maxlength="42" style="text-transform:uppercase; letter-spacing:.04em;" oninput="this.value=this.value.toLocaleUpperCase('ro-RO')"></div><div><p class="label">Suma necesară</p><input id="goalTargetInput" type="number" class="input" placeholder="1000"></div><div class="grid grid-cols-2 gap-2 pt-2"><button class="btn btn-soft btn-full" onclick="window.appActions.closeModal()">Anulează</button><button id="saveGoalBtn" class="btn btn-gold btn-full" onclick="window.appActions.saveGoal()">Salvează</button></div></div></div></div>`;
      },
      closeModal() { modal.innerHTML = ''; },
      async saveGoal() {
        const titleInput = document.getElementById('goalTitleInput');
        const targetInput = document.getElementById('goalTargetInput');
        const title = (titleInput?.value || '').trim().toLocaleUpperCase('ro-RO');
        const target = Number.parseFloat(targetInput?.value || '');
        if (!title || !Number.isFinite(target) || target <= 0) return alert('Date invalide.');
        const btn = document.getElementById('saveGoalBtn');
        btn.textContent = 'Salvez...'; btn.disabled = true;
        try {
          if (!currentUser?.email) {
            const { data: sessionData } = await supabase.auth.getSession();
            currentUser = sessionData.session?.user || currentUser;
          }
          if (!currentUser?.email) throw new Error('Nu ești conectat. Reconectează-te și încearcă iar.');
          const payload = { title, target, current: 0, owner: currentUser.email, created_at: new Date().toISOString() };
          const { data, error } = await supabase.from('goals').insert(payload).select('*').maybeSingle();
          if (error) throw error;
          goals.unshift(data || { id: crypto.randomUUID(), ...payload });
          this.closeModal();
          renderApp();
          scheduleSoftRefresh();
        } catch (error) {
          alert('Eroare la obiectiv: ' + (error.message || error));
          btn.textContent = 'Salvează'; btn.disabled = false;
        }
      },
      openMoney(id, mode) {
        const g = goals.find(x => x.id === id); if (!g) return;
        const title = mode === 'remove' ? 'Scoate bani' : mode === 'gift' ? 'Oferă bani' : 'Pune bani';
        const action = mode === 'remove' ? 'Scoate' : mode === 'gift' ? 'Oferă' : 'Pune';
        modal.innerHTML = `<div class="modal-backdrop"><div class="sheet"><div class="grab"></div><h3 class="text-xl font-medium mb-1">${title}</h3><p class="text-sm muted mb-4">${escapeHTML(String(g.title || '').toUpperCase())}</p><div class="space-y-3"><input id="moneyAmountInput" type="number" class="input" placeholder="RON"><div class="grid grid-cols-2 gap-2 pt-2"><button class="btn btn-soft btn-full" onclick="window.appActions.closeModal()">Anulează</button><button id="moneyBtn" class="btn btn-gold btn-full" onclick="window.appActions.applyMoney('${id}','${mode}')">${action}</button></div></div></div></div>`;
      },
      async applyMoney(id, mode) {
        const amountRaw = parseFloat(document.getElementById('moneyAmountInput').value);
        const g = goals.find(x => x.id === id);
        if (!g || !amountRaw || amountRaw <= 0) return alert('Sumă invalidă.');
        if (mode === 'remove' && g.owner !== currentUser.email) return alert('Poți scoate doar din obiectivul tău.');
        if (mode === 'remove' && amountRaw > Number(g.current || 0)) return alert('Nu poți scoate mai mult decât există.');
        const old = Number(g.current || 0);
        const delta = mode === 'remove' ? -amountRaw : amountRaw;
        let next = Math.max(0, old + delta);
        const btn = document.getElementById('moneyBtn'); btn.textContent = 'Salvez...'; btn.disabled = true;
        const rpc = await supabase.rpc('adjust_goal_amount', { p_goal_id: id, p_delta: delta });
        if (rpc.error) {
          const upd = await supabase.from('goals').update({ current: next }).eq('id', id);
          if (upd.error) { alert(upd.error.message); this.closeModal(); return; }
        } else if (rpc.data !== null && rpc.data !== undefined) next = Number(rpc.data);
        await supabase.from('transactions').insert([{ goal_id:id, goal_title:String(g.title || '').toUpperCase(), amount:delta, from_role:currentUser.email, to_role:g.owner, date:todayISO(), timestamp:new Date().toISOString() }]);
        g.current = next;
        this.closeModal(); renderApp();
        if (old < Number(g.target || 0) && next >= Number(g.target || 0)) showConfetti();
        scheduleSoftRefresh();
      },
      async uploadAvatar(e) {
        const file = e.target.files[0]; if (!file) return;
        if (file.size > 900000) return alert('Alege o poză mai mică.');
        const reader = new FileReader();
        reader.onload = async ev => {
          const avatar = ev.target.result;
          const role = getRole(currentUser.email);
          const { error } = await supabase.from('profiles').upsert({ id:currentUser.id, email:currentUser.email, role, avatar }, { onConflict:'id' });
          if (error) return alert(error.message);
          const p = getProfile(currentUser.email); if (p) p.avatar = avatar; else profiles.push({ id:currentUser.id, email:currentUser.email, role, avatar });
          renderApp();
        };
        reader.readAsDataURL(file);
      },
      toggleTheme() { document.body.classList.toggle('light-mode'); },
      async logout() { await supabase.auth.signOut(); localStorage.removeItem('keepLogged'); currentUser = null; authHTML(true); },
      calcPress(v) { if (v === 'C') { calcExpression=''; calcResult='0'; renderApp(); return; } calcExpression += v === '×' ? '*' : v === '÷' ? '/' : v; renderApp(); },
      calcBack() { calcExpression = calcExpression.slice(0,-1); renderApp(); },
      calcEquals() { try { if (!/^[0-9+\-*/().\s]+$/.test(calcExpression)) throw new Error(); const r = Function('"use strict";return ('+calcExpression+')')(); calcResult = Number.isFinite(Number(r)) ? String(Math.round(Number(r)*100)/100) : 'Eroare'; } catch { calcResult='Eroare'; } renderApp(); },
      async saveCalc() { if (!calcExpression || calcResult === '0' || calcResult === 'Eroare') return alert('Fă întâi un calcul valid.'); const note = document.getElementById('calcNoteInput')?.value.trim() || ''; const { error } = await supabase.from('calculator_history').insert([{ user_email:currentUser.email, expression:calcExpression, result:calcResult, note }]); if (error) return alert(error.message); await fetchData({ soft:true }); }
    };

    async function start() {
      try {
        const { data, error } = await supabase.auth.getSession();
        if (error) throw error;
        const session = data.session;
        if (session && localStorage.getItem('keepLogged') === '0') {
          await supabase.auth.signOut();
          authHTML(true);
          return;
        }
        if (session) {
          currentUser = session.user;
          await ensureOwnProfile();
          await fetchData();
          setupRealtime();
        } else authHTML(true);
        supabase.auth.onAuthStateChange(async (_event, session) => {
          if (session?.user && session.user.id !== currentUser?.id) {
            currentUser = session.user;
            await ensureOwnProfile();
            await fetchData();
            setupRealtime();
          } else if (!session && currentUser) {
            currentUser = null;
            authHTML(true);
          }
        });
      } catch (e) {
        console.error(e);
        app.innerHTML = `<div class="screen no-nav flex flex-col justify-center"><div class="card text-center"><h2 class="text-xl font-medium mb-2">Eroare la pornire</h2><p class="text-sm muted mb-4">${escapeHTML(e.message || e)}</p><button class="btn btn-gold btn-full" onclick="location.reload()">Reîncarcă</button></div></div>`;
      }
    }

    start();
  </script>
</body>
</html>
