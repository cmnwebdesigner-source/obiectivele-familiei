<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Obiectivele Familiei</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#4f46e5' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }
        
        /* Fix for bottom nav safe area on modern phones */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 antialiased min-h-screen transition-colors duration-300">

    <!-- Install App Banner (Hidden by default) -->
    <div id="installBanner" class="hidden fixed top-0 w-full z-50 bg-indigo-600 text-white px-4 py-3 shadow-lg flex justify-between items-center fade-in">
        <div class="flex items-center gap-3">
            <i class="fas fa-arrow-down rounded-lg bg-white/20 p-2"></i>
            <span class="text-sm font-medium" id="installText">Instalează aplicația pe ecran!</span>
        </div>
        <div class="flex gap-2">
            <button id="installBtn" class="px-3 py-1 bg-white text-indigo-600 rounded-lg text-sm font-bold shadow-sm hidden">Instalează</button>
            <button onclick="document.getElementById('installBanner').classList.add('hidden')" class="px-2 py-1 text-white/80 hover:text-white"><i class="fas fa-times"></i></button>
        </div>
    </div>

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative pb-20 shadow-2xl bg-slate-50 dark:bg-slate-900">
        <!-- Content will be injected here -->
    </div>

    <!-- Modals Container -->
    <div id="modalContainer"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // 1. Supabase Init
        const supabaseUrl = 'https://pvbxctpfkcwsuqdntppe.supabase.co';
        const supabaseKey = 'sb_publishable_jgZtvZVXSCplbeju-njPIQ_IkjerrGi';
        const supabase = createClient(supabaseUrl, supabaseKey);

        // State
        let currentUser = null;
        let goals = [];
        let transactions = [];
        let currentTab = 'home';
        let selectedDate = new Date().toISOString().split('T')[0];
        let realTimeSubscription = null;
        let deferredPrompt = null;

        const appContainer = document.getElementById('app');

        // Theme Initialization
        const initTheme = () => {
            const savedTheme = localStorage.getItem('appTheme') || 'light';
            if (savedTheme === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
        };
        initTheme();

        // PWA Install Logic
        const initPWA = () => {
            const isIos = () => /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
            const isInStandaloneMode = () => ('standalone' in window.navigator) && (window.navigator.standalone);

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredPrompt = e;
                const banner = document.getElementById('installBanner');
                const btn = document.getElementById('installBtn');
                banner.classList.remove('hidden');
                btn.classList.remove('hidden');
                
                btn.addEventListener('click', async () => {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') banner.classList.add('hidden');
                    deferredPrompt = null;
                });
            });

            if (isIos() && !isInStandaloneMode()) {
                const banner = document.getElementById('installBanner');
                document.getElementById('installText').innerHTML = "Apasă <i class='fas fa-share-square mx-1'></i> și <b>Add to Home Screen</b>";
                banner.classList.remove('hidden');
            }
        };
        initPWA();

        // Auth Logic
        const checkAuth = async () => {
            appContainer.innerHTML = `<div class="flex h-screen items-center justify-center"><i class="fas fa-spinner fa-spin text-4xl text-indigo-500"></i></div>`;
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                fetchData().then(() => setupRealtime());
            } else {
                renderAuth();
            }

            supabase.auth.onAuthStateChange((_event, session) => {
                if (session && !currentUser) {
                    currentUser = session.user;
                    fetchData().then(() => setupRealtime());
                } else if (!session && currentUser) {
                    currentUser = null;
                    renderAuth();
                }
            });
        };

        const fetchData = async () => {
            if (!currentUser) return;
            try {
                const { data: goalsData } = await supabase.from('goals').select('*').order('created_at', { ascending: false });
                if (goalsData) goals = goalsData;

                const { data: transData } = await supabase.from('transactions').select('*').order('timestamp', { ascending: false });
                if (transData) transactions = transData;

                renderMain();
            } catch (error) {
                console.error(error);
            }
        };

        const setupRealtime = () => {
            if (realTimeSubscription) supabase.removeChannel(realTimeSubscription);
            realTimeSubscription = supabase.channel('public-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'goals' }, fetchData)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'transactions' }, fetchData)
                .subscribe();
        };

        // UI Renders
        const renderAuth = (isLogin = true) => {
            appContainer.innerHTML = `
                <div class="flex-1 flex flex-col justify-center px-6 py-12 fade-in min-h-screen bg-white dark:bg-slate-900">
                    <div class="text-center mb-10">
                        <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 rounded-full mb-4 shadow-sm">
                            <i class="fas fa-heart text-3xl"></i>
                        </div>
                        <h1 class="text-3xl font-bold text-slate-800 dark:text-white">Obiective Familiei</h1>
                        <p class="text-slate-500 dark:text-slate-400 mt-2">${isLogin ? 'Autentificare cont' : 'Creare cont nou'}</p>
                    </div>

                    <div class="space-y-4 w-full">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email (Fațadă)</label>
                            <input type="email" id="emailInput" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white" placeholder="tu@familie.ro">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Parolă</label>
                            <input type="password" id="passInput" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white" placeholder="••••••••">
                        </div>
                        
                        <button id="authBtn" onclick="window.appActions.handleAuth(${isLogin})" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-all shadow-md mt-4">
                            ${isLogin ? 'Conectare' : 'Creează Cont'}
                        </button>
                    </div>

                    <div class="mt-6 text-center">
                        <button onclick="window.appActions.toggleAuthMode(${!isLogin})" class="text-indigo-600 dark:text-indigo-400 font-medium hover:underline text-sm">
                            ${isLogin ? 'Nu ai cont? Creează unul acum.' : 'Ai deja cont? Conectează-te.'}
                        </button>
                    </div>
                </div>
            `;
        };

        const renderMain = () => {
            let content = '';
            if (currentTab === 'home') content = getHomeHTML();
            else if (currentTab === 'profile') content = getProfileHTML();

            appContainer.innerHTML = `
                <div class="flex-1 overflow-y-auto hide-scroll pb-24 p-4 md:p-6 fade-in h-full">
                    ${content}
                </div>
                ${getBottomNavHTML()}
            `;
        };

        const getHomeHTML = () => {
            const myGoals = goals.filter(g => g.owner === currentUser.email);
            const partnerGoals = goals.filter(g => g.owner !== currentUser.email);
            const todaysTransactions = transactions.filter(t => t.date === selectedDate);
            const totalAddedToday = todaysTransactions.reduce((sum, t) => sum + Number(t.amount), 0);

            return `
                <!-- Header -->
                <header class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="font-bold text-slate-800 dark:text-white text-2xl">Salutare! 👋</h2>
                        <p class="text-sm text-slate-500 dark:text-slate-400">Situația obiectivelor voastre</p>
                    </div>
                    ${getAvatarHtml(12)}
                </header>

                <div class="space-y-6">
                    <!-- My Goals -->
                    <section class="bg-white dark:bg-slate-800 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-700">
                        <h3 class="font-bold text-lg text-slate-800 dark:text-white mb-4 border-b border-slate-100 dark:border-slate-700 pb-2">Obiectivele Mele</h3>
                        <div class="space-y-4">
                            ${myGoals.length === 0 ? `<p class="text-center text-sm text-slate-400 py-4">Niciun obiectiv adăugat.</p>` : myGoals.map(g => generateGoalCard(g, true)).join('')}
                        </div>
                    </section>

                    <!-- Partner's Goals -->
                    <section class="bg-indigo-50 dark:bg-indigo-900/20 rounded-2xl p-5 shadow-sm border border-indigo-100 dark:border-indigo-500/30">
                        <h3 class="font-bold text-lg text-indigo-900 dark:text-indigo-300 mb-4 border-b border-indigo-100 dark:border-indigo-500/30 pb-2">Obiectivele Partenerului</h3>
                        <div class="space-y-4">
                            ${partnerGoals.length === 0 ? `<p class="text-center text-sm text-indigo-400 py-4">Partenerul nu are obiective.</p>` : partnerGoals.map(g => generateGoalCard(g, false, 'indigo')).join('')}
                        </div>
                    </section>

                    <!-- Calendar -->
                    <section class="bg-white dark:bg-slate-800 rounded-2xl p-5 shadow-sm border border-slate-100 dark:border-slate-700">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-lg text-slate-800 dark:text-white"><i class="far fa-calendar-alt text-indigo-500 mr-2"></i>Istoric</h3>
                            <input type="date" value="${selectedDate}" onchange="window.appActions.changeDate(this.value)" class="bg-slate-100 dark:bg-slate-700 border-none text-slate-700 dark:text-white rounded-lg px-2 py-1 text-sm outline-none">
                        </div>
                        
                        <div class="bg-green-50 dark:bg-green-900/20 rounded-xl p-3 mb-4 flex justify-between items-center">
                            <span class="text-sm font-medium text-green-700 dark:text-green-400">Total azi:</span>
                            <span class="font-bold text-lg text-green-600 dark:text-green-400">+${totalAddedToday} RON</span>
                        </div>

                        <div class="space-y-3">
                            ${todaysTransactions.length === 0 ? `<p class="text-center py-2 text-slate-400 text-sm">Nicio contribuție azi.</p>` : todaysTransactions.map(t => {
                                const fromMe = t.from_role === currentUser.email;
                                const giver = fromMe ? 'Tu' : 'Partenerul';
                                return `
                                <div class="flex justify-between items-center p-3 bg-slate-50 dark:bg-slate-700/50 rounded-xl">
                                    <div>
                                        <p class="font-medium text-slate-700 dark:text-slate-200 text-sm">${giver} a pus la <span class="font-bold">"${t.goal_title}"</span></p>
                                        <p class="text-xs text-slate-400">${new Date(t.timestamp).toLocaleTimeString('ro-RO', {hour: '2-digit', minute:'2-digit'})}</p>
                                    </div>
                                    <span class="font-bold text-green-500 text-sm">+${t.amount}</span>
                                </div>`
                            }).join('')}
                        </div>
                    </section>
                </div>
            `;
        };

        const getProfileHTML = () => {
            const isDark = document.documentElement.classList.contains('dark');
            return `
                <div class="fade-in max-w-sm mx-auto mt-4">
                    <h2 class="font-bold text-2xl text-slate-800 dark:text-white mb-6 text-center">Setări Profil</h2>
                    
                    <!-- Avatar & Info -->
                    <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 flex flex-col items-center mb-6 relative">
                        <label class="cursor-pointer relative group">
                            ${getAvatarHtml(24)}
                            <div class="absolute inset-0 bg-black/40 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                                <i class="fas fa-camera text-white"></i>
                            </div>
                            <input type="file" accept="image/*" class="hidden" onchange="window.appActions.uploadAvatar(event)">
                        </label>
                        <h3 class="mt-4 font-bold text-lg dark:text-white">Contul Tău</h3>
                        <p class="text-sm text-slate-500 dark:text-slate-400">${currentUser.email}</p>
                    </div>

                    <!-- Settings -->
                    <div class="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 overflow-hidden mb-6">
                        <div class="flex items-center justify-between p-4 border-b border-slate-100 dark:border-slate-700">
                            <div class="flex items-center gap-3 text-slate-700 dark:text-slate-200">
                                <div class="w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-700 flex items-center justify-center"><i class="fas fa-moon"></i></div>
                                <span class="font-medium">Mod Întunecat</span>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" onchange="window.appActions.toggleTheme()" class="sr-only peer" ${isDark ? 'checked' : ''}>
                                <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer dark:bg-slate-700 peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all dark:border-gray-600 peer-checked:bg-indigo-600"></div>
                            </label>
                        </div>
                        <div class="p-4 text-sm text-slate-500 dark:text-slate-400 bg-slate-50 dark:bg-slate-800/50">
                            <p class="font-semibold mb-1 text-slate-700 dark:text-slate-300"><i class="fas fa-info-circle mr-1"></i> Despre Aplicație</p>
                            <p>Obiectivele Familiei v1.0. Datele se sincronizează automat în timp real prin Supabase. Aplicația poate fi instalată pe ecranul principal pentru acces rapid.</p>
                        </div>
                    </div>

                    <button onclick="window.appActions.logout()" class="w-full bg-red-50 dark:bg-red-900/20 text-red-600 dark:text-red-400 font-bold py-4 rounded-2xl transition-colors flex items-center justify-center gap-2">
                        <i class="fas fa-sign-out-alt"></i> Deconectare
                    </button>
                </div>
            `;
        };

        const getBottomNavHTML = () => {
            const isHome = currentTab === 'home';
            const isProfile = currentTab === 'profile';
            
            return `
                <nav class="fixed bottom-0 w-full max-w-md mx-auto bg-white dark:bg-slate-800 border-t border-slate-200 dark:border-slate-700 flex justify-around items-center h-16 pb-safe z-40 rounded-t-2xl shadow-[0_-4px_20px_rgba(0,0,0,0.05)]">
                    <button onclick="window.appActions.switchTab('home')" class="flex flex-col items-center justify-center w-20 h-full ${isHome ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-300'} transition-colors">
                        <i class="fas fa-home text-xl mb-1"></i>
                        <span class="text-[10px] font-semibold">Acasă</span>
                    </button>
                    
                    <div class="relative -top-6">
                        <button onclick="window.appActions.openAddGoalModal()" class="w-14 h-14 bg-indigo-600 hover:bg-indigo-700 text-white rounded-full flex items-center justify-center text-2xl shadow-lg shadow-indigo-200 dark:shadow-none transition-transform hover:scale-105">
                            <i class="fas fa-plus"></i>
                        </button>
                    </div>

                    <button onclick="window.appActions.switchTab('profile')" class="flex flex-col items-center justify-center w-20 h-full ${isProfile ? 'text-indigo-600 dark:text-indigo-400' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-300'} transition-colors">
                        <i class="fas fa-user text-xl mb-1"></i>
                        <span class="text-[10px] font-semibold">Profil</span>
                    </button>
                </nav>
            `;
        };

        const getAvatarHtml = (sizeStr) => {
            const avatarBase64 = localStorage.getItem('userAvatar');
            if (avatarBase64) {
                return `<img src="${avatarBase64}" class="w-${sizeStr} h-${sizeStr} rounded-full object-cover border-2 border-slate-200 dark:border-slate-600 shadow-sm" alt="Avatar">`;
            }
            return `
                <div class="w-${sizeStr} h-${sizeStr} rounded-full bg-gradient-to-tr from-indigo-500 to-purple-500 text-white flex items-center justify-center text-${sizeStr > 16 ? '3xl' : 'lg'} font-bold shadow-sm">
                    ${currentUser.email.charAt(0).toUpperCase()}
                </div>
            `;
        };

        const generateGoalCard = (goal, isMine, accent = 'indigo') => {
            const percent = Math.min(100, Math.round((goal.current / goal.target) * 100));
            const isCompleted = percent >= 100;
            const bgClass = isMine ? 'bg-slate-50 dark:bg-slate-700/50' : 'bg-white dark:bg-slate-800';

            return `
                <div class="${bgClass} border border-slate-200 dark:border-slate-600 rounded-xl p-4 relative overflow-hidden">
                    ${isCompleted ? `<div class="absolute top-0 right-0 bg-green-500 text-white text-[10px] font-bold px-2 py-1 rounded-bl-lg">COMPLET</div>` : ''}
                    
                    <div class="flex justify-between items-start mb-2">
                        <h4 class="font-bold text-slate-800 dark:text-white pr-14 text-sm">${goal.title}</h4>
                        <div class="text-right">
                            <span class="text-sm font-bold text-slate-800 dark:text-white">${goal.current}</span>
                            <span class="text-xs text-slate-500 dark:text-slate-400">/${goal.target}</span>
                        </div>
                    </div>
                    
                    <div class="w-full bg-slate-200 dark:bg-slate-600 rounded-full h-2 mb-3">
                        <div class="bg-${isCompleted ? 'green' : accent}-500 h-2 rounded-full transition-all duration-500" style="width: ${percent}%"></div>
                    </div>
                    
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-medium text-slate-500 dark:text-slate-400">${percent}%</span>
                        ${!isMine && !isCompleted ? `
                            <button onclick="window.appActions.openGiftModal('${goal.id}', '${goal.title}')" class="text-xs bg-${accent}-600 hover:bg-${accent}-700 text-white px-3 py-1.5 rounded-lg shadow-sm font-medium">
                                Oferă
                            </button>
                        ` : ''}
                    </div>
                </div>
            `;
        };

        // Actions & Modals globally available
        window.appActions = {
            toggleAuthMode: (isLogin) => renderAuth(isLogin),
            switchTab: (tab) => { currentTab = tab; renderMain(); },
            changeDate: (date) => { selectedDate = date; renderMain(); },
            closeModal: () => { document.getElementById('modalContainer').innerHTML = ''; },
            
            toggleTheme: () => {
                const html = document.documentElement;
                if (html.classList.contains('dark')) {
                    html.classList.remove('dark');
                    localStorage.setItem('appTheme', 'light');
                } else {
                    html.classList.add('dark');
                    localStorage.setItem('appTheme', 'dark');
                }
            },

            uploadAvatar: (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        localStorage.setItem('userAvatar', e.target.result);
                        renderMain(); // Refresh to show new avatar
                    };
                    reader.readAsDataURL(file);
                }
            },

            handleAuth: async (isLogin) => {
                const email = document.getElementById('emailInput').value.trim();
                const password = document.getElementById('passInput').value;
                const btn = document.getElementById('authBtn');
                
                if (!email || !password) { alert('Completează ambele câmpuri!'); return; }
                
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Se procesează...';
                btn.disabled = true;

                try {
                    let err;
                    if (isLogin) {
                        const { error } = await supabase.auth.signInWithPassword({ email, password });
                        err = error;
                    } else {
                        const { error } = await supabase.auth.signUp({ email, password });
                        err = error;
                    }

                    if (err) throw err;
                    // Auth state change listener will handle the rest
                } catch (error) {
                    alert("Eroare: " + (error.message || "Date incorecte."));
                    btn.innerHTML = isLogin ? 'Conectare' : 'Creează Cont';
                    btn.disabled = false;
                }
            },

            logout: async () => {
                await supabase.auth.signOut();
            },

            openAddGoalModal: () => {
                document.getElementById('modalContainer').innerHTML = `
                    <div class="fixed inset-0 modal-backdrop flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
                        <div class="bg-white dark:bg-slate-800 rounded-t-3xl sm:rounded-3xl shadow-xl w-full max-w-md p-6 fade-in relative transition-colors">
                            <div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-6 sm:hidden"></div>
                            <button onclick="window.appActions.closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 dark:hover:text-white hidden sm:block">
                                <i class="fas fa-times text-xl"></i>
                            </button>
                            <h3 class="text-xl font-bold mb-4 text-slate-800 dark:text-white">Adaugă Obiectiv</h3>
                            
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Titlu (ex. Laptop)</label>
                                    <input type="text" id="goalTitleInput" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Suma necesară (RON)</label>
                                    <input type="number" id="goalTargetInput" min="1" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white">
                                </div>
                                <div class="flex gap-3 pt-2">
                                    <button onclick="window.appActions.closeModal()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold py-3 rounded-xl">Anulează</button>
                                    <button onclick="window.appActions.saveGoal()" id="saveGoalBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-colors">Salvează</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            saveGoal: async () => {
                const title = document.getElementById('goalTitleInput').value.trim();
                const target = parseFloat(document.getElementById('goalTargetInput').value);

                if (!title || isNaN(target) || target <= 0) return alert('Date invalide!');

                const btn = document.getElementById('saveGoalBtn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true;

                await supabase.from('goals').insert([{ title, target, current: 0, owner: currentUser.email }]);
                window.appActions.closeModal();
            },

            openGiftModal: (goalId, goalTitle) => {
                document.getElementById('modalContainer').innerHTML = `
                    <div class="fixed inset-0 modal-backdrop flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
                        <div class="bg-white dark:bg-slate-800 rounded-t-3xl sm:rounded-3xl shadow-xl w-full max-w-md p-6 fade-in relative">
                            <div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-6 sm:hidden"></div>
                            <h3 class="text-xl font-bold mb-1 text-slate-800 dark:text-white">Pune Bani</h3>
                            <p class="text-sm text-slate-500 dark:text-slate-400 mb-5">Pentru "${goalTitle}"</p>
                            
                            <div class="space-y-4">
                                <div class="relative">
                                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 font-medium">RON</span>
                                    <input type="number" id="giftAmountInput" min="1" class="w-full pl-14 pr-4 py-4 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl outline-none text-xl font-bold text-slate-800 dark:text-white" placeholder="0">
                                </div>
                                <div class="flex gap-3 pt-2">
                                    <button onclick="window.appActions.closeModal()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold py-3 rounded-xl">Anulează</button>
                                    <button onclick="window.appActions.sendGift('${goalId}')" id="sendGiftBtn" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition-colors">Trimite</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            sendGift: async (goalId) => {
                const amount = parseFloat(document.getElementById('giftAmountInput').value);
                if (isNaN(amount) || amount <= 0) return alert('Sumă invalidă!');

                const goal = goals.find(g => g.id === goalId);
                if (!goal) return;

                const btn = document.getElementById('sendGiftBtn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true;

                const newAmount = Number(goal.current) + amount;
                await supabase.from('goals').update({ current: newAmount }).eq('id', goalId);
                
                await supabase.from('transactions').insert([{
                    goal_id: goalId, goal_title: goal.title, amount: amount,
                    from_role: currentUser.email, to_role: goal.owner,
                    date: new Date().toISOString().split('T')[0], timestamp: new Date().toISOString()
                }]);

                window.appActions.closeModal();
            }
        };

        // Start App
        checkAuth();

    </script>
</body>
</html>
