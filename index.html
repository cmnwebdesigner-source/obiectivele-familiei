<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Obiectivele Familiei</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#4f46e5' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-backdrop {
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
        }
        
        /* Fix for bottom nav safe area on modern phones */
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }

        .confetti-piece {
            position: fixed;
            width: 8px;
            height: 12px;
            top: -20px;
            pointer-events: none;
            z-index: 9999;
            animation-name: confettiFall;
            animation-timing-function: linear;
            animation-fill-mode: forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
        }

        .soft-render {
            animation: none !important;
        }
        .date-track {
            will-change: transform;
            transition: transform 160ms ease, opacity 160ms ease;
        }
        .date-track.dragging {
            transition: none;
        }
        .no-select {
            user-select: none;
            -webkit-user-select: none;
        }

    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 antialiased min-h-screen transition-colors duration-300">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative pb-20 shadow-2xl bg-slate-50 dark:bg-slate-900">
        <!-- Content will be injected here -->
    </div>

    <!-- Modals Container -->
    <div id="modalContainer"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>

        // Afisare eroare clara daca ceva nu se incarca, in loc de ecran alb
        const showStartupError = (message) => {
            const el = document.getElementById('app');
            if (!el) return;
            el.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6 bg-slate-50 dark:bg-slate-900">
                    <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-sm border border-red-100 dark:border-red-900/40 text-center max-w-sm">
                        <div class="w-14 h-14 rounded-full bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-300 flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-triangle-exclamation text-2xl"></i>
                        </div>
                        <h1 class="text-xl font-black text-slate-800 dark:text-white mb-2">Aplicația nu a pornit</h1>
                        <p class="text-sm text-slate-500 dark:text-slate-300 leading-relaxed">${message}</p>
                        <p class="text-xs text-slate-400 mt-4">Verifică să fie fișierul numit <b>index.html</b> și să fie internet pentru Supabase/Tailwind.</p>
                    </div>
                </div>
            `;
        };
        window.addEventListener('error', (e) => showStartupError('Eroare JavaScript: ' + (e.message || 'necunoscută')));
        window.addEventListener('unhandledrejection', (e) => showStartupError('Eroare aplicație: ' + ((e.reason && e.reason.message) || e.reason || 'necunoscută')));

        // 1. Supabase Init
        if (!window.supabase || !window.supabase.createClient) {
            showStartupError('Supabase nu s-a încărcat. Deschide pagina cu internet activ sau verifică linkul CDN.');
            throw new Error('Supabase CDN missing');
        }
        const supabaseUrl = 'https://hfqsouqtqvyxegcrabnc.supabase.co';
        const supabaseKey = 'sb_publishable_eqlbyUXpwcp-i-dPhFPsmA_wHqDW1AD';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey, {
            auth: {
                persistSession: true,
                autoRefreshToken: true,
                detectSessionInUrl: true
            }
        });

        // State
        let currentUser = null;
        let goals = [];
        let transactions = [];
        let profiles = [];
        let calculatorHistory = [];
        let gameRooms = [];
        let gameWallets = [];
        let activeGameRoomId = null;
        let gameLoopTimer = null;
        let gameCountdownTimer = null;
        let gameSpawnTimer = null;
        let gameScoreSyncTimer = null;
        let localGameScore = 0;
        let localGameMultiplier = 1;
        let localGameSpeedMode = false;
        let currentTab = 'home';
        let selectedDate = new Date().toISOString().split('T')[0];
        let calendarSwipeStartX = 0;
        let calendarSwipeStartY = 0;
        let selectedGoalStatsId = null;
        let previousStatsTab = 'home';
        let softFetchTimer = null;
        let realTimeSubscription = null;
        let deferredPrompt = null;
        window.selectedSignupRole = 'sot'; // Pentru a retine rolul ales la inregistrare

        const appContainer = document.getElementById('app');

        // Theme Initialization
        const initTheme = () => {
            const savedTheme = localStorage.getItem('appTheme') || 'light';
            if (savedTheme === 'dark') document.documentElement.classList.add('dark');
            else document.documentElement.classList.remove('dark');
        };
        initTheme();

        // PWA Install Logic (Fara Banner UI)
        const initPWA = () => {
            window.addEventListener('beforeinstallprompt', (e) => {
                // Previne aparitia prompt-ului automat in unele browsere
                e.preventDefault();
                // Salveaza evenimentul in spate pentru a fi folosit ulterior daca e nevoie
                deferredPrompt = e;
            });
        };
        initPWA();

        // Auth Logic
        const checkAuth = async () => {
            appContainer.innerHTML = `<div class="flex h-screen items-center justify-center"><i class="fas fa-spinner fa-spin text-4xl text-indigo-500"></i></div>`;
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                currentUser = session.user;
                fetchData().then(() => setupRealtime());
            } else {
                renderAuth();
            }

            supabase.auth.onAuthStateChange((_event, session) => {
                if (session && !currentUser) {
                    currentUser = session.user;
                    fetchData().then(() => setupRealtime());
                } else if (!session && currentUser) {
                    currentUser = null;
                    renderAuth();
                }
            });
        };


        const syncMyProfile = async () => {
            if (!currentUser) return;
            try {
                const role = currentUser.user_metadata?.role || 'sot';
                const { data: existing, error: selectError } = await supabase
                    .from('profiles')
                    .select('id,email,role,avatar,created_at')
                    .eq('id', currentUser.id)
                    .maybeSingle();

                if (selectError && selectError.code !== 'PGRST116') {
                    console.warn('Profiles table problem:', selectError.message);
                    return;
                }

                if (!existing) {
                    const localAvatar = localStorage.getItem('userAvatar');
                    await supabase.from('profiles').upsert([{
                        id: currentUser.id,
                        email: currentUser.email,
                        role,
                        avatar: localAvatar || null,
                        created_at: new Date().toISOString()
                    }], { onConflict: 'id' });
                } else if (!existing.email || !existing.role) {
                    await supabase.from('profiles').update({
                        email: existing.email || currentUser.email,
                        role: existing.role || role
                    }).eq('id', currentUser.id);
                }
            } catch (error) {
                console.warn('Profilul nu s-a sincronizat încă:', error.message || error);
            }
        };

        const fetchData = async (options = {}) => {
            if (!currentUser) return;
            const silent = Boolean(options.silent);
            try {
                await syncMyProfile();

                const { data: profilesData, error: profilesError } = await supabase
                    .from('profiles')
                    .select('*')
                    .order('created_at', { ascending: true });
                if (profilesError) console.warn('Profiles indisponibil:', profilesError.message);
                else if (profilesData) profiles = profilesData;

                const { data: goalsData } = await supabase.from('goals').select('*').order('created_at', { ascending: false });
                if (goalsData) goals = goalsData;

                const { data: transData } = await supabase.from('transactions').select('*').order('timestamp', { ascending: false });
                if (transData) transactions = transData;

                const { data: calcData, error: calcError } = await supabase
                    .from('calculator_history')
                    .select('*')
                    .eq('user_email', currentUser.email)
                    .order('created_at', { ascending: false })
                    .limit(30);
                if (calcError) {
                    console.warn('Calculator history indisponibil:', calcError.message);
                    calculatorHistory = getLocalCalcHistory();
                } else if (calcData) {
                    calculatorHistory = calcData;
                }

                const { data: walletData, error: walletError } = await supabase
                    .from('game_wallets')
                    .select('*')
                    .order('updated_at', { ascending: false });
                if (walletError) console.warn('Game wallets indisponibil:', walletError.message);
                else if (walletData) gameWallets = walletData;

                const { data: roomsData, error: roomsError } = await supabase
                    .from('game_rooms')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(25);
                if (roomsError) console.warn('Game rooms indisponibil:', roomsError.message);
                else if (roomsData) gameRooms = roomsData;

                const activeRoom = activeGameRoomId ? getGameRoomById(activeGameRoomId) : null;
                const gameAreaExists = Boolean(document.getElementById('gameArea'));
                if (silent && currentTab === 'gamePlay' && activeRoom?.status === 'playing' && gameAreaExists) {
                    updateGameHudFromRoom(activeRoom);
                    return;
                }

                renderMain(silent);
            } catch (error) {
                console.error(error);
            }
        };

        const scheduleFetchData = (delay = 220) => {
            clearTimeout(softFetchTimer);
            softFetchTimer = setTimeout(() => fetchData({ silent: true }), delay);
        };

        const setupRealtime = () => {
            if (realTimeSubscription) supabase.removeChannel(realTimeSubscription);
            realTimeSubscription = supabase.channel('public-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'goals' }, () => scheduleFetchData())
                .on('postgres_changes', { event: '*', schema: 'public', table: 'transactions' }, () => scheduleFetchData())
                .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, () => scheduleFetchData())
                .on('postgres_changes', { event: '*', schema: 'public', table: 'calculator_history' }, () => scheduleFetchData())
                .on('postgres_changes', { event: '*', schema: 'public', table: 'game_rooms' }, () => scheduleFetchData(120))
                .on('postgres_changes', { event: '*', schema: 'public', table: 'game_wallets' }, () => scheduleFetchData(120))
                .on('postgres_changes', { event: '*', schema: 'public', table: 'game_transactions' }, () => scheduleFetchData(160))
                .subscribe();
        };

        // UI Renders
        const renderAuth = (isLogin = true) => {
            const roleSelector = isLogin ? '' : `
                <div class="mb-4 fade-in">
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Alege Profilul:</label>
                    <div class="flex gap-3">
                        <button type="button" id="btnRoleSot" onclick="window.appActions.selectRole('sot')" class="flex-1 py-3 rounded-xl font-bold border-2 transition-all border-indigo-500 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400">Soțul</button>
                        <button type="button" id="btnRoleSotie" onclick="window.appActions.selectRole('sotie')" class="flex-1 py-3 rounded-xl font-bold border-2 transition-all border-slate-200 dark:border-slate-700 text-slate-500">Soția</button>
                    </div>
                </div>
            `;

            appContainer.innerHTML = `
                <div class="flex-1 flex flex-col justify-center px-6 py-12 fade-in min-h-screen bg-white dark:bg-slate-900">
                    <div class="text-center mb-10">
                        <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 rounded-full mb-4 shadow-sm">
                            <i class="fas fa-heart text-3xl"></i>
                        </div>
                        <h1 class="text-3xl font-bold text-slate-800 dark:text-white">Obiective Familiei</h1>
                        <p class="text-slate-500 dark:text-slate-400 mt-2">${isLogin ? 'Autentificare cont' : 'Creare cont nou'}</p>
                    </div>

                    <div class="space-y-4 w-full">
                        ${roleSelector}
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email</label>
                            <input type="email" id="emailInput" name="email" autocomplete="email" value="${safeText(localStorage.getItem('savedEmail') || '')}" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white" placeholder="tu@familie.ro">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Parolă</label>
                            <input type="password" id="passInput" name="password" autocomplete="${isLogin ? 'current-password' : 'new-password'}" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white" placeholder="••••••••">
                        </div>
                        <label class="flex items-center gap-2 text-xs text-slate-500 dark:text-slate-400 bg-slate-50 dark:bg-slate-800/60 border border-slate-100 dark:border-slate-700 rounded-xl px-3 py-2">
                            <input type="checkbox" id="rememberPassInput" checked class="rounded text-indigo-600 focus:ring-indigo-500">
                            <span>Salvează parola pentru o conectare mai rapidă</span>
                        </label>
                        
                        <button id="authBtn" onclick="window.appActions.handleAuth(${isLogin})" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-all shadow-md mt-4">
                            ${isLogin ? 'Conectare' : 'Creează Cont'}
                        </button>
                    </div>

                    <div class="mt-6 text-center">
                        <button onclick="window.appActions.toggleAuthMode(${!isLogin})" class="text-indigo-600 dark:text-indigo-400 font-medium hover:underline text-sm">
                            ${isLogin ? 'Nu ai cont? Creează unul acum.' : 'Ai deja cont? Conectează-te.'}
                        </button>
                    </div>
                </div>
            `;
        };

        const renderMain = (soft = false) => {
            const scrollWrap = appContainer.querySelector('.app-scroll');
            const savedScrollTop = scrollWrap ? scrollWrap.scrollTop : 0;

            let content = '';
            if (currentTab === 'home') content = getHomeHTML();
            else if (currentTab === 'profile') content = getProfileHTML();
            else if (currentTab === 'partner') content = getPartnerProfileHTML();
            else if (currentTab === 'calculator') content = getCalculatorPageHTML();
            else if (currentTab === 'games') content = getGamesHTML();
            else if (currentTab === 'gamePlay') content = getGamePlayHTML();
            else if (currentTab === 'goalStats') content = getGoalStatsPageHTML();

            const isFullPage = currentTab === 'calculator' || currentTab === 'goalStats' || currentTab === 'gamePlay';
            appContainer.innerHTML = `
                <div class="app-scroll flex-1 overflow-y-auto hide-scroll ${isFullPage ? 'pb-6' : 'pb-24'} p-4 md:p-6 ${soft ? 'soft-render' : 'fade-in'} h-full">
                    ${content}
                </div>
                ${isFullPage ? '' : getBottomNavHTML()}
            `;

            if (soft) {
                requestAnimationFrame(() => {
                    const nextScrollWrap = appContainer.querySelector('.app-scroll');
                    if (nextScrollWrap) nextScrollWrap.scrollTop = savedScrollTop;
                });
            }
            if (currentTab === 'gamePlay') setTimeout(() => startGamePageRuntime(), 60);
            else stopGameRuntime();
        };

        const getHomeHTML = () => {
            const myGoals = goals.filter(g => g.owner === currentUser.email);
            const partnerGoals = goals.filter(g => g.owner !== currentUser.email);
            const todaysTransactions = transactions.filter(t => t.date === selectedDate);
            const totalAddedToday = todaysTransactions.reduce((sum, t) => sum + Number(t.amount), 0);
            const totalTodayLabel = totalAddedToday >= 0 ? `+${totalAddedToday}` : `${totalAddedToday}`;

            // Calculare statistici cadouri - fara banii pusi/scoși la propriile obiective
            const totalOferit = transactions.filter(t => t.from_role === currentUser.email && t.to_role !== currentUser.email && Number(t.amount) > 0).reduce((sum, t) => sum + Number(t.amount), 0);
            const totalPrimit = transactions.filter(t => t.to_role === currentUser.email && t.from_role !== currentUser.email && Number(t.amount) > 0).reduce((sum, t) => sum + Number(t.amount), 0);

            const myRole = currentUser.user_metadata?.role || getMyProfile()?.role || 'sot';
            const partnerRoleName = myRole === 'sot' ? 'Soției' : 'Soțului';
            const myRoleName = myRole === 'sot' ? 'Soțul' : 'Soția';
            const partnerAccent = myRole === 'sot' ? 'red' : 'indigo';
            const myAccent = myRole === 'sot' ? 'indigo' : 'red';

            return `
                <header class="flex justify-between items-center mb-6">
                    <div>
                        <h2 class="font-bold text-slate-800 dark:text-white text-2xl">Salut, ${myRoleName}!</h2>
                        <p class="text-sm text-slate-500 dark:text-slate-400">Situația obiectivelor voastre</p>
                    </div>
                    <div class="flex items-center gap-3">
                        <button onclick="window.appActions.switchTab('calculator')" class="w-12 h-12 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-indigo-600 dark:text-indigo-400 flex items-center justify-center shadow-sm active:scale-95 transition-transform" aria-label="Calculator">
                            <i class="fas fa-calculator text-xl"></i>
                        </button>
                        ${getAvatarHtml(12)}
                    </div>
                </header>

                <!-- Stats Row -->
                <div class="grid grid-cols-2 gap-4 mb-7">
                    <div class="bg-slate-100 dark:bg-slate-800/80 p-4 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col justify-center">
                        <p class="text-xs text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wider mb-1"><i class="fas fa-arrow-up text-indigo-500 mr-1"></i>Ai Oferit</p>
                        <p class="text-2xl font-black text-slate-800 dark:text-white">${totalOferit} <span class="text-sm font-medium text-slate-500">RON</span></p>
                    </div>
                    <div class="bg-slate-100 dark:bg-slate-800/80 p-4 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm flex flex-col justify-center">
                        <p class="text-xs text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wider mb-1"><i class="fas fa-arrow-down text-red-500 mr-1"></i>Ai Primit</p>
                        <p class="text-2xl font-black text-slate-800 dark:text-white">${totalPrimit} <span class="text-sm font-medium text-slate-500">RON</span></p>
                    </div>
                </div>

                <div class="space-y-7">
                    <section>
                        <div class="flex items-center justify-between border-b-2 border-${myAccent}-200 dark:border-${myAccent}-500/40 pb-2 mb-3">
                            <h3 class="font-bold text-xl text-slate-800 dark:text-white">Obiectivele Mele</h3>
                        </div>
                        <div class="space-y-3">
                            ${myGoals.length === 0 ? `<p class="text-center text-sm text-slate-400 py-4 bg-white dark:bg-slate-800 rounded-2xl border border-slate-100 dark:border-slate-700">Niciun obiectiv adăugat.</p>` : myGoals.map(g => generateGoalCard(g, true, myAccent)).join('')}
                        </div>
                    </section>

                    <section>
                        <div onclick="window.appActions.switchTab('partner')" class="flex justify-between items-center border-b-2 border-${partnerAccent}-200 dark:border-${partnerAccent}-500/40 pb-2 mb-3 cursor-pointer group">
                            <h3 class="font-bold text-xl text-${partnerAccent}-900 dark:text-${partnerAccent}-300">Obiectivele ${partnerRoleName}</h3>
                            <span class="text-sm font-bold text-${partnerAccent}-600 dark:text-${partnerAccent}-400 group-hover:underline flex items-center gap-1">Vezi Profil <i class="fas fa-chevron-right text-[10px]"></i></span>
                        </div>
                        <div class="space-y-3">
                            ${partnerGoals.length === 0 ? `<p class="text-center text-sm text-${partnerAccent}-400 py-4 bg-white dark:bg-slate-800 rounded-2xl border border-${partnerAccent}-100 dark:border-${partnerAccent}-500/30">Partenerul nu are obiective.</p>` : partnerGoals.slice(0, 2).map(g => generateGoalCard(g, false, partnerAccent)).join('')}
                            ${partnerGoals.length > 2 ? `<button onclick="window.appActions.switchTab('partner')" class="w-full text-center text-sm font-medium text-${partnerAccent}-600 dark:text-${partnerAccent}-400 py-2 bg-${partnerAccent}-50 dark:bg-${partnerAccent}-900/20 rounded-xl mt-2">Vezi toate cele ${partnerGoals.length} obiective</button>` : ''}
                        </div>
                    </section>

                    <!-- Istoric lejer -->
                    <section>
                        <div class="flex justify-between items-center border-b border-slate-200 dark:border-slate-700 pb-2 mb-3">
                            <h3 class="font-bold text-lg text-slate-800 dark:text-white"><i class="far fa-calendar-alt text-indigo-500 mr-2"></i>Istoric rapid</h3>
                            <button onclick="window.appActions.changeDate(window.getTodayString())" class="text-xs font-bold text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-900/30 px-3 py-1.5 rounded-full">Azi</button>
                        </div>

                        <div id="historyCalendar" class="bg-white dark:bg-slate-800 rounded-3xl border border-slate-100 dark:border-slate-700 p-3 mb-3 shadow-sm overflow-hidden no-select touch-pan-y" ontouchstart="window.appActions.dateSwipeStart(event)" ontouchmove="window.appActions.dateSwipeMove(event)" ontouchend="window.appActions.dateSwipeEnd(event)" onmousedown="window.appActions.dateSwipeStart(event)" onmousemove="window.appActions.dateSwipeMove(event)" onmouseup="window.appActions.dateSwipeEnd(event)" onmouseleave="window.appActions.dateSwipeCancel()">
                            <div class="flex items-center justify-between mb-3">
                                <button onclick="window.appActions.shiftDate(-1)" class="w-9 h-9 rounded-full bg-slate-50 dark:bg-slate-700 text-slate-600 dark:text-slate-200 flex items-center justify-center active:scale-95"><i class="fas fa-chevron-left text-xs"></i></button>
                                <div class="text-center">
                                    <p class="text-xs uppercase tracking-wide text-slate-400 font-bold">Istoric</p>
                                    <p class="text-sm font-black text-slate-800 dark:text-white">${formatDisplayDate(selectedDate)}</p>
                                </div>
                                <button onclick="window.appActions.shiftDate(1)" class="w-9 h-9 rounded-full bg-slate-50 dark:bg-slate-700 text-slate-600 dark:text-slate-200 flex items-center justify-center active:scale-95"><i class="fas fa-chevron-right text-xs"></i></button>
                            </div>
                            <div id="dateTrack" class="date-track grid grid-cols-7 gap-1.5 mb-3">
                                ${getDateChipsHTML(selectedDate)}
                            </div>
                            <div class="flex justify-between items-center bg-slate-50 dark:bg-slate-700/50 rounded-2xl px-3 py-2">
                                <span class="text-sm font-medium text-slate-500 dark:text-slate-300">Toată ziua</span>

            const [year, month, day] = String(value || '').split('-').map(Number);
            if (!year || !month || !day) return new Date();
            return new Date(year, month - 1, day);
        };

        const toAppDateString = (date) => {
            const y = date.getFullYear();
            const m = String(date.getMonth() + 1).padStart(2, '0');
            const d = String(date.getDate()).padStart(2, '0');
            return `${y}-${m}-${d}`;
        };

        window.getTodayString = getTodayString;

            const date = parseAppDate(dateString);
            date.setDate(date.getDate() + days);
            return toAppDateString(date);
        };

        const formatDisplayDate = (dateString) => {
            const date = parseAppDate(dateString);
            return date.toLocaleDateString('ro-RO', { weekday: 'short', day: '2-digit', month: 'short' }).replace('.', '');
        };

        const getDateChipsHTML = (dateString) => {
            const base = parseAppDate(dateString);

                const active = value === dateString;
                const day = date.toLocaleDateString('ro-RO', { weekday: 'short' }).replace('.', '').slice(0, 3);

            if (currentUser && email === currentUser.email) return 'Tu';

            if (profile?.role === 'sot') return 'Soțul';
            return 'Partenerul';

            try {
                return JSON.parse(localStorage.getItem('calculatorHistory') || '[]');

                return [];
            }

            localStorage.setItem('calculatorHistory', JSON.stringify(items.slice(0, 30)));
        };

        const getCalcResultValue = () => {
            const input = document.getElementById('calcInput');
            const result = document.getElementById('calcResult');
            if (!input || !result) return null;
            const expression = input.value.replaceAll(',', '.').trim();
            if (!expression) { result.textContent = ''; return null; }
            if (!/^[0-9+\-*/().\s]+$/.test(expression)) {
                result.textContent = 'Scrie doar cifre și semne + - * /';
                return null;
            }
            try {
                const value = Function(`"use strict"; return (${expression})`)();
                if (!Number.isFinite(value)) throw new Error('Rezultat invalid');
                const finalValue = Number(value.toFixed(2)).toString();
                result.textContent = '= ' + finalValue;
                return { expression, result: finalValue };
            } catch (error) {
                result.textContent = 'Calcul invalid';
                return null;

            const roleValue = role || profile?.role || (email === currentUser?.email ? (currentUser.user_metadata?.role || 'sot') : '');

        const resizeImageToDataUrl = (file, maxSize = 520, quality = 0.82) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let { width, height } = img;
                    if (width > height && width > maxSize) {
                        height = Math.round(height * maxSize / width);
                        width = maxSize;
                    } else if (height >= width && height > maxSize) {
                        width = Math.round(width * maxSize / height);
                        height = maxSize;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.onerror = reject;
                img.src = reader.result;
            };
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });

            const type = types[Math.floor(Math.random() * types.length)];
            const item = document.createElement('button');
            item.type = 'button';
            item.className = 'absolute rounded-full shadow-lg flex items-center justify-center font-black active:scale-90 transition-transform';
            const size = type === 'bomb' ? 58 : 54;
            const maxX = Math.max(0, area.clientWidth - size - 16);
            item.style.width = size + 'px';
            item.style.height = size + 'px';
            item.style.left = (8 + Math.random() * maxX) + 'px';
            item.style.top = '-70px';
            item.style.zIndex = '5';
            let duration = localGameSpeedMode ? 1400 : 2300;
            let label = '💵';
            let bg = 'background:#22c55e;color:white;';
            if (type === 'trap') { label = '⚠️'; bg = 'background:#f59e0b;color:white;'; }
            if (type === 'bomb') { label = '💣'; bg = 'background:#111827;color:white;'; }
            if (type === 'lightning') { label = '⚡'; bg = 'background:#facc15;color:#111827;'; }
            if (type === 'x2') { label = 'X2'; bg = 'background:#8b5cf6;color:white;'; }
            item.style.cssText += bg;
            item.innerHTML = `<span style="font-size:${type === 'x2' ? '17px' : '24px'}">${label}</span>`;
            area.appendChild(item);
            const start = performance.now();
            let removed = false;
            const animate = (now) => {
                if (removed) return;
                const progress = Math.min(1, (now - start) / duration);
                item.style.top = (-70 + progress * (area.clientHeight + 100)) + 'px';
                if (progress >= 1) { removed = true; item.remove(); return; }
                requestAnimationFrame(animate);
            };
            requestAnimationFrame(animate);
            item.addEventListener('click', async (e) => {
                e.preventDefault();

            withdrawGameWalletToGoal: async () => {
                const balance = getGameBalance();

                const amount = parseFloat(document.getElementById('withdrawAmountInput')?.value || '0');
                const goal = goals.find(g => String(g.id) === String(goalId));
                if (!goal) return alert('Alege un obiectiv valid.');
                if (isNaN(amount) || amount <= 0) return alert('Sumă invalidă.');
                if (amount > balance) return alert('Nu ai atât în Sold Jocuri.');
                const btn = document.getElementById('withdrawGameBtn');
                if (btn) { btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true; }
                const newGoalAmount = Number(goal.current || 0) + amount;
                const { error: walletError } = await supabase.rpc('add_game_wallet_balance', { p_user_email: currentUser.email, p_amount: -amount });
                if (walletError) {
                    alert('Eroare sold jocuri: ' + walletError.message);
                    if (btn) { btn.innerHTML = 'Retrage'; btn.disabled = false; }
                    return;
                }
                const { error: goalError } = await supabase.from('goals').update({ current: newGoalAmount }).eq('id', goal.id);
                if (goalError) alert('Soldul s-a retras, dar obiectivul nu s-a actualizat: ' + goalError.message);
                else {
                    await supabase.from('transactions').insert([{
                        goal_id: goal.id,
                        goal_title: goal.title,
                        amount,
                        from_role: currentUser.email,
                        to_role: currentUser.email,
                        date: new Date().toISOString().split('T')[0],
                        timestamp: new Date().toISOString()
                    }]);
                    await supabase.from('game_transactions').insert([{
                        user_email: currentUser.email,
                        amount: -amount,
                        type: 'withdraw_to_goal',
                        note: 'Retras la obiectiv: ' + goal.title
                    }]);
                }
                goals = goals.map(g => String(g.id) === String(goal.id) ? { ...g, current: newGoalAmount } : g);
                gameWallets = gameWallets.map(w => w.user_email === currentUser.email ? { ...w, balance: Number(w.balance || 0) - amount } : w);
                if (!gameWallets.find(w => w.user_email === currentUser.email)) gameWallets.push({ user_email: currentUser.email, balance: balance - amount });
                window.appActions.closeModal();
                renderMain(true);
                scheduleFetchData(300);

            handleAuth: async (isLogin) => {
                const email = document.getElementById('emailInput').value.trim();
                const password = document.getElementById('passInput').value;
                const btn = document.getElementById('authBtn');
                const remember = document.getElementById('rememberPassInput')?.checked;
                
                if (!email || !password) { alert('Completează ambele câmpuri!'); return; }
                if (!isLogin && password.length < 6) { alert('Parola trebuie să aibă minim 6 caractere.'); return; }
                
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Se procesează...';
                btn.disabled = true;

                try {
                    if (remember) localStorage.setItem('savedEmail', email);
                    else localStorage.removeItem('savedEmail');

                    let data;
                    let error;
                    if (isLogin) {
                        ({ data, error } = await supabase.auth.signInWithPassword({ email, password }));
                    } else {
                        ({ data, error } = await supabase.auth.signUp({ 
                            email, 
                            password,
                            options: {

                                }

                        }));

                    if (error) throw error;

                    if (data?.session?.user) {
                        currentUser = data.session.user;
                        await fetchData({ silent: true });
                        setupRealtime();
                        return;
                    }

                    if (!isLogin) {
                        alert('Contul a fost creat. Dacă aplicația nu intră automat în cont, dezactivează Confirm email din Supabase sau confirmă emailul, apoi apasă Conectare.');
                        renderAuth(true);
                        return;
                    }

                    btn.innerHTML = isLogin ? 'Conectare' : 'Creează Cont';
                    btn.disabled = false;
                } catch (error) {
                    alert("Eroare: " + (error.message || "Date incorecte."));
                    btn.innerHTML = isLogin ? 'Conectare' : 'Creează Cont';
                    btn.disabled = false;
                }
            },

            logout: async () => {
                await supabase.auth.signOut();
            },

            openAddGoalModal: () => {
                document.getElementById('modalContainer').innerHTML = `
                    <div class="fixed inset-0 modal-backdrop flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
                        <div class="bg-white dark:bg-slate-800 rounded-t-3xl sm:rounded-3xl shadow-xl w-full max-w-md p-6 fade-in relative transition-colors">
                            <div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-6 sm:hidden"></div>
                            <button onclick="window.appActions.closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 dark:hover:text-white hidden sm:block">
                                <i class="fas fa-times text-xl"></i>
                            </button>
                            <h3 class="text-xl font-bold mb-4 text-slate-800 dark:text-white">Adaugă Obiectiv</h3>
                            
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Titlu (ex. Laptop)</label>
                                    <input type="text" id="goalTitleInput" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white">
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Suma necesară (RON)</label>
                                    <input type="number" id="goalTargetInput" min="1" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white">
                                </div>
                                <div class="flex gap-3 pt-2">
                                    <button onclick="window.appActions.closeModal()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold py-3 rounded-xl">Anulează</button>
                                    <button onclick="window.appActions.saveGoal()" id="saveGoalBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-colors">Salvează</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            saveGoal: async () => {
                const title = document.getElementById('goalTitleInput').value.trim();
                const target = parseFloat(document.getElementById('goalTargetInput').value);

                if (!title || isNaN(target) || target <= 0) return alert('Date invalide!');

                const btn = document.getElementById('saveGoalBtn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true;

                const newGoalPayload = { title, target, current: 0, owner: currentUser.email };
                const { data, error } = await supabase.from('goals').insert([newGoalPayload]).select().single();
                
                if (error) {
                    alert("Eroare la adăugare: " + error.message + "\n\n(Dacă e prima dată când folosești aplicația, asigură-te că ai creat tabelele în Supabase din SQL Editor)");
                    btn.innerHTML = 'Salvează';
                    btn.disabled = false;
                    return;
                }

                goals = [data || { ...newGoalPayload, id: crypto.randomUUID?.() || String(Date.now()), created_at: new Date().toISOString() }, ...goals];
                window.appActions.closeModal();
                renderMain(true);
                scheduleFetchData(450);
            },

            openGoalStatsModalOld: (goalId) => {
                const goal = goals.find(g => String(g.id) === String(goalId));
                if (!goal) return;

                const currentValue = Number(goal.current) || 0;
                const targetValue = Number(goal.target) || 0;
                const percent = targetValue > 0 ? Math.min(100, Math.round((currentValue / targetValue) * 100)) : 0;
                const goalTransactions = transactions
                    .filter(t => String(t.goal_id) === String(goalId) || (!t.goal_id && t.goal_title === goal.title))
                    .sort((a, b) => new Date(b.timestamp || b.date) - new Date(a.timestamp || a.date));

                const totalPlus = goalTransactions.filter(t => Number(t.amount) > 0).reduce((sum, t) => sum + Number(t.amount), 0);
                const totalMinus = Math.abs(goalTransactions.filter(t => Number(t.amount) < 0).reduce((sum, t) => sum + Number(t.amount), 0));
                const partnerPlus = goalTransactions.filter(t => t.from_role !== goal.owner && Number(t.amount) > 0).reduce((sum, t) => sum + Number(t.amount), 0);
                const ownPlus = goalTransactions.filter(t => t.from_role === goal.owner && Number(t.amount) > 0).reduce((sum, t) => sum + Number(t.amount), 0);
                const ownerLabel = goal.owner === currentUser.email ? 'Obiectivul tău' : `Obiectiv ${getShortRoleName(goal.owner)}`;

                const grouped = goalTransactions.reduce((acc, t) => {
                    const key = t.date || (t.timestamp ? new Date(t.timestamp).toISOString().split('T')[0] : 'Fără dată');
                    if (!acc[key]) acc[key] = [];
                    acc[key].push(t);
                    return acc;
                }, {});

                const dayRows = Object.keys(grouped).length === 0 ? `
                    <div class="bg-slate-50 dark:bg-slate-700/50 rounded-2xl p-4 text-center text-sm text-slate-400">Încă nu există mișcări pe acest obiectiv.</div>
                ` : Object.keys(grouped).sort((a, b) => b.localeCompare(a)).map(dateKey => {
                    const items = grouped[dateKey];
                    const dayTotal = items.reduce((sum, t) => sum + Number(t.amount), 0);
                    const dayLabel = dateKey === 'Fără dată' ? dateKey : formatDisplayDate(dateKey);
                    const itemRows = items.map(t => {
                        const amount = Number(t.amount);
                        const isMinus = amount < 0;
                        const amountLabel = amount > 0 ? `+${amount}` : `${amount}`;
                        const who = t.from_role === currentUser.email ? 'Tu' : getShortRoleName(t.from_role);
                        const action = isMinus ? 'a scos' : 'a pus';
                        const time = t.timestamp ? new Date(t.timestamp).toLocaleTimeString('ro-RO', {hour:'2-digit', minute:'2-digit'}) : '';
                        return `
                            <div class="flex items-center justify-between gap-3 py-2 border-t border-slate-100 dark:border-slate-700 first:border-t-0">
                                <div class="min-w-0">
                                    <p class="text-xs font-semibold text-slate-700 dark:text-slate-200 truncate">${safeText(who)} ${action}</p>
                                    <p class="text-[11px] text-slate-400">${safeText(time)}</p>
                                </div>
                                <span class="text-sm font-black ${isMinus ? 'text-red-500' : 'text-green-500'} shrink-0">${amountLabel} RON</span>
                            </div>
                        `;
                    }).join('');

                    return `
                        <div class="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-2xl p-3 shadow-sm">
                            <div class="flex justify-between items-center mb-1">
                                <p class="font-bold text-sm text-slate-800 dark:text-white">${safeText(dayLabel)}</p>
                                <p class="font-black text-sm ${dayTotal < 0 ? 'text-red-500' : 'text-green-500'}">${dayTotal > 0 ? '+' + dayTotal : dayTotal} RON</p>
                            </div>
                            ${itemRows}
                        </div>
                    `;
                }).join('');

                document.getElementById('modalContainer').innerHTML = `
                    <div class="fixed inset-0 modal-backdrop flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
                        <div class="bg-slate-50 dark:bg-slate-900 rounded-t-3xl sm:rounded-3xl shadow-xl w-full max-w-md p-5 fade-in relative max-h-[88vh] overflow-y-auto hide-scroll">
                            <div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-4 sm:hidden"></div>
                            <div class="flex items-center justify-between mb-4">
                                <div class="min-w-0 pr-3">
                                    <p class="text-xs uppercase tracking-wide font-bold text-slate-400">${safeText(ownerLabel)}</p>
                                    <h3 class="text-xl font-black text-slate-800 dark:text-white truncate">${safeText(goal.title)}</h3>
                                </div>
                                <button onclick="window.appActions.closeModal()" class="w-10 h-10 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-500 flex items-center justify-center shrink-0">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>

                            <div class="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-3xl p-4 shadow-sm mb-4">
                                <div class="flex justify-between items-end mb-2">
                                    <div>
                                        <p class="text-xs text-slate-400 font-bold uppercase">Progres</p>
                                        <p class="text-2xl font-black text-slate-800 dark:text-white">${currentValue} <span class="text-sm text-slate-400">/ ${targetValue} RON</span></p>
                                    </div>
                                    <span class="font-black text-indigo-600 dark:text-indigo-400">${percent}%</span>
                                </div>
                                <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-2.5">
                                    <div class="bg-indigo-600 h-2.5 rounded-full" style="width:${percent}%"></div>
                                </div>
                            </div>

                            <div class="grid grid-cols-3 gap-2 mb-4">
                                <div class="bg-green-50 dark:bg-green-900/20 rounded-2xl p-3 border border-green-100 dark:border-green-900/40">
                                    <p class="text-[10px] uppercase font-bold text-green-600 dark:text-green-300">Pus total</p>
                                    <p class="font-black text-green-700 dark:text-green-300">${totalPlus}</p>
                                </div>
                                <div class="bg-red-50 dark:bg-red-900/20 rounded-2xl p-3 border border-red-100 dark:border-red-900/40">
                                    <p class="text-[10px] uppercase font-bold text-red-600 dark:text-red-300">Scos</p>
                                    <p class="font-black text-red-700 dark:text-red-300">${totalMinus}</p>
                                </div>
                                <div class="bg-indigo-50 dark:bg-indigo-900/20 rounded-2xl p-3 border border-indigo-100 dark:border-indigo-900/40">
                                    <p class="text-[10px] uppercase font-bold text-indigo-600 dark:text-indigo-300">Partener</p>
                                    <p class="font-black text-indigo-700 dark:text-indigo-300">${partnerPlus}</p>
                                </div>
                            </div>

                            <div class="bg-white dark:bg-slate-800 border border-slate-100 dark:border-slate-700 rounded-2xl p-3 mb-4">
                                <div class="flex justify-between text-xs text-slate-500 dark:text-slate-400">
                                    <span>Pus de proprietar</span>
                                    <strong class="text-slate-700 dark:text-slate-200">${ownPlus} RON</strong>
                                </div>
                            </div>

                            <h4 class="font-black text-slate-800 dark:text-white mb-3">Statistici pe zile</h4>
                            <div class="space-y-3 pb-2">${dayRows}</div>
                        </div>
                    </div>
                `;
            },

            openMoneyModal: (goalId, mode) => {
                const goal = goals.find(g => g.id === goalId);
                if (!goal) return;

                const isRemove = mode === 'remove';
                const title = isRemove ? 'Scoate Bani' : 'Pune Bani';
                const buttonText = isRemove ? 'Scoate' : 'Pune';
                const buttonClass = isRemove ? 'bg-red-500 hover:bg-red-600' : 'bg-green-500 hover:bg-green-600';
                const infoText = isRemove ? 'Scoți bani din' : 'Adaugi bani la';

                document.getElementById('modalContainer').innerHTML = `
                    <div class="fixed inset-0 modal-backdrop flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
                        <div class="bg-white dark:bg-slate-800 rounded-t-3xl sm:rounded-3xl shadow-xl w-full max-w-md p-6 fade-in relative">
                            <div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-6 sm:hidden"></div>
                            <h3 class="text-xl font-bold mb-1 text-slate-800 dark:text-white">${title}</h3>
                            <p class="text-sm text-slate-500 dark:text-slate-400 mb-5">${infoText} "${safeText(goal.title)}"</p>
                            
                            <div class="space-y-4">
                                <div class="relative">
                                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 font-medium">RON</span>
                                    <input type="number" id="moneyAmountInput" min="1" class="w-full pl-14 pr-4 py-4 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl outline-none text-xl font-bold text-slate-800 dark:text-white" placeholder="0">
                                </div>
                                <div class="flex gap-3 pt-2">
                                    <button onclick="window.appActions.closeModal()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold py-3 rounded-xl">Anulează</button>
                                    <button onclick='window.appActions.saveOwnMoneyChange(${JSON.stringify(goalId)}, "${mode}")' id="saveMoneyBtn" class="flex-1 ${buttonClass} text-white font-bold py-3 rounded-xl transition-colors">${buttonText}</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            saveOwnMoneyChange: async (goalId, mode) => {
                const amount = parseFloat(document.getElementById('moneyAmountInput').value);
                if (isNaN(amount) || amount <= 0) return alert('Sumă invalidă!');

                const goal = goals.find(g => g.id === goalId);
                if (!goal) return;

                if (goal.owner !== currentUser.email) {
                    alert('Poți scoate/adăuga aici doar la obiectivele tale. Pentru obiectivul partenerului folosește Oferă.');
                    return;
                }

                const btn = document.getElementById('saveMoneyBtn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true;

                const currentValue = Number(goal.current) || 0;
                const targetValue = Number(goal.target) || 0;
                const wasCompleted = targetValue > 0 && currentValue >= targetValue;
                let newAmount = currentValue;
                let transactionAmount = amount;

                if (mode === 'remove') {
                    const realRemoved = Math.min(amount, currentValue);
                    newAmount = Math.max(0, currentValue - amount);
                    transactionAmount = -realRemoved;
                } else {
                    newAmount = currentValue + amount;
                    transactionAmount = amount;
                }

                const { error: updateError } = await supabase.from('goals').update({ current: newAmount }).eq('id', goalId);

                if (updateError) {
                    alert("Eroare: " + updateError.message);
                    btn.innerHTML = mode === 'remove' ? 'Scoate' : 'Pune';
                    btn.disabled = false;
                    return;
                }

                const transactionItem = {
                    goal_id: goalId, goal_title: goal.title, amount: transactionAmount,
                    from_role: currentUser.email, to_role: goal.owner,
                    date: new Date().toISOString().split('T')[0], timestamp: new Date().toISOString()
                };
                const { data: savedTransaction, error: transactionError } = await supabase.from('transactions').insert([transactionItem]).select().single();

                if (transactionError) {
                    alert("Banii s-au modificat, dar istoricul nu s-a salvat: " + transactionError.message);
                }

                goals = goals.map(g => String(g.id) === String(goalId) ? { ...g, current: newAmount } : g);
                if (!transactionError) transactions = [savedTransaction || transactionItem, ...transactions];
                window.appActions.closeModal();
                renderMain(true);
                scheduleFetchData(450);

                const isNowCompleted = targetValue > 0 && newAmount >= targetValue;
                if (!wasCompleted && isNowCompleted) launchConfetti();
            },

            openGiftModal: (goalId) => {
                const goal = goals.find(g => g.id === goalId);
                if (!goal) return;

                document.getElementById('modalContainer').innerHTML = `
                    <div class="fixed inset-0 modal-backdrop flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
                        <div class="bg-white dark:bg-slate-800 rounded-t-3xl sm:rounded-3xl shadow-xl w-full max-w-md p-6 fade-in relative">
                            <div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-6 sm:hidden"></div>
                            <h3 class="text-xl font-bold mb-1 text-slate-800 dark:text-white">Pune Bani</h3>
                            <p class="text-sm text-slate-500 dark:text-slate-400 mb-5">Pentru "${safeText(goal.title)}"</p>
                            
                            <div class="space-y-4">
                                <div class="relative">
                                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 font-medium">RON</span>
                                    <input type="number" id="giftAmountInput" min="1" class="w-full pl-14 pr-4 py-4 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl outline-none text-xl font-bold text-slate-800 dark:text-white" placeholder="0">
                                </div>
                                <div class="flex gap-3 pt-2">
                                    <button onclick="window.appActions.closeModal()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold py-3 rounded-xl">Anulează</button>
                                    <button onclick='window.appActions.sendGift(${JSON.stringify(goalId)})' id="sendGiftBtn" class="flex-1 bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition-colors">Trimite</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            sendGift: async (goalId) => {
                const amount = parseFloat(document.getElementById('giftAmountInput').value);
                if (isNaN(amount) || amount <= 0) return alert('Sumă invalidă!');

                const goal = goals.find(g => g.id === goalId);
                if (!goal) return;

                const btn = document.getElementById('sendGiftBtn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true;

                const currentValue = Number(goal.current) || 0;
                const targetValue = Number(goal.target) || 0;
                const wasCompleted = targetValue > 0 && currentValue >= targetValue;
                const newAmount = currentValue + amount;
                
                const { error: updateError } = await supabase.from('goals').update({ current: newAmount }).eq('id', goalId);
                
                if (updateError) {
                    alert("Eroare la trimitere: " + updateError.message);
                    btn.innerHTML = 'Trimite';
                    btn.disabled = false;
                    return;
                }
                
                const transactionItem = {
                    goal_id: goalId, goal_title: goal.title, amount: amount,
                    from_role: currentUser.email, to_role: goal.owner,
                    date: new Date().toISOString().split('T')[0], timestamp: new Date().toISOString()
                };
                const { data: savedTransaction, error: transactionError } = await supabase.from('transactions').insert([transactionItem]).select().single();

                if (transactionError) {
                    alert("Banii s-au trimis, dar istoricul nu s-a salvat: " + transactionError.message);
                }

                goals = goals.map(g => String(g.id) === String(goalId) ? { ...g, current: newAmount } : g);
                if (!transactionError) transactions = [savedTransaction || transactionItem, ...transactions];
                window.appActions.closeModal();
                renderMain(true);
                scheduleFetchData(450);

                const isNowCompleted = targetValue > 0 && newAmount >= targetValue;
                if (!wasCompleted && isNowCompleted) launchConfetti();
            }
        };

        // Start App
        checkAuth().catch((error) => {
            console.error('App start error:', error);
            appContainer.innerHTML = `
                <div class="min-h-screen flex items-center justify-center p-6 bg-white dark:bg-slate-900">
                    <div class="text-center max-w-sm">
                        <div class="w-16 h-16 rounded-full bg-red-50 text-red-500 mx-auto mb-4 flex items-center justify-center"><i class="fas fa-triangle-exclamation text-2xl"></i></div>
                        <h2 class="font-black text-xl text-slate-800 dark:text-white mb-2">Nu s-a putut porni aplicația</h2>
                        <p class="text-sm text-slate-500 dark:text-slate-400">Reîncarcă pagina. Dacă ești în CodePen pe telefon, încearcă Full Page / Debug sau testează ca index.html.</p>
                    </div>
                </div>
            `;
        });

    </script>
</body>
</html>
