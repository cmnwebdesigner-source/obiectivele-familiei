<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Obiectivele Familiei</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;450;500;600;700&display=swap');

    :root {
      --bg: #f4f7fb;
      --panel: rgba(255,255,255,.92);
      --panel-2: rgba(15,23,42,.04);
      --line: rgba(15,23,42,.08);
      --line-soft: rgba(15,23,42,.06);
      --text: #07111f;
      --muted: #64748b;
      --muted-2: #94a3b8;
      --gold: #2563eb;
      --gold-2: #1d4ed8;
      --gold-3: #0f172a;
      --metal: #475569;
      --danger: #ef4444;
      --success: #16a34a;
      --shadow: 0 24px 70px rgba(15,23,42,.18);
      --soft-shadow: 0 14px 40px rgba(15,23,42,.10);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 8% -8%, rgba(37,99,235,.18), transparent 30%),
        radial-gradient(circle at 90% 4%, rgba(239,68,68,.10), transparent 34%),
        radial-gradient(circle at 50% 105%, rgba(22,163,74,.10), transparent 38%),
        linear-gradient(180deg, #ffffff 0%, #f4f7fb 58%, #eef3f9 100%);
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    button, input, textarea { font-family: inherit; }
    button { border: 0; cursor: pointer; }
    input, textarea { outline: none; }

    .app-shell {
      max-width: 430px;
      min-height: 100vh;
      margin: 0 auto;
      position: relative;
      background:
        linear-gradient(180deg, rgba(255,255,255,.99), rgba(244,247,251,.99)),
        radial-gradient(circle at 50% 0%, rgba(37,99,235,.10), transparent 36%);
      box-shadow: var(--shadow);
      overflow: hidden;
      border-left: 1px solid rgba(15,23,42,.07);
      border-right: 1px solid rgba(15,23,42,.07);
    }

    .app-shell::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image: linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 28px 28px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,.42), transparent 60%);
    }

    .screen {
      min-height: 100vh;
      padding: 18px 16px 92px;
      overflow-y: auto;
      scrollbar-width: none;
      animation: fade .18s ease-out;
    }
    .screen::-webkit-scrollbar { display:none; }

    .screen.no-nav { padding-bottom: 22px; }
    .screen.soft-render { animation: none !important; }

    @keyframes fade {
      from { opacity: .75; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .glass {
      background: rgba(255,255,255,.88);
      border: 1px solid var(--line);
      box-shadow: 0 10px 30px rgba(15,23,42,.08);
      backdrop-filter: blur(14px);
    }

    .top-card {
      border-radius: 32px;
      padding: 18px;
      background:
        linear-gradient(135deg, rgba(37,99,235,.10), rgba(255,255,255,.92) 48%, rgba(22,163,74,.055)),
        linear-gradient(180deg, rgba(255,255,255,.98), rgba(255,255,255,.78));
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: var(--soft-shadow), inset 0 1px 0 rgba(255,255,255,.88);
      position: relative;
      overflow: hidden;
    }
    .top-card::after {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,.06) 45%, transparent 65%);
      transform: translateX(-70%);
    }

    .section { margin-top: 18px; }
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 0 2px 10px;
      color: var(--text);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -.02em;
    }
    .section-head small { color: var(--muted); font-weight: 400; }

    .card {
      border-radius: 26px;
      padding: 15px;
      background: rgba(255,255,255,.90);
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 12px 26px rgba(15,23,42,.06), inset 0 1px 0 rgba(255,255,255,.9);
    }

    .goal-card {
      border-radius: 25px;
      padding: 15px;
      background: rgba(255,255,255,.94);
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 14px 32px rgba(15,23,42,.07), inset 0 1px 0 rgba(255,255,255,.92);
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      overflow: hidden;
    }
    .goal-card:active { transform: scale(.988); background: rgba(255,255,255,.98); border-color: rgba(37,99,235,.24); }
    .goal-card-top { display:grid; grid-template-columns: minmax(0, 1fr) auto; gap: 12px; align-items:start; margin-bottom: 12px; }
    .goal-title-row { display:flex; align-items:center; gap:7px; min-width:0; }
    .goal-title { font-size: 13px; font-weight: 450; letter-spacing: .04em; text-transform: uppercase; color: var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; min-width:0; }
    .goal-owner { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .goal-money { font-size: 12px; color: var(--text); font-weight: 450; white-space: nowrap; text-align:right; line-height:1.35; }
    .goal-money .muted { display:block; font-size: 10px; }
    .muted { color: var(--muted); }

    .progress {
      height: 7px;
      border-radius: 99px;
      background: rgba(15,23,42,.08);
      overflow: hidden;
    }
    .progress > span {
      display: block;
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
      transition: width .28s ease;
    }
    .progress.partner > span { background: linear-gradient(90deg, #ef4444, #fb7185); }
    .progress.done > span { background: linear-gradient(90deg, #16a34a, #86efac); }

    .badge {
      font-size: 9px;
      padding: 4px 7px;
      border-radius: 99px;
      background: linear-gradient(135deg, #16a34a, #22c55e);
      color: #ffffff;
      border: 1px solid rgba(255,255,255,.50);
      letter-spacing: .05em;
      line-height: 1;
      box-shadow: 0 8px 18px rgba(22,163,74,.25);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .done-message {
      display:inline-flex;
      align-items:center;
      justify-content:center;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 11px;
      font-weight: 500;
      color: #15803d;
      background: rgba(22,163,74,.12);
      border: 1px solid rgba(22,163,74,.20);
      white-space: nowrap;
    }
    body.dark-mode .done-message {
      color: #86efac;
      background: rgba(22,163,74,.16);
      border-color: rgba(134,239,172,.20);
    }


    .completed-contributions {
      margin-top: 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .contribution-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: .02em;
      color: #166534;
      background: rgba(22,163,74,.10);
      border: 1px solid rgba(22,163,74,.18);
      white-space: nowrap;
    }
    .contribution-chip.partner-wife {
      color: #b91c1c;
      background: rgba(239,68,68,.10);
      border-color: rgba(239,68,68,.18);
    }
    .contribution-chip.partner-husband {
      color: #1d4ed8;
      background: rgba(37,99,235,.10);
      border-color: rgba(37,99,235,.18);
    }
    body.dark-mode .contribution-chip {
      color: #86efac;
      background: rgba(22,163,74,.14);
      border-color: rgba(134,239,172,.18);
    }
    body.dark-mode .contribution-chip.partner-wife {
      color: #fca5a5;
      background: rgba(239,68,68,.15);
      border-color: rgba(252,165,165,.18);
    }
    body.dark-mode .contribution-chip.partner-husband {
      color: #93c5fd;
      background: rgba(37,99,235,.16);
      border-color: rgba(147,197,253,.18);
    }

    .btn {
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 450;
      letter-spacing: .01em;
      transition: transform .12s ease, opacity .12s ease, filter .12s ease;
    }
    .btn:active { transform: scale(.97); }
    .btn-gold { background: linear-gradient(135deg, #0f172a, #2563eb 72%, #60a5fa); color: #fff; box-shadow: 0 10px 22px rgba(37,99,235,.18); }
    .btn-soft { background: rgba(15,23,42,.055); color: var(--text); border: 1px solid rgba(15,23,42,.08); }
    .btn-danger { background: rgba(239,68,68,.10); color: #dc2626; border: 1px solid rgba(239,68,68,.18); }
    .btn-full { width: 100%; padding: 14px 16px; border-radius: 18px; }

    .icon-btn {
      width: 44px;
      height: 44px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(15,23,42,.08);
      color: #0f172a;
      box-shadow: 0 8px 24px rgba(15,23,42,.06);
    }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 18px;
      background: linear-gradient(135deg, #2563eb, #0f172a);
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      border:1px solid rgba(255,255,255,.14);
      color:#fff;
      font-weight:600;
    }
    .avatar.large { width: 86px; height: 86px; border-radius: 30px; font-size: 28px; }
    .avatar img { width:100%; height:100%; object-fit:cover; }

    .input {
      width: 100%;
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(15,23,42,.10);
      color: var(--text);
      padding: 14px 14px;
      border-radius: 18px;
      font-size: 14px;
    }
    .input::placeholder { color: rgba(100,116,139,.70); }
    .input:focus { border-color: rgba(37,99,235,.34); box-shadow: 0 0 0 4px rgba(37,99,235,.08); }
    .label { font-size: 12px; color: var(--muted); margin: 0 0 7px 4px; }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      max-width: 430px;
      width: 100%;
      height: 76px;
      padding: 10px 22px max(10px, env(safe-area-inset-bottom));
      display:flex;
      align-items:center;
      justify-content:space-between;
      background: rgba(255,255,255,.88);
      backdrop-filter: blur(18px);
      border-top: 1px solid rgba(15,23,42,.08);
      z-index: 40;
    }
    .nav-item {
      color: var(--muted);
      width: 76px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 4px;
      font-size: 10px;
      background: transparent;
    }
    .nav-item.active { color: #2563eb; }
    .nav-plus {
      width: 58px;
      height: 58px;
      border-radius: 24px;
      background: linear-gradient(135deg, #0f172a, #2563eb);
      color: #fff;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 12px 28px rgba(37,99,235,.24);
      margin-top: -24px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.68);
      backdrop-filter: blur(8px);
      z-index: 70;
      display:flex;
      align-items:flex-end;
      justify-content:center;
    }
    .sheet {
      width:100%;
      max-width:430px;
      border-radius: 30px 30px 0 0;
      padding: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,.99), rgba(247,250,252,.99));
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 -20px 50px rgba(15,23,42,.18);
      animation: sheetUp .16s ease-out;
    }
    @keyframes sheetUp { from { transform: translateY(18px); opacity: .8; } to { transform: translateY(0); opacity:1; } }
    .grab { width:42px; height:4px; border-radius:99px; background:rgba(15,23,42,.16); margin:0 auto 18px; }

    .calendar-card {
      border-radius: 27px;
      padding: 13px;
      background: linear-gradient(180deg, rgba(255,255,255,.058), rgba(255,255,255,.030));
      border: 1px solid rgba(255,255,255,.085);
      user-select: none;
      box-shadow: 0 14px 30px rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.055);
    }
    .calendar-month { font-size: 12px; color: var(--muted); text-transform: capitalize; text-align:center; max-width: 190px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis; }
    .day-pill {
      flex: 1;
      min-width: 0;
      border-radius: 18px;
      padding: 9px 3px;
      color: var(--muted);
      background: rgba(255,255,255,.035);
      border: 1px solid rgba(255,255,255,.045);
    }
    .day-pill.active {
      color: #15120a;
      background: linear-gradient(135deg, #b98a2f, #f6dc8e 60%, #c99f44);
      border-color: rgba(245,220,143,.28);
      box-shadow: 0 12px 22px rgba(201,159,68,.16);
    }
    .day-label { font-size: 9px; text-transform: uppercase; opacity:.76; letter-spacing:.04em; }
    .day-number { font-size: 17px; font-weight: 450; line-height: 1.1; }

    .stat-grid { display:grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .stat-mini { padding: 13px 10px; border-radius: 20px; background: rgba(255,255,255,.052); border: 1px solid rgba(255,255,255,.085); }
    .stat-mini span { font-size: 11px; color: var(--muted); display:block; margin-bottom:6px; }
    .stat-mini b { font-size: 15px; color: var(--text); font-weight: 500; }

    .calc-grid { display:grid; grid-template-columns: repeat(4, 1fr); gap: 9px; }
    .calc-key { height: 56px; border-radius: 20px; background: rgba(255,255,255,.075); color: var(--text); font-size: 17px; font-weight: 500; border: 1px solid rgba(255,255,255,.08); }
    .calc-key.op { color: #2563eb; background: rgba(214,177,93,.12); }
    .calc-key.clear { color: #ff9a9a; background: rgba(227,93,93,.12); }


    .quick-actions { display:flex; align-items:center; gap:8px; }
    .avatar-btn { padding:0; border:0; background:transparent; border-radius:999px; display:flex; align-items:center; justify-content:center; cursor:pointer; color:inherit; }
    .avatar-btn:active { transform: scale(.96); }
    .summary-grid { display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:10px; }
    .summary-tile {
      border-radius: 24px;
      padding: 14px;
      background: rgba(255,255,255,.76);
      border: 1px solid rgba(15,23,42,.07);
      box-shadow: 0 10px 25px rgba(15,23,42,.055);
      min-width:0;
    }
    .summary-tile.offered { background: linear-gradient(145deg, rgba(239,68,68,.09), rgba(255,255,255,.88)); }
    .summary-tile.received { background: linear-gradient(145deg, rgba(22,163,74,.10), rgba(255,255,255,.88)); }
    .summary-icon { width:34px; height:34px; border-radius:14px; display:flex; align-items:center; justify-content:center; margin-bottom:10px; color:#fff; }
    .summary-icon.red { background:linear-gradient(135deg,#ef4444,#fb7185); }
    .summary-icon.green { background:linear-gradient(135deg,#16a34a,#86efac); }
    .calendar-compact {
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap:10px;
    }
    .calendar-compact .day-pill { min-height:72px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .history-list .card { background:rgba(255,255,255,.86); }

    .confetti-piece {
      position: fixed;
      top: -10px;
      width: 7px;
      height: 12px;
      border-radius: 3px;
      z-index: 999;
      animation: fall 1.4s ease-out forwards;
    }
    @keyframes fall { to { transform: translateY(105vh) rotate(680deg); opacity:0; } }

    .loading {
      min-height: 100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      color: #2563eb;
      font-size: 13px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .loading-wrap { display:flex; flex-direction:column; align-items:center; gap:14px; }
    .loading-mark {
      width: 46px;
      height: 46px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(37,99,235,.16), rgba(255,255,255,.92));
      border: 1px solid rgba(37,99,235,.16);
      position:relative;
      box-shadow: 0 18px 45px rgba(0,0,0,.28);
    }
    .loading-mark::after {
      content:'';
      position:absolute;
      inset: 14px;
      border-radius: 999px;
      background: #2563eb;
      box-shadow: 0 0 24px rgba(37,99,235,.28);
      animation: pulseGold 1.2s ease-in-out infinite;
    }
    @keyframes pulseGold { 0%,100% { transform:scale(.72); opacity:.55; } 50% { transform:scale(1); opacity:1; } }
  

    /* FIX FINAL: tema reală, carduri rezumat premium, calendar normal */
    body.dark-mode {
      --bg: #070b12;
      --panel: rgba(15,23,42,.88);
      --panel-2: rgba(255,255,255,.05);
      --line: rgba(255,255,255,.10);
      --line-soft: rgba(255,255,255,.07);
      --text: #f8fafc;
      --muted: #a6b4c8;
      --muted-2: #74839a;
      --gold: #60a5fa;
      --gold-2: #3b82f6;
      --gold-3: #eff6ff;
      --metal: #94a3b8;
      --shadow: 0 28px 80px rgba(0,0,0,.42);
      --soft-shadow: 0 18px 46px rgba(0,0,0,.28);
      background:
        radial-gradient(circle at 8% -8%, rgba(37,99,235,.22), transparent 30%),
        radial-gradient(circle at 90% 4%, rgba(239,68,68,.12), transparent 34%),
        radial-gradient(circle at 50% 105%, rgba(22,163,74,.12), transparent 38%),
        linear-gradient(180deg, #070b12 0%, #0f172a 58%, #111827 100%);
    }
    body.dark-mode .app-shell {
      background:
        linear-gradient(180deg, rgba(9,13,22,.99), rgba(15,23,42,.99)),
        radial-gradient(circle at 50% 0%, rgba(37,99,235,.16), transparent 36%);
      border-left-color: rgba(255,255,255,.08);
      border-right-color: rgba(255,255,255,.08);
    }
    body.dark-mode .glass,
    body.dark-mode .card,
    body.dark-mode .goal-card,
    body.dark-mode .sheet,
    body.dark-mode .summary-tile,
    body.dark-mode .input,
    body.dark-mode .icon-btn,
    body.dark-mode .bottom-nav {
      background: rgba(15,23,42,.86);
      border-color: rgba(255,255,255,.10);
      color: var(--text);
      box-shadow: 0 16px 40px rgba(0,0,0,.24), inset 0 1px 0 rgba(255,255,255,.04);
    }
    body.dark-mode .top-card {
      background:
        linear-gradient(135deg, rgba(37,99,235,.18), rgba(15,23,42,.92) 48%, rgba(22,163,74,.12)),
        linear-gradient(180deg, rgba(15,23,42,.98), rgba(15,23,42,.78));
      border-color: rgba(255,255,255,.10);
    }
    .summary-hero {
      border-radius: 30px;
      padding: 16px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.96), rgba(244,247,251,.92)),
        radial-gradient(circle at 15% 0%, rgba(37,99,235,.13), transparent 45%),
        radial-gradient(circle at 95% 15%, rgba(22,163,74,.12), transparent 44%);
      border: 1px solid rgba(15,23,42,.08);
      box-shadow: 0 22px 55px rgba(15,23,42,.10), inset 0 1px 0 rgba(255,255,255,.94);
      overflow: hidden;
      position: relative;
    }
    .summary-hero:before {
      content:'';
      position:absolute;
      inset:-60px -60px auto auto;
      width:160px;
      height:160px;
      border-radius:999px;
      background: radial-gradient(circle, rgba(37,99,235,.16), transparent 66%);
      pointer-events:none;
    }
    .summary-hero-top { display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; position:relative; }
    .summary-title { font-size:18px; line-height:1.12; font-weight:500; letter-spacing:-.04em; color:var(--text); }
    .summary-sub { font-size:11px; color:var(--muted); margin-top:4px; }
    .summary-pill { border-radius:999px; padding:9px 11px; font-size:11px; color:#fff; background:linear-gradient(135deg,#0f172a,#2563eb); box-shadow:0 10px 22px rgba(37,99,235,.20); white-space:nowrap; }
    .summary-grid { display:grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap:10px; position:relative; }
    .summary-tile {
      border-radius: 22px;
      padding: 13px;
      min-width:0;
      background: rgba(255,255,255,.78);
      border: 1px solid rgba(15,23,42,.075);
      box-shadow: 0 12px 28px rgba(15,23,42,.055);
    }
    .summary-tile.offered { background: linear-gradient(145deg, rgba(239,68,68,.10), rgba(255,255,255,.92)); }
    .summary-tile.received { background: linear-gradient(145deg, rgba(22,163,74,.12), rgba(255,255,255,.92)); }
    .summary-icon { width:36px; height:36px; border-radius:15px; display:flex; align-items:center; justify-content:center; margin-bottom:9px; color:#fff; box-shadow:0 10px 20px rgba(15,23,42,.10); }
    .summary-icon.red { background:linear-gradient(135deg,#ef4444,#fb7185); }
    .summary-icon.green { background:linear-gradient(135deg,#16a34a,#86efac); }

    };

    const money = (v) => Number(v || 0).toLocaleString('ro-RO', { maximumFractionDigits: 2 });

    const normalizeFamilyCode = (v) => String(v || '')
      .trim()
      .toLocaleUpperCase('ro-RO')
      .replace(/[^A-Z0-9ĂÂÎȘŞȚŢ_-]/gi, '')
      .slice(0, 36);
    const userFamilyStorageKey = () => currentUser?.id ? 'familyCode:' + currentUser.id : 'familyCode';
    const parseAmount = (v) => {
      const raw = String(v ?? '').trim().replace(/\s/g, '').replace(',', '.');
      if (!raw || !/^\d+(\.\d{1,2})?$/.test(raw)) return NaN;
      return Number(raw);
    };
    const toCents = (v) => Math.round(Number(v || 0) * 100);
    const fromCents = (v) => Math.round(Number(v || 0)) / 100;
    const goalBelongsToFamily = (g) => g?.owner === currentUser?.email || (!!familyCode && g?.family_code === familyCode);
    const transactionBelongsToFamily = (t) => t?.from_role === currentUser?.email || t?.to_role === currentUser?.email || (!!familyCode && t?.family_code === familyCode);
    const todayISO = () => new Date().toISOString().split('T')[0];
    const addDays = (dateStr, days) => { const d = new Date(dateStr + 'T12:00:00'); d.setDate(d.getDate() + days); return d.toISOString().split('T')[0]; };
    const formatFullDate = (dateStr) => new Date(dateStr + 'T12:00:00').toLocaleDateString('ro-RO', { weekday:'long', day:'2-digit', month:'long' });
    const formatMonthTitle = (dateStr) => new Date(dateStr + 'T12:00:00').toLocaleDateString('ro-RO', { month:'long', year:'numeric' });
    const firstOfMonth = (dateStr) => { const d = new Date(dateStr + 'T12:00:00'); return new Date(d.getFullYear(), d.getMonth(), 1, 12).toISOString().split('T')[0]; };
    const shiftMonth = (dateStr, months) => { const d = new Date(dateStr + 'T12:00:00'); d.setMonth(d.getMonth() + months, 1); return d.toISOString().split('T')[0]; };
    const hasMoneyOnDate = (dateStr) => transactions.some(t => transactionBelongsToFamily(t) && String(t.date).slice(0,10) === dateStr && Number(t.amount || 0) > 0);
    const getProfile = (email) => profiles.find(p => p.email === email);
    const getRole = (email) => email === currentUser?.email ? (getProfile(email)?.role || currentUser?.user_metadata?.role || 'sot') : (getProfile(email)?.role || 'sotie');
    const roleLabel = (role) => role === 'sotie' ? 'Soție' : 'Soț';
    const ownerLabel = (email) => email === currentUser?.email ? 'Tu' : roleLabel(getRole(email));
    const partnerEmail = () => profiles.find(p => p.email && p.email !== currentUser?.email && (!familyCode || p.family_code === familyCode))?.email || goals.find(g => g.owner !== currentUser?.email && goalBelongsToFamily(g))?.owner || null;
    const isGoalDone = (goal) => Number(goal?.current || 0) >= Number(goal?.target || 1);
    const isCommonGoal = (goal) => String(goal?.goal_type || '').toLowerCase() === 'common';
    const PIGGY_TITLE = 'PUȘCULIȚĂ';
    const PIGGY_MILESTONES = [
      { target: 10, message: 'Primul prag e pornit. Monedele mici chiar se adună.' },
      { target: 30, message: 'Deja se simte disciplina. Continuați așa.' },
      { target: 50, message: 'Ați ajuns la un ritm frumos. Fiecare bănuț contează.' },
      { target: 70, message: 'Pușculița crește serios. Sunteți aproape de 100 RON.' },
      { target: 100, message: 'Provocarea e completă. Micile gesturi au devenit ceva mare.' }
    ];
    const isPiggyTransaction = (t) => transactionBelongsToFamily(t) && !t.goal_id && String(t.goal_title || '').toLocaleUpperCase('ro-RO') === PIGGY_TITLE;
    const piggyTransactions = () => transactions.filter(isPiggyTransaction);
    const piggyBalance = () => fromCents(Math.max(0, piggyTransactions().reduce((s, t) => s + toCents(t.amount || 0), 0)));
    const piggyInfo = (balance) => {
      const finalTarget = PIGGY_MILESTONES[PIGGY_MILESTONES.length - 1].target;
      const next = PIGGY_MILESTONES.find(m => balance < m.target) || PIGGY_MILESTONES[PIGGY_MILESTONES.length - 1];
      const completed = balance >= finalTarget;
      const message = completed ? 'Ați ajuns la 100 RON. Puteți sparge pușculița și începe din nou.' : next.message;
      return { target: finalTarget, nextTarget: next.target, message, completed, percent: Math.min(100, Math.round((balance / Math.max(1, finalTarget)) * 100)) };
    };
    const showCompletedOnHome = (goal) => !isGoalDone(goal) || Number(completedHold[goal.id] || 0) > Date.now();

    function markGoalCompleted(goal, { render = true } = {}) {
      if (!goal?.id) return;
      completedNotified.add(goal.id);
      completedHold[goal.id] = Date.now() + 5000;
      showConfetti();
      if (render) renderApp(true);
      setTimeout(() => {
        if (completedHold[goal.id] && completedHold[goal.id] <= Date.now()) {
          delete completedHold[goal.id];
          if (currentPage === 'home') renderApp(true);
        }
      }, 5200);
    }

    function initTheme() {
      const saved = localStorage.getItem('appTheme') || 'light';
      document.body.classList.toggle('dark-mode', saved === 'dark');
    }
    initTheme();

    async function safeFetch(promise) { try { const { data, error } = await promise; if (error) { console.error(error); return []; } return data || []; } catch (error) { console.error(error); return []; } }

    async function ensureOwnProfile() {
      if (!currentUser) return;
      const role = currentUser.user_metadata?.role || window.selectedSignupRole || 'sot';
      const pendingCode = normalizeFamilyCode(sessionStorage.getItem('pendingFamilyCode') || '');
      const storedCode = normalizeFamilyCode(localStorage.getItem(userFamilyStorageKey()) || '');
      let existing = null;
      try {
        const res = await supabase.from('profiles').select('id,email,role,family_code').eq('id', currentUser.id).maybeSingle();
        existing = res.data || null;
      } catch (_) {}
      familyCode = normalizeFamilyCode(pendingCode || storedCode || existing?.family_code || currentUser.user_metadata?.family_code || DEFAULT_FAMILY_CODE);
      localStorage.setItem(userFamilyStorageKey(), familyCode);
      sessionStorage.removeItem('pendingFamilyCode');
      await supabase.from('profiles').upsert({ id: currentUser.id, email: currentUser.email, role: existing?.role || role, family_code: familyCode }, { onConflict: 'id' });
    }

    async function fetchData({ render = true, soft = false } = {}) {
      if (!currentUser) return;

      const oldCompleted = new Set(goals.filter(isGoalDone).map(g => g.id));

      const [g, t, p, c] = await Promise.all([
        safeFetch(supabase.from('goals').select('*').order('created_at', { ascending: false })),
        safeFetch(supabase.from('transactions').select('*').order('timestamp', { ascending: false })),
        safeFetch(supabase.from('profiles').select('*').order('created_at', { ascending: true })),
        safeFetch(supabase.from('calculator_history').select('*').eq('user_email', currentUser.email).order('created_at', { ascending: false }).limit(30))
      ]);

      const ownProfile = p.find(x => x.id === currentUser?.id || x.email === currentUser?.email);
      if (ownProfile?.family_code) {
        familyCode = normalizeFamilyCode(ownProfile.family_code);
        localStorage.setItem(userFamilyStorageKey(), familyCode);
      }

      const filteredProfiles = p.filter(x => x.email === currentUser?.email || (!!familyCode && x.family_code === familyCode));
      const filteredGoals = g.filter(goalBelongsToFamily);
      const filteredTransactions = t.filter(transactionBelongsToFamily);

      const newlyCompleted = [];
      if (dataLoadedOnce) {
        for (const goal of filteredGoals) {
          if (isGoalDone(goal) && !oldCompleted.has(goal.id) && !completedNotified.has(goal.id)) {
            newlyCompleted.push(goal);
          }
        }
      }

      profiles = filteredProfiles;
      goals = filteredGoals;
      transactions = filteredTransactions;
      calculatorHistory = c;

      if (!dataLoadedOnce) {
        completedNotified = new Set(goals.filter(isGoalDone).map(g => g.id));
        dataLoadedOnce = true;
      }

      if (render) renderApp(soft);

      if (newlyCompleted.length) {
        // Confetti apare pe ambele conturi când un obiectiv se finalizează prin realtime.
        newlyCompleted.forEach(goal => markGoalCompleted(goal, { render: false }));
        if (currentPage === 'home') renderApp(true);
      }
    }

    function setupRealtime() {
      if (subscription) supabase.removeChannel(subscription);
      subscription = supabase.channel('smooth-sync')
        .on('postgres_changes', { event:'*', schema:'public', table:'goals' }, scheduleSoftRefresh)
        .on('postgres_changes', { event:'*', schema:'public', table:'transactions' }, scheduleSoftRefresh)
        .on('postgres_changes', { event:'*', schema:'public', table:'profiles' }, scheduleSoftRefresh)
        .on('postgres_changes', { event:'*', schema:'public', table:'calculator_history' }, scheduleSoftRefresh)
        .subscribe();
    }

    function scheduleSoftRefresh() {
      clearTimeout(refreshTimer);
      if (Date.now() < suppressSoftUntil) {
        refreshTimer = setTimeout(() => fetchData({ render: false }), Math.max(450, suppressSoftUntil - Date.now()));
        return;
      }
      refreshTimer = setTimeout(() => fetchData({ soft: true }), 650);
    }

    function renderApp(soft = false) {
      const openSheet = modal.innerHTML.trim().length > 0;
      if (soft && openSheet) return;
      const oldScreen = app.querySelector('.screen');
      const scrollTop = oldScreen ? oldScreen.scrollTop : 0;
      let content = '';
      let nav = true;
      if (currentPage === 'home') content = homeHTML();
      else if (currentPage === 'profile') content = profileHTML();
      else if (currentPage === 'partner') content = partnerHTML();
      else if (currentPage === 'calculator') { content = calculatorHTML(); nav = false; }
      else if (currentPage === 'calendar') { content = calendarPageHTML(); nav = false; }
      else if (currentPage === 'piggy') { content = piggyPageHTML(); nav = false; }
      else if (currentPage === 'goalStats') { content = statsHTML(); nav = false; }
      else if (currentPage === 'goalList') { content = goalListPageHTML(); nav = false; }
      else content = homeHTML();
      app.innerHTML = `<div class="screen ${nav ? '' : 'no-nav'} ${soft ? 'soft-render' : ''}">${content}</div>${nav ? bottomNavHTML() : ''}`;
      if (soft) {
        const s = app.querySelector('.screen');
        if (s) s.scrollTop = scrollTop;
        requestAnimationFrame(() => { const again = app.querySelector('.screen'); if (again) again.scrollTop = scrollTop; });
      }
    }

    function completedContributionHTML(goal) {
      const current = Number(goal.current || 0);
      const target = Number(goal.target || 1);
      if (current < target) return '';
      const sums = {};
      transactions
        .filter(t => transactionBelongsToFamily(t) && t.goal_id === goal.id && Number(t.amount || 0) > 0)
        .forEach(t => {
          const email = t.from_role || 'necunoscut';
          sums[email] = (sums[email] || 0) + Number(t.amount || 0);
        });
      const entries = Object.entries(sums).filter(([, value]) => value > 0).sort((a, b) => b[1] - a[1]);
      if (!entries.length) return '';
      return `<div class="completed-contributions">${entries.map(([email, value]) => {
        const role = getRole(email);

    function avatarFileToBase64(file) {
      return new Promise((resolve, reject) => {
        if (!file || !file.type || !file.type.startsWith('image/')) {
          reject(new Error('Alege o poză validă.'));
          return;
        }

        const imageUrl = URL.createObjectURL(file);
        const img = new Image();

        img.onload = () => {
          try {
            const width = img.naturalWidth || img.width;
            const height = img.naturalHeight || img.height;
            if (!width || !height) throw new Error('Poza nu poate fi citită.');

            // Crop pătrat pe centru, apoi redimensionare. Așa se mulează în avatar ca pe Instagram.
            const cropSize = Math.min(width, height);
            const sx = Math.round((width - cropSize) / 2);
            const sy = Math.round((height - cropSize) / 2);
            const outSize = 640;

            const canvas = document.createElement('canvas');
            canvas.width = outSize;
            canvas.height = outSize;
            const ctx = canvas.getContext('2d', { alpha: false });
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, outSize, outSize);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            ctx.drawImage(img, sx, sy, cropSize, cropSize, 0, 0, outSize, outSize);

            URL.revokeObjectURL(imageUrl);
            resolve(canvas.toDataURL('image/jpeg', 0.82));
          } catch (err) {
            URL.revokeObjectURL(imageUrl);
            reject(err);
          }
        };

        img.onerror = () => {
          URL.revokeObjectURL(imageUrl);
          reject(new Error('Nu pot citi poza asta. Încearcă JPG sau PNG.'));
        };

        img.src = imageUrl;
      });
    }

      },
      closeModal() { modal.innerHTML = ''; },
      selectGoalType(type) {
        const value = type === 'common' ? 'common' : 'personal';
        const input = document.getElementById('goalTypeInput');
        const personal = document.getElementById('goalTypePersonal');
        const common = document.getElementById('goalTypeCommon');
        if (input) input.value = value;
        if (personal) personal.className = value === 'personal' ? 'btn btn-gold btn-full' : 'btn btn-soft btn-full';
        if (common) common.className = value === 'common' ? 'btn btn-gold btn-full' : 'btn btn-soft btn-full';
      },
      async saveGoal() {
        const titleInput = document.getElementById('goalTitleInput');
        const targetInput = document.getElementById('goalTargetInput');
        const title = (titleInput?.value || '').trim().toLocaleUpperCase('ro-RO');
        const target = parseAmount(targetInput?.value || '');
        const goalType = document.getElementById('goalTypeInput')?.value === 'common' ? 'common' : 'personal';
        if (!title || !Number.isFinite(target) || target <= 0) return alert('Date invalide.');
        const btn = document.getElementById('saveGoalBtn');
        btn.textContent = 'Salvez...'; btn.disabled = true;
        let localGoal = null;
        try {
          if (!currentUser?.email) {
            const { data: sessionData } = await supabase.auth.getSession();
            currentUser = sessionData.session?.user || currentUser;
          }
          if (!currentUser?.email) throw new Error('Nu ești conectat. Reconectează-te și încearcă iar.');
          localGoal = { id: crypto.randomUUID(), title, target, current: 0, owner: currentUser.email, family_code: familyCode, goal_type: goalType, created_at: new Date().toISOString() };
          goals.unshift(localGoal);
          this.closeModal();
          suppressSoftUntil = Date.now() + 1300;
          renderApp();

          const rpc = await supabase.rpc('create_goal_safe', { p_title: title, p_target: target, p_goal_type: goalType });
          if (rpc.error) {
            const direct = await supabase.from('goals').insert({ title, target, current: 0, owner: currentUser.email, family_code: familyCode, goal_type: goalType }).select('*').maybeSingle();
            if (direct.error) throw direct.error;
            if (direct.data) goals = goals.map(g => g.id === localGoal.id ? direct.data : g);
          } else if (rpc.data) {
            goals = goals.map(g => g.id === localGoal.id ? rpc.data : g);
          }
          suppressSoftUntil = Date.now() + 1300;
          renderApp(true);
          scheduleSoftRefresh();
        } catch (error) {
          if (localGoal) goals = goals.filter(g => g.id !== localGoal.id);
          renderApp();
          alert('Eroare la obiectiv: ' + (error.message || error));
        }
      },
      openEditGoal(id) {
        const g = goals.find(x => x.id === id); if (!g) return;
        if (g.owner !== currentUser.email) return alert('Poți edita doar obiectivul tău.');
        modal.innerHTML = `<div class="modal-backdrop"><div class="sheet"><div class="grab"></div><h3 class="text-xl font-medium mb-1">Editează obiectivul</h3><p class="text-sm muted mb-2">${escapeHTML(String(g.title || '').toUpperCase())}</p><p class="edit-goal-hint">Poți mări sau scădea suma obiectivului, apoi apeși Salvează.</p><div class="space-y-3 mt-4"><input id="editGoalTargetInput" type="text" inputmode="decimal" class="input" placeholder="Suma nouă" value="${Number(g.target || 0)}"><div class="grid grid-cols-2 gap-2 pt-2"><button class="btn btn-soft btn-full" onclick="window.appActions.closeModal()">Anulează</button><button id="editGoalBtn" class="btn btn-gold btn-full" onclick="window.appActions.saveEditGoalTarget('${id}')">Salvează</button></div></div></div></div>`;
      },
      async saveEditGoalTarget(id) {
        const g = goals.find(x => x.id === id); if (!g) return;
        if (g.owner !== currentUser.email) return alert('Poți edita doar obiectivul tău.');
        const oldTarget = Number(g.target || 0);
        const wasDone = isGoalDone(g);
        const newTarget = parseAmount(document.getElementById('editGoalTargetInput')?.value || '');
        if (!Number.isFinite(newTarget) || newTarget <= 0) return alert('Suma nouă este invalidă.');
        if (toCents(newTarget) === toCents(oldTarget)) return alert('Suma este aceeași.');
        const btn = document.getElementById('editGoalBtn');
        if (btn) { btn.textContent = 'Salvez...'; btn.disabled = true; }
        g.target = newTarget;
        this.closeModal();
        suppressSoftUntil = Date.now() + 1300;
        renderApp(true);
        try {
          const rpc = await supabase.rpc('update_goal_target_safe', { p_goal_id: id, p_new_target: newTarget });
          if (rpc.error) {
            const msg = String(rpc.error.message || rpc.error.details || rpc.error.hint || '').toLowerCase();
            const missingRpc = rpc.error.code === 'PGRST202' || msg.includes('could not find') || msg.includes('function');
            if (!missingRpc) throw rpc.error;
            const upd = await supabase.from('goals').update({ target: newTarget }).eq('id', id).select('target').maybeSingle();
            if (upd.error) throw upd.error;
          }
          if (!wasDone && isGoalDone(g)) markGoalCompleted(g);
          suppressSoftUntil = Date.now() + 1300;
          scheduleSoftRefresh();
        } catch (error) {
          g.target = oldTarget;
          renderApp(true);
          alert('Eroare la editare: ' + (error.message || error));
        }
      },
      openMoney(id, mode) {
        const g = goals.find(x => x.id === id); if (!g) return;
        if (isGoalDone(g)) return alert('Obiectiv finalizat. Nu mai poți modifica suma.');
        const title = mode === 'remove' ? 'Scoate bani' : mode === 'gift' ? 'Oferă bani' : 'Pune bani';
        const action = mode === 'remove' ? 'Scoate' : mode === 'gift' ? 'Oferă' : 'Pune';
        const remaining = Math.max(0, Number(g.target || 0) - Number(g.current || 0));
        const limitText = mode === 'remove' ? `Poți scoate maxim ${money(Number(g.current || 0))} RON.` : `Poți pune maxim ${money(remaining)} RON, cât lipsește până la obiectiv.`;
        modal.innerHTML = `<div class="modal-backdrop"><div class="sheet"><div class="grab"></div><h3 class="text-xl font-medium mb-1">${title}</h3><p class="text-sm muted mb-1">${escapeHTML(String(g.title || '').toUpperCase())}</p><p class="edit-goal-hint mb-4">${limitText}</p><div class="space-y-3"><input id="moneyAmountInput" type="text" inputmode="decimal" class="input" placeholder="RON" autocomplete="off"><div class="grid grid-cols-2 gap-2 pt-2"><button class="btn btn-soft btn-full" onclick="window.appActions.closeModal()">Anulează</button><button id="moneyBtn" class="btn btn-gold btn-full" onclick="window.appActions.applyMoney('${id}','${mode}')">${action}</button></div></div></div></div>`;
      },
      async applyMoney(id, mode) {
        const amountRaw = parseAmount(document.getElementById('moneyAmountInput')?.value || '');
        const g = goals.find(x => x.id === id);
        if (!g || !Number.isFinite(amountRaw) || amountRaw <= 0) return alert('Sumă invalidă.');
        if (isGoalDone(g)) return alert('Obiectiv finalizat. Nu mai poți modifica suma.');
        if (mode === 'remove' && g.owner !== currentUser.email) return alert('Poți scoate doar din obiectivul tău.');

        const old = Number(g.current || 0);
        const target = Number(g.target || 0);
        const oldCents = toCents(old);
        const targetCents = toCents(target);
        const amountCents = toCents(amountRaw);
        const remainingCents = Math.max(0, targetCents - oldCents);

        if (amountCents <= 0) return alert('Sumă invalidă.');
        if (mode === 'remove' && amountCents > oldCents) return alert('Nu poți scoate mai mult decât există.');
        if (mode !== 'remove' && amountCents > remainingCents) return alert('Poți pune maxim ' + money(fromCents(remainingCents)) + ' RON. Ce este peste obiectiv nu se acceptă.');
        if (mode !== 'remove' && remainingCents <= 0) return alert('Obiectiv finalizat. Nu mai poți modifica suma.');

        const requestedDeltaCents = mode === 'remove' ? -amountCents : amountCents;
        const requestedDelta = fromCents(requestedDeltaCents);
        const optimistic = fromCents(oldCents + requestedDeltaCents);
        const optimisticDelta = requestedDelta;

        const btn = document.getElementById('moneyBtn');
        if (btn) { btn.textContent = 'Se salvează...'; btn.disabled = true; }

        g.current = optimistic;
        const localTransaction = {
          id: 'local-' + Date.now(),
          goal_id: id,
          goal_title: String(g.title || '').toUpperCase(),
          amount: optimisticDelta,
          from_role: currentUser.email,
          to_role: g.owner,
          date: todayISO(),
          timestamp: new Date().toISOString(),
          family_code: familyCode
        };
        transactions.unshift(localTransaction);
        this.closeModal();
        suppressSoftUntil = Date.now() + 1300;
        renderApp(true);

        try {
          const rpc = await supabase.rpc('adjust_goal_amount', { p_goal_id: id, p_delta: requestedDelta });
          let finalAmount = optimistic;
          if (rpc.error) {
            const msg = String(rpc.error.message || rpc.error.details || rpc.error.hint || '');
            const missingRpc = rpc.error.code === 'PGRST202' || msg.toLowerCase().includes('could not find') || msg.toLowerCase().includes('function');
            if (!missingRpc) throw rpc.error;
            const fallbackAmount = old + requestedDelta;
            const upd = await supabase.from('goals').update({ current: fallbackAmount }).eq('id', id).select('current').maybeSingle();
            if (upd.error) throw upd.error;
            if (upd.data?.current !== undefined) finalAmount = Number(upd.data.current);
          } else if (rpc.data !== null && rpc.data !== undefined) finalAmount = Number(rpc.data);

          const actualDelta = finalAmount - old;
          if (actualDelta === 0) throw new Error('Obiectiv finalizat. Nu mai poți modifica suma.');

          g.current = finalAmount;
          localTransaction.amount = actualDelta;
          const tr = await supabase.from('transactions').insert([{ goal_id:id, goal_title:String(g.title || '').toUpperCase(), amount:actualDelta, from_role:currentUser.email, to_role:g.owner, date:todayISO(), timestamp:new Date().toISOString(), family_code: familyCode }]).select('*').maybeSingle();
          if (tr.error) throw tr.error;
          if (tr.data) transactions = transactions.map(t => t.id === localTransaction.id ? tr.data : t);
          suppressSoftUntil = Date.now() + 1300;
          renderApp(true);
          if (old < target && finalAmount >= target) markGoalCompleted(g);
          scheduleSoftRefresh();
        } catch (error) {
          g.current = old;
          transactions = transactions.filter(t => t.id !== localTransaction.id);
          renderApp();
          alert('Eroare la bani: ' + (error.message || error));
        }
      },

      async addPiggyCoin(amount) {
        const value = fromCents(toCents(amount));
        if (!currentUser || !Number.isFinite(value) || value <= 0) return;
        const currentBalance = piggyBalance();
        const finalTarget = PIGGY_MILESTONES[PIGGY_MILESTONES.length - 1].target;
        const remaining = fromCents(toCents(finalTarget) - toCents(currentBalance));
        if (remaining <= 0) return alert('Pușculița a ajuns la 100 RON. Apasă „Sparge pușculița” ca să începeți din nou.');
        if (toCents(value) > toCents(remaining)) return alert('Mai lipsesc doar ' + money(remaining) + ' RON până la 100 RON. Moneda asta trece peste target.');

        const localTransaction = {
          id: 'local-piggy-' + Date.now() + '-' + Math.random().toString(16).slice(2),
          goal_id: null,
          goal_title: PIGGY_TITLE,
          amount: value,
          from_role: currentUser.email,
          to_role: currentUser.email,
          date: todayISO(),
          timestamp: new Date().toISOString(),
          family_code: familyCode
        };
        transactions.unshift(localTransaction);
        suppressSoftUntil = Date.now() + 1100;
        renderApp(true);
        try {
          const tr = await supabase.from('transactions').insert([{
            goal_id: null,
            goal_title: PIGGY_TITLE,
            amount: value,
            from_role: currentUser.email,
            to_role: currentUser.email,
            date: todayISO(),
            timestamp: new Date().toISOString(),
            family_code: familyCode
          }]).select('*').maybeSingle();
          if (tr.error) throw tr.error;
          if (tr.data) transactions = transactions.map(t => t.id === localTransaction.id ? tr.data : t);
          suppressSoftUntil = Date.now() + 1100;
          renderApp(true);
          scheduleSoftRefresh();
        } catch (error) {
          transactions = transactions.filter(t => t.id !== localTransaction.id);
          renderApp(true);
          alert('Eroare la pușculiță: ' + (error.message || error));
        }
      },

      async breakPiggy() {
        const balance = piggyBalance();
        if (!currentUser || balance <= 0) return;
        if (!confirm('Spargi pușculița și o resetezi de la 0?')) return;
        const value = -fromCents(toCents(balance));
        const localTransaction = {
          id: 'local-piggy-break-' + Date.now(),
          goal_id: null,
          goal_title: PIGGY_TITLE,
          amount: value,
          from_role: currentUser.email,
          to_role: currentUser.email,
          date: todayISO(),
          timestamp: new Date().toISOString(),
          family_code: familyCode
        };
        transactions.unshift(localTransaction);
        suppressSoftUntil = Date.now() + 1300;
        showConfetti();
        renderApp(true);
        try {
          const tr = await supabase.from('transactions').insert([{
            goal_id: null,
            goal_title: PIGGY_TITLE,
            amount: value,
            from_role: currentUser.email,
            to_role: currentUser.email,
            date: todayISO(),
            timestamp: new Date().toISOString(),
            family_code: familyCode
          }]).select('*').maybeSingle();
          if (tr.error) throw tr.error;
          if (tr.data) transactions = transactions.map(t => t.id === localTransaction.id ? tr.data : t);
          suppressSoftUntil = Date.now() + 1300;
          renderApp(true);
          scheduleSoftRefresh();
        } catch (error) {
          transactions = transactions.filter(t => t.id !== localTransaction.id);
          renderApp(true);
          alert('Eroare la resetarea pușculiței: ' + (error.message || error));
        }
      },


      async saveFamilyCode() {
        const newCode = normalizeFamilyCode(document.getElementById('familyCodeSettingsInput')?.value || familyCode || DEFAULT_FAMILY_CODE);
        if (!newCode) return alert('Scrie un cod familie.');
        const oldCode = familyCode;
        familyCode = newCode;
        localStorage.setItem(userFamilyStorageKey(), familyCode);
        localStorage.setItem('familyCodeLocked:' + currentUser.id, '1');
        try {
          const rpc = await supabase.rpc('set_my_family_code', { p_family_code: familyCode });
          if (rpc.error) {
            const msg = String(rpc.error.message || rpc.error.details || '').toLowerCase();
            const missingRpc = rpc.error.code === 'PGRST202' || msg.includes('function') || msg.includes('could not find');
            if (!missingRpc) throw rpc.error;
            const up = await supabase.from('profiles').upsert({ id: currentUser.id, email: currentUser.email, role: getRole(currentUser.email), family_code: familyCode }, { onConflict: 'id' });
            if (up.error) throw up.error;
            await supabase.from('goals').update({ family_code: familyCode }).eq('owner', currentUser.email);
            await supabase.from('transactions').update({ family_code: familyCode }).or(`from_role.eq.${currentUser.email},to_role.eq.${currentUser.email}`);
          }
          dataLoadedOnce = false;
          completedNotified = new Set();
          await fetchData({ soft: true });
          familyCodeStatus = '';
          renderApp(true);
        } catch (error) {
          familyCode = oldCode;
          localStorage.setItem(userFamilyStorageKey(), familyCode);
          alert('Eroare la cod familie: ' + (error.message || error));
        }
      },
      openProfileMenu() {
        modal.innerHTML = `<div class="modal-backdrop"><div class="sheet"><div class="grab"></div><h3 class="text-xl font-medium mb-1">Profil</h3><p class="text-sm muted mb-4">Alege ce vrei să faci cu contul tău.</p><div class="space-y-2"><button class="btn btn-danger btn-full profile-menu-action" onclick="window.appActions.logout()">${svg.logOut} Deconectare</button><button class="btn btn-delete-account btn-full profile-menu-action" onclick="window.appActions.openDeleteAccount()">${svg.trash} Șterge Cont</button><button class="btn btn-soft btn-full" onclick="window.appActions.closeModal()">Închide</button></div></div></div>`;
      },
      openDeleteAccount() {
        modal.innerHTML = `<div class="modal-backdrop"><div class="sheet"><div class="grab"></div><h3 class="text-xl font-medium mb-1">Șterge cont</h3><p class="text-sm muted mb-4">Asta șterge contul tău, obiectivele tale, calculele tale și datele tale din aplicație. Acțiunea nu se poate anula.</p><div class="grid grid-cols-2 gap-2"><button class="btn btn-soft btn-full" onclick="window.appActions.closeModal()">Anulează</button><button class="btn btn-delete-account btn-full" onclick="window.appActions.deleteAccount()">Șterge Cont</button></div></div></div>`;
      },
      async deleteAccount() {
        try {
          const { error } = await supabase.rpc('delete_my_account');
          if (error) throw error;
          localStorage.removeItem('keepLogged');
          localStorage.removeItem(userFamilyStorageKey());
          await supabase.auth.signOut();
          currentUser = null;
          modal.innerHTML = '';
          authHTML(true);
        } catch (error) {
          alert('Eroare la ștergere cont: ' + (error.message || error));
        }
      },
      async uploadAvatar(e) {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const avatar = await avatarFileToBase64(file);
          const role = getRole(currentUser.email);
          const { error } = await supabase.from('profiles').upsert({ id:currentUser.id, email:currentUser.email, role, avatar, family_code: familyCode }, { onConflict:'id' });
          if (error) return alert(error.message);
          const p = getProfile(currentUser.email);
          if (p) p.avatar = avatar;
          else profiles.push({ id:currentUser.id, email:currentUser.email, role, avatar, family_code: familyCode });
          renderApp(true);
          scheduleSoftRefresh();
        } catch (error) {
          alert(error.message || 'Nu am putut procesa poza.');
        } finally {
          e.target.value = '';
        }
      },
      toggleTheme() { const dark = document.body.classList.toggle('dark-mode'); localStorage.setItem('appTheme', dark ? 'dark' : 'light'); },
      async logout() { const k = userFamilyStorageKey(); await supabase.auth.signOut(); localStorage.removeItem('keepLogged'); sessionStorage.removeItem('pendingFamilyCode'); currentUser = null; familyCode = ''; dataLoadedOnce = false; completedNotified = new Set(); authHTML(true); },
      calcPress(v) { if (v === 'C') { calcExpression=''; calcResult='0'; renderApp(); return; } calcExpression += v === '×' ? '*' : v === '÷' ? '/' : v; renderApp(); },
      calcBack() { calcExpression = calcExpression.slice(0,-1); renderApp(); },
      calcEquals() { try { if (!/^[0-9+\-*/().\s]+$/.test(calcExpression)) throw new Error(); const r = Function('"use strict";return ('+calcExpression+')')(); calcResult = Number.isFinite(Number(r)) ? String(Math.round(Number(r)*100)/100) : 'Eroare'; } catch { calcResult='Eroare'; } renderApp(); },
      async saveCalc() { if (!calcExpression || calcResult === '0' || calcResult === 'Eroare') return alert('Fă întâi un calcul valid.'); const note = document.getElementById('calcNoteInput')?.value.trim() || ''; const { error } = await supabase.from('calculator_history').insert([{ user_email:currentUser.email, expression:calcExpression, result:calcResult, note }]); if (error) return alert(error.message); await fetchData({ soft:true }); }
    };

    async function start() {
      try {
        const { data, error } = await supabase.auth.getSession();
        if (error) throw error;
        const session = data.session;
        if (session && localStorage.getItem('keepLogged') === '0') {
          await supabase.auth.signOut();
          authHTML(true);
          return;
        }
        if (session) {
          currentUser = session.user;
          currentPage = 'home';
          previousPage = 'home';
          selectedGoalId = null;
          await ensureOwnProfile();
          dataLoadedOnce = false;
          completedNotified = new Set();
          await fetchData();
          setupRealtime();
        } else authHTML(true);
        supabase.auth.onAuthStateChange(async (_event, session) => {
          if (session?.user && session.user.id !== currentUser?.id) {
            currentUser = session.user;
            await ensureOwnProfile();
            await fetchData();
            setupRealtime();
          } else if (!session && currentUser) {
            currentUser = null;
            authHTML(true);
          }
        });
      } catch (e) {
        console.error(e);
        app.innerHTML = `<div class="screen no-nav flex flex-col justify-center"><div class="card text-center"><h2 class="text-xl font-medium mb-2">Eroare la pornire</h2><p class="text-sm muted mb-4">${escapeHTML(e.message || e)}</p><button class="btn btn-gold btn-full" onclick="location.reload()">Reîncarcă</button></div></div>`;
      }
    }

    start();
  </script>
