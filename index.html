<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Obiectivele Familiei</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: { primary: '#4f46e5' }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        .fade-in { animation: fadeIn 0.25s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .modal-backdrop { background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(4px); }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom); }
        .calendar-strip { scroll-snap-type: x mandatory; }
        .calendar-day { scroll-snap-align: center; }
        .calendar-touch-zone { touch-action: pan-y; }
        .calendar-days-track { will-change: transform; transition: transform .22s ease; }
        .calendar-days-track.dragging { transition: none; }
        .goal-card { transition: transform .15s ease, box-shadow .15s ease; }
        .goal-card:active { transform: scale(.985); }
        .confetti-piece {
            position: fixed;
            top: -12px;
            width: 8px;
            height: 12px;
            border-radius: 3px;
            z-index: 9999;
            animation: confettiFall 1.45s ease-out forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
        }


        /* INTERFAȚĂ NOUĂ - Premium Mobile UI */
        body.ui-v2 {
            background:
                radial-gradient(circle at 12% 8%, rgba(239, 68, 68, .20), transparent 32%),
                radial-gradient(circle at 90% 18%, rgba(99, 102, 241, .24), transparent 34%),
                linear-gradient(145deg, #fff7f7 0%, #f7f8ff 48%, #f8fafc 100%) !important;
            overflow-x: hidden;
        }
        html.dark body.ui-v2 {
            background:
                radial-gradient(circle at 10% 4%, rgba(239, 68, 68, .16), transparent 30%),
                radial-gradient(circle at 90% 10%, rgba(99, 102, 241, .16), transparent 34%),
                linear-gradient(145deg, #020617 0%, #0f172a 58%, #111827 100%) !important;
        }
        body.ui-v2::before {
            content: "";
            position: fixed;
            inset: 0;
            pointer-events: none;
            background-image:
                linear-gradient(rgba(255,255,255,.32) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,.25) 1px, transparent 1px);
            background-size: 34px 34px;
            mask-image: linear-gradient(to bottom, rgba(0,0,0,.18), transparent 65%);
            z-index: -1;
        }
        body.ui-v2 #app {
            background: rgba(248, 250, 252, .72) !important;
            backdrop-filter: blur(22px);
            border-left: 1px solid rgba(255,255,255,.65);
            border-right: 1px solid rgba(255,255,255,.65);
            box-shadow: 0 30px 90px rgba(15, 23, 42, .18) !important;
        }
        html.dark body.ui-v2 #app {
            background: rgba(15, 23, 42, .72) !important;
            border-color: rgba(148, 163, 184, .12);
            box-shadow: 0 30px 90px rgba(0, 0, 0, .40) !important;
        }
        body.ui-v2 .premium-hero {
            position: relative;
            overflow: hidden;
            padding: 18px;
            border-radius: 30px;
            background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 48%, #ef4444 100%);
            box-shadow: 0 20px 45px rgba(79, 70, 229, .24);
        }
        body.ui-v2 .premium-hero::after {
            content: "";
            position: absolute;
            width: 140px;
            height: 140px;
            right: -60px;
            top: -55px;
            border-radius: 999px;
            background: rgba(255,255,255,.20);
        }
        body.ui-v2 .premium-hero h2,
        body.ui-v2 .premium-hero p { color: white !important; }
        body.ui-v2 .premium-hero button {
            background: rgba(255,255,255,.20) !important;
            border-color: rgba(255,255,255,.28) !important;
            color: white !important;
            backdrop-filter: blur(12px);
        }
        body.ui-v2 .premium-panel {
            background: rgba(255, 255, 255, .82) !important;
            border: 1px solid rgba(255, 255, 255, .72) !important;
            box-shadow: 0 18px 45px rgba(15, 23, 42, .08) !important;
            backdrop-filter: blur(18px);
        }
        html.dark body.ui-v2 .premium-panel {
            background: rgba(30, 41, 59, .70) !important;
            border-color: rgba(148, 163, 184, .16) !important;
            box-shadow: 0 18px 45px rgba(0, 0, 0, .20) !important;
        }
        body.ui-v2 .premium-goal {
            background: linear-gradient(180deg, rgba(255,255,255,.92), rgba(248,250,252,.86)) !important;
            border: 1px solid rgba(226, 232, 240, .78) !important;
            box-shadow: 0 14px 35px rgba(15, 23, 42, .07);
            border-radius: 26px !important;
        }
        html.dark body.ui-v2 .premium-goal {
            background: linear-gradient(180deg, rgba(30,41,59,.86), rgba(15,23,42,.76)) !important;
            border-color: rgba(148,163,184,.16) !important;
        }
        body.ui-v2 .premium-stat {
            background: rgba(255,255,255,.78) !important;
            border: 1px solid rgba(255,255,255,.72) !important;
            box-shadow: 0 14px 35px rgba(15,23,42,.07) !important;
            backdrop-filter: blur(14px);
        }
        html.dark body.ui-v2 .premium-stat {
            background: rgba(30,41,59,.70) !important;
            border-color: rgba(148,163,184,.16) !important;
        }
        body.ui-v2 .premium-nav {
            background: rgba(255,255,255,.82) !important;
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(226,232,240,.75) !important;
            box-shadow: 0 -18px 45px rgba(15,23,42,.10) !important;
        }
        html.dark body.ui-v2 .premium-nav {
            background: rgba(15,23,42,.84) !important;
            border-top-color: rgba(148,163,184,.16) !important;
        }
        body.ui-v2 .premium-sheet {
            background: rgba(255,255,255,.92) !important;
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255,255,255,.70);
        }
        html.dark body.ui-v2 .premium-sheet {
            background: rgba(30,41,59,.92) !important;
            border-color: rgba(148,163,184,.16);
        }
        body.ui-v2 input,
        body.ui-v2 textarea {
            border-radius: 18px !important;
        }
        body.ui-v2 button { -webkit-tap-highlight-color: transparent; }
        body.ui-v2 button:active { transform: scale(.98); }

    </style>
</head>
<body class="ui-v2 bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 antialiased min-h-screen transition-colors duration-300">
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col relative pb-20 shadow-2xl bg-slate-50 dark:bg-slate-900">
        <div class="flex h-screen items-center justify-center text-indigo-500 font-bold">Se încarcă...</div>
    </div>
    <div id="modalContainer"></div>
    <div id="confettiRoot"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const supabaseUrl = 'https://hfqsouqtqvyxegcrabnc.supabase.co';
        const supabaseKey = 'sb_publishable_eqlbyUXpwcp-i-dPhFPsmA_wHqDW1AD';
        const supabase = createClient(supabaseUrl, supabaseKey);

        let currentUser = null;
        let goals = [];
        let transactions = [];
        let profiles = [];
        let calculatorHistory = [];
        let currentTab = 'home';
        let previousTab = 'home';
        let selectedGoalId = null;
        let selectedDate = new Date().toISOString().split('T')[0];
        let realTimeSubscription = null;
        let deferredPrompt = null;
        let calcExpression = '';
        let calcResult = '0';
        let touchStartX = 0;
        let touchCurrentX = 0;
        let calendarDragging = false;
        let calendarSwipeBlockClickUntil = 0;
        let softRefreshTimer = null;
        window.selectedSignupRole = 'sot';

        const appContainer = document.getElementById('app');

        const money = (value) => {
            const n = Number(value || 0);
            return n.toLocaleString('ro-RO', { maximumFractionDigits: 2 });
        };

        const todayISO = () => new Date().toISOString().split('T')[0];

        const addDays = (dateStr, days) => {
            const d = new Date(dateStr + 'T12:00:00');
            d.setDate(d.getDate() + days);
            return d.toISOString().split('T')[0];
        };

        const formatShortDate = (dateStr) => {
            const d = new Date(dateStr + 'T12:00:00');
            return d.toLocaleDateString('ro-RO', { weekday: 'short', day: '2-digit', month: 'short' });
        };

        const formatFullDate = (dateStr) => {
            const d = new Date(dateStr + 'T12:00:00');
            return d.toLocaleDateString('ro-RO', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' });
        };

        const getProfile = (email) => profiles.find(p => p.email === email);
        const getRole = (email) => {
            if (email === currentUser?.email) return getProfile(email)?.role || currentUser?.user_metadata?.role || 'sot';
            return getProfile(email)?.role || 'sotie';
        };
        const roleLabel = (role) => role === 'sotie' ? 'Soție' : 'Soț';
        const ownerLabel = (email) => email === currentUser?.email ? 'Tu' : roleLabel(getRole(email));
        const getPartnerEmail = () => {
            const p = profiles.find(p => p.email && p.email !== currentUser?.email);
            if (p) return p.email;
            const goal = goals.find(g => g.owner !== currentUser?.email);
            return goal ? goal.owner : null;
        };

        const redBtn = 'bg-red-500 hover:bg-red-600 text-white';
        const indigoBtn = 'bg-indigo-600 hover:bg-indigo-700 text-white';
        const accentButton = (role) => role === 'sotie' ? redBtn : indigoBtn;
        const accentText = (role) => role === 'sotie' ? 'text-red-600 dark:text-red-400' : 'text-indigo-600 dark:text-indigo-400';
        const accentBorder = (role) => role === 'sotie' ? 'border-red-400' : 'border-indigo-500';
        const accentBgSoft = (role) => role === 'sotie' ? 'bg-red-50 dark:bg-red-900/20' : 'bg-indigo-50 dark:bg-indigo-900/20';
        const accentBar = (role) => role === 'sotie' ? 'bg-red-500' : 'bg-indigo-500';

        const initTheme = () => {
            const savedTheme = localStorage.getItem('appTheme') || 'light';
            document.documentElement.classList.toggle('dark', savedTheme === 'dark');
        };
        initTheme();

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        const safeFetch = async (label, promise) => {
            try {
                const { data, error } = await promise;
                if (error) {
                    console.error(label, error);
                    return [];
                }
                return data || [];
            } catch (error) {
                console.error(label, error);
                return [];
            }
        };

        const ensureOwnProfile = async () => {
            if (!currentUser) return;
            const existingRole = currentUser.user_metadata?.role || window.selectedSignupRole || 'sot';
            await supabase.from('profiles').upsert({
                id: currentUser.id,
                email: currentUser.email,
                role: existingRole
            }, { onConflict: 'id' });
        };

        const checkAuth = async () => {
            appContainer.innerHTML = `<div class="flex h-screen items-center justify-center"><i class="fas fa-spinner fa-spin text-4xl text-indigo-500"></i></div>`;
            const { data: { session }, error } = await supabase.auth.getSession();
            if (error) throw error;
            if (session) {
                currentUser = session.user;
                await ensureOwnProfile();
                await fetchData();
                setupRealtime();
            } else {
                renderAuth();
            }

            supabase.auth.onAuthStateChange(async (_event, session) => {
                if (session) {
                    currentUser = session.user;
                    await ensureOwnProfile();
                    await fetchData();
                    setupRealtime();
                } else {
                    currentUser = null;
                    goals = [];
                    transactions = [];
                    profiles = [];
                    calculatorHistory = [];
                    currentTab = 'home';
                    renderAuth();
                }
            });
        };

        const renderMainSoft = () => {
            const modalOpen = (document.getElementById('modalContainer')?.innerHTML || '').trim().length > 0;
            if (modalOpen) return;
            const scroller = appContainer.querySelector('[data-scroll-area="true"]');
            const scrollTop = scroller ? scroller.scrollTop : 0;
            renderMain();
            requestAnimationFrame(() => {
                const newScroller = appContainer.querySelector('[data-scroll-area="true"]');
                if (newScroller) newScroller.scrollTop = scrollTop;
            });
        };

        const fetchData = async (options = {}) => {
            if (!currentUser) return;
            const shouldRender = options.render !== false;
            const soft = options.soft === true;
            const [goalsData, transData, profileData, calcData] = await Promise.all([
                safeFetch('goals', supabase.from('goals').select('*').order('created_at', { ascending: false })),
                safeFetch('transactions', supabase.from('transactions').select('*').order('timestamp', { ascending: false })),
                safeFetch('profiles', supabase.from('profiles').select('*').order('created_at', { ascending: true })),
                safeFetch('calculator_history', supabase.from('calculator_history').select('*').eq('user_email', currentUser.email).order('created_at', { ascending: false }).limit(30))
            ]);
            goals = goalsData;
            transactions = transData;
            profiles = profileData;
            calculatorHistory = calcData;
            if (shouldRender) {
                if (soft) renderMainSoft();
                else renderMain();
            }
        };

        const scheduleSoftFetch = () => {
            clearTimeout(softRefreshTimer);
            softRefreshTimer = setTimeout(() => fetchData({ soft: true }), 350);
        };

        const setupRealtime = () => {
            if (realTimeSubscription) supabase.removeChannel(realTimeSubscription);
            realTimeSubscription = supabase.channel('public-changes')
                .on('postgres_changes', { event: '*', schema: 'public', table: 'goals' }, scheduleSoftFetch)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'transactions' }, scheduleSoftFetch)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'profiles' }, scheduleSoftFetch)
                .on('postgres_changes', { event: '*', schema: 'public', table: 'calculator_history' }, scheduleSoftFetch)
                .subscribe();
        };

        const renderAuth = (isLogin = true) => {
            const roleSelector = isLogin ? '' : `
                <div class="mb-4 fade-in">
                    <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-2">Alege Profilul:</label>
                    <div class="flex gap-3">
                        <button type="button" id="btnRoleSot" onclick="window.appActions.selectRole('sot')" class="flex-1 py-3 rounded-xl font-bold border-2 transition-all border-indigo-500 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400">Soț</button>
                        <button type="button" id="btnRoleSotie" onclick="window.appActions.selectRole('sotie')" class="flex-1 py-3 rounded-xl font-bold border-2 transition-all border-slate-200 dark:border-slate-700 text-slate-500">Soție</button>
                    </div>
                </div>
            `;

            appContainer.innerHTML = `
                <div class="flex-1 flex flex-col justify-center px-6 py-12 fade-in min-h-screen bg-transparent">
                    <div class="text-center mb-10">
                        <div class="inline-flex items-center justify-center w-20 h-20 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-400 rounded-full mb-4 shadow-sm">
                            <i class="fas fa-heart text-3xl"></i>
                        </div>
                        <h1 class="text-3xl font-bold text-slate-800 dark:text-white">Obiective Familiei</h1>
                        <p class="text-slate-500 dark:text-slate-400 mt-2">${isLogin ? 'Autentificare cont' : 'Creare cont nou'}</p>
                    </div>

                    <div class="space-y-4 w-full">
                        ${roleSelector}
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Email</label>
                            <input type="email" id="emailInput" autocomplete="email" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white" placeholder="tu@familie.ro">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Parolă</label>
                            <input type="password" id="passInput" autocomplete="${isLogin ? 'current-password' : 'new-password'}" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white" placeholder="••••••••">
                        </div>
                        <p class="text-xs text-slate-400 dark:text-slate-500 -mt-1"><i class="fas fa-lock mr-1"></i>Salvează parola pentru o conectare mai rapidă.</p>
                        <button id="authBtn" onclick="window.appActions.handleAuth(${isLogin})" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-all shadow-md mt-4">
                            ${isLogin ? 'Conectare' : 'Creează Cont'}
                        </button>
                    </div>

                    <div class="mt-6 text-center">
                        <button onclick="window.appActions.toggleAuthMode(${!isLogin})" class="text-indigo-600 dark:text-indigo-400 font-medium hover:underline text-sm">
                            ${isLogin ? 'Nu ai cont? Creează unul acum.' : 'Ai deja cont? Conectează-te.'}
                        </button>
                    </div>
                </div>
            `;
        };

        const renderMain = () => {
            let content = '';
            let showNav = true;
            if (currentTab === 'home') content = getHomeHTML();
            else if (currentTab === 'profile') content = getProfileHTML();
            else if (currentTab === 'partner') content = getPartnerProfileHTML();
            else if (currentTab === 'calculator') { content = getCalculatorHTML(); showNav = false; }
            else if (currentTab === 'goalStats') { content = getGoalStatsHTML(); showNav = false; }
            else content = getHomeHTML();

            appContainer.innerHTML = `
                <div data-scroll-area="true" class="flex-1 overflow-y-auto hide-scroll ${showNav ? 'pb-24' : 'pb-6'} p-4 md:p-6 fade-in h-full">
                    ${content}
                </div>
                ${showNav ? getBottomNavHTML() : ''}
            `;
        };

        const getHomeHTML = () => {
            const myRole = getRole(currentUser.email);
            const partnerRole = myRole === 'sot' ? 'sotie' : 'sot';
            const myRoleName = roleLabel(myRole);
            const partnerRoleName = myRole === 'sot' ? 'Soției' : 'Soțului';
            const myGoals = goals.filter(g => g.owner === currentUser.email);
            const partnerGoals = goals.filter(g => g.owner !== currentUser.email);
            const selectedTransactions = transactions.filter(t => String(t.date).slice(0, 10) === selectedDate);
            const totalSelected = selectedTransactions.reduce((sum, t) => sum + Number(t.amount || 0), 0);
            const totalOferit = transactions.filter(t => t.from_role === currentUser.email && t.to_role !== currentUser.email).reduce((sum, t) => sum + Math.max(0, Number(t.amount || 0)), 0);
            const totalPrimit = transactions.filter(t => t.to_role === currentUser.email && t.from_role !== currentUser.email).reduce((sum, t) => sum + Math.max(0, Number(t.amount || 0)), 0);

            return `
                <header class="premium-hero flex justify-between items-center mb-5">
                    <div>
                        <h2 class="font-bold text-slate-800 dark:text-white text-2xl">Salut, ${myRoleName}!</h2>
                        <p class="text-sm text-slate-500 dark:text-slate-400">Situația obiectivelor voastre</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="window.appActions.openCalculator()" class="w-11 h-11 rounded-full bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-indigo-600 dark:text-indigo-400 flex items-center justify-center shadow-sm">
                            <i class="fas fa-calculator"></i>
                        </button>
                        ${getAvatarHtml(11, currentUser.email)}
                    </div>
                </header>

                <div class="grid grid-cols-2 gap-3 mb-5">
                    <div class="premium-stat bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm">
                        <p class="text-xs text-slate-500 dark:text-slate-400 font-bold uppercase mb-1">Ai oferit</p>
                        <p class="text-2xl font-black text-slate-800 dark:text-white">${money(totalOferit)} <span class="text-sm font-medium text-slate-500">RON</span></p>
                    </div>
                    <div class="premium-stat bg-white dark:bg-slate-800 p-4 rounded-2xl border border-slate-100 dark:border-slate-700 shadow-sm">
                        <p class="text-xs text-slate-500 dark:text-slate-400 font-bold uppercase mb-1">Ai primit</p>
                        <p class="text-2xl font-black text-slate-800 dark:text-white">${money(totalPrimit)} <span class="text-sm font-medium text-slate-500">RON</span></p>
                    </div>
                </div>

                <div class="space-y-6">
                    <section class="premium-panel bg-white dark:bg-slate-800 rounded-[2rem] p-4 shadow-sm border border-slate-100 dark:border-slate-700">
                        <div class="flex items-center justify-between mb-3">
                            <h3 class="font-bold text-lg text-slate-800 dark:text-white">Obiectivele Mele</h3>
                            <span class="h-1.5 w-16 rounded-full ${accentBar(myRole)}"></span>
                        </div>
                        <div class="space-y-3">
                            ${myGoals.length === 0 ? `<p class="text-center text-sm text-slate-400 py-4">Niciun obiectiv adăugat.</p>` : myGoals.map(g => generateGoalCard(g, true)).join('')}
                        </div>
                    </section>

                    <section class="premium-panel ${accentBgSoft(partnerRole)} rounded-[2rem] p-4 shadow-sm border border-slate-100 dark:border-slate-700">
                        <div onclick="window.appActions.switchTab('partner')" class="flex items-center justify-between mb-3 cursor-pointer">
                            <h3 class="font-bold text-lg text-slate-800 dark:text-white">Obiectivele ${partnerRoleName}</h3>
                            <span class="h-1.5 w-16 rounded-full ${accentBar(partnerRole)}"></span>
                        </div>
                        <div class="space-y-3">
                            ${partnerGoals.length === 0 ? `<p class="text-center text-sm text-slate-400 py-4">Partenerul nu are obiective.</p>` : partnerGoals.slice(0, 2).map(g => generateGoalCard(g, false)).join('')}
                            ${partnerGoals.length > 2 ? `<button onclick="window.appActions.switchTab('partner')" class="w-full text-center text-sm font-medium ${accentText(partnerRole)} py-2 bg-white/70 dark:bg-slate-800 rounded-xl mt-2">Vezi toate cele ${partnerGoals.length} obiective</button>` : ''}
                        </div>
                    </section>

                    <section class="premium-panel bg-white dark:bg-slate-800 rounded-[2rem] p-4 shadow-sm border border-slate-100 dark:border-slate-700">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="font-bold text-lg text-slate-800 dark:text-white"><i class="far fa-calendar-alt text-indigo-500 mr-2"></i>Istoric</h3>

                            ${isMine ? `
                                <button onclick="event.stopPropagation(); window.appActions.openMoneyModal('${goal.id}', 'add_self')" class="text-xs ${btnClass} px-3 py-1.5 rounded-lg shadow-sm font-medium">Pune</button>
                                <button onclick="event.stopPropagation(); window.appActions.openMoneyModal('${goal.id}', 'remove_self')" class="text-xs bg-slate-200 hover:bg-slate-300 dark:bg-slate-600 dark:hover:bg-slate-500 text-slate-700 dark:text-white px-3 py-1.5 rounded-lg shadow-sm font-medium">Scoate</button>
                            ` : (!isCompleted ? `
                                <button onclick="event.stopPropagation(); window.appActions.openMoneyModal('${goal.id}', 'gift')" class="text-xs ${btnClass} px-3 py-1.5 rounded-lg shadow-sm font-medium">Oferă</button>
                            ` : '')}
                        </div>
                    </div>
                </div>
            `;
        };

        const showConfetti = () => {
            const root = document.getElementById('confettiRoot');
            const colors = ['#22c55e', '#6366f1', '#ef4444', '#f59e0b', '#06b6d4'];
            for (let i = 0; i < 42; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + 'vw';
                piece.style.background = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDelay = (Math.random() * 0.25) + 's';
                piece.style.transform = `rotate(${Math.random() * 180}deg)`;
                root.appendChild(piece);
                setTimeout(() => piece.remove(), 1800);
            }
        };

        window.appActions = {
            selectRole: (role) => {
                window.selectedSignupRole = role;
                const btnSot = document.getElementById('btnRoleSot');
                const btnSotie = document.getElementById('btnRoleSotie');
                if (!btnSot || !btnSotie) return;
                if (role === 'sot') {
                    btnSot.className = "flex-1 py-3 rounded-xl font-bold border-2 transition-all border-indigo-500 bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400";
                    btnSotie.className = "flex-1 py-3 rounded-xl font-bold border-2 transition-all border-slate-200 dark:border-slate-700 text-slate-500";
                } else {
                    btnSotie.className = "flex-1 py-3 rounded-xl font-bold border-2 transition-all border-red-500 bg-red-50 dark:bg-red-900/30 text-red-600 dark:text-red-400";
                    btnSot.className = "flex-1 py-3 rounded-xl font-bold border-2 transition-all border-slate-200 dark:border-slate-700 text-slate-500";
                }
            },
            toggleAuthMode: (isLogin) => renderAuth(isLogin),
            switchTab: (tab) => { previousTab = currentTab; currentTab = tab; renderMain(); },
            goBack: () => { currentTab = previousTab && previousTab !== currentTab ? previousTab : 'home'; renderMain(); },
            openCalculator: () => { previousTab = currentTab; currentTab = 'calculator'; renderMain(); },
            openGoalStats: (goalId) => { selectedGoalId = goalId; previousTab = currentTab; currentTab = 'goalStats'; renderMain(); },
            changeDate: (date) => {
                if (Date.now() < calendarSwipeBlockClickUntil) return;
                selectedDate = date;
                renderMain();
            },
            shiftDate: (days) => {
                selectedDate = addDays(selectedDate, days);
                renderMain();
            },
            calendarSwipeStart: (e) => {
                if (e.target.closest('button')) return;
                calendarDragging = true;
                touchStartX = e.clientX;
                touchCurrentX = e.clientX;
                const track = document.getElementById('calendarDaysTrack');
                if (track) track.classList.add('dragging');
                try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
            },
            calendarSwipeMove: (e) => {
                if (!calendarDragging) return;
                touchCurrentX = e.clientX;
                const diff = touchCurrentX - touchStartX;
                const track = document.getElementById('calendarDaysTrack');
                if (track) track.style.transform = `translateX(${Math.max(-85, Math.min(85, diff))}px)`;
            },
            calendarSwipeEnd: (e) => {
                if (!calendarDragging) return;
                calendarDragging = false;
                const diff = (e.clientX || touchCurrentX) - touchStartX;
                const track = document.getElementById('calendarDaysTrack');
                if (track) {
                    track.classList.remove('dragging');
                    track.style.transform = '';
                }
                if (Math.abs(diff) > 35) {
                    calendarSwipeBlockClickUntil = Date.now() + 350;
                    window.appActions.shiftDate(diff < 0 ? 1 : -1);
                }
            },
            calendarSwipeCancel: () => {
                calendarDragging = false;
                const track = document.getElementById('calendarDaysTrack');
                if (track) {
                    track.classList.remove('dragging');
                    track.style.transform = '';
                }
            },
            closeModal: () => { document.getElementById('modalContainer').innerHTML = ''; },
            toggleTheme: () => {
                const html = document.documentElement;
                const dark = html.classList.toggle('dark');
                localStorage.setItem('appTheme', dark ? 'dark' : 'light');
            },
            uploadAvatar: (e) => {
                const file = e.target.files[0];
                if (!file || !currentUser) return;
                if (file.size > 900000) {
                    alert('Poza e cam mare. Alege una mai mică sau fă screenshot/crop.');
                    return;
                }
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const avatar = ev.target.result;
                    const role = getRole(currentUser.email);
                    const { error } = await supabase.from('profiles').upsert({
                        id: currentUser.id,
                        email: currentUser.email,
                        role,
                        avatar
                    }, { onConflict: 'id' });
                    if (error) return alert('Eroare la salvarea pozei: ' + error.message);
                    const localProfile = getProfile(currentUser.email);
                    if (localProfile) localProfile.avatar = avatar;
                    else profiles.push({ id: currentUser.id, email: currentUser.email, role, avatar });
                    renderMain();
                };
                reader.readAsDataURL(file);
            },
            handleAuth: async (isLogin) => {
                const email = document.getElementById('emailInput').value.trim();
                const password = document.getElementById('passInput').value;
                const btn = document.getElementById('authBtn');
                if (!email || !password) { alert('Completează ambele câmpuri!'); return; }
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Se procesează...';
                btn.disabled = true;
                try {
                    let err;
                    if (isLogin) {
                        const { error } = await supabase.auth.signInWithPassword({ email, password });
                        err = error;
                    } else {
                        const { data, error } = await supabase.auth.signUp({ email, password, options: { data: { role: window.selectedSignupRole } } });
                        err = error;
                        if (!error && data?.user) {
                            await supabase.from('profiles').upsert({ id: data.user.id, email, role: window.selectedSignupRole }, { onConflict: 'id' });
                        }
                    }
                    if (err) throw err;
                } catch (error) {
                    alert('Eroare: ' + (error.message || 'Date incorecte.'));
                    btn.innerHTML = isLogin ? 'Conectare' : 'Creează Cont';
                    btn.disabled = false;
                }
            },
            logout: async () => { await supabase.auth.signOut(); },
            openAddGoalModal: () => {
                document.getElementById('modalContainer').innerHTML = `
                    <div class="fixed inset-0 modal-backdrop flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
                        <div class="premium-sheet bg-white dark:bg-slate-800 rounded-t-[2rem] sm:rounded-[2rem] shadow-xl w-full max-w-md p-6 fade-in relative transition-colors">
                            <div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-6 sm:hidden"></div>
                            <button onclick="window.appActions.closeModal()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600 dark:hover:text-white hidden sm:block"><i class="fas fa-times text-xl"></i></button>
                            <h3 class="text-xl font-bold mb-4 text-slate-800 dark:text-white">Adaugă Obiectiv</h3>
                            <div class="space-y-4">
                                <div><label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Titlu</label><input type="text" id="goalTitleInput" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white" placeholder="ex. Vacanță"></div>
                                <div><label class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Suma necesară (RON)</label><input type="number" id="goalTargetInput" min="1" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl focus:ring-2 focus:ring-indigo-500 outline-none dark:text-white"></div>
                                <div class="flex gap-3 pt-2"><button onclick="window.appActions.closeModal()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold py-3 rounded-xl">Anulează</button><button onclick="window.appActions.saveGoal()" id="saveGoalBtn" class="flex-1 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl transition-colors">Salvează</button></div>
                            </div>
                        </div>
                    </div>
                `;
            },
            saveGoal: async () => {
                const title = document.getElementById('goalTitleInput').value.trim();
                const target = parseFloat(document.getElementById('goalTargetInput').value);
                if (!title || isNaN(target) || target <= 0) return alert('Date invalide!');
                const btn = document.getElementById('saveGoalBtn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true;
                const newGoal = { title, target, current: 0, owner: currentUser.email };
                const { data, error } = await supabase.from('goals').insert([newGoal]).select().single();
                if (error) {
                    alert('Eroare la adăugare: ' + error.message);
                    btn.innerHTML = 'Salvează'; btn.disabled = false; return;
                }
                if (data) goals.unshift(data);
                window.appActions.closeModal();
                renderMain();
                scheduleSoftFetch();
            },
            openMoneyModal: (goalId, mode) => {
                const goal = goals.find(g => g.id === goalId);
                if (!goal) return;
                const title = mode === 'remove_self' ? 'Scoate bani' : mode === 'gift' ? 'Oferă bani' : 'Pune bani';
                const btnTitle = mode === 'remove_self' ? 'Scoate' : mode === 'gift' ? 'Oferă' : 'Pune';
                const btnClass = mode === 'remove_self' ? 'bg-slate-700 hover:bg-slate-800 text-white' : 'bg-green-500 hover:bg-green-600 text-white';
                document.getElementById('modalContainer').innerHTML = `
                    <div class="fixed inset-0 modal-backdrop flex items-end sm:items-center justify-center z-50 p-0 sm:p-4">
                        <div class="premium-sheet bg-white dark:bg-slate-800 rounded-t-[2rem] sm:rounded-[2rem] shadow-xl w-full max-w-md p-6 fade-in relative">
                            <div class="w-12 h-1.5 bg-slate-200 dark:bg-slate-700 rounded-full mx-auto mb-6 sm:hidden"></div>
                            <h3 class="text-xl font-bold mb-1 text-slate-800 dark:text-white">${title}</h3>
                            <p class="text-sm text-slate-500 dark:text-slate-400 mb-5">Pentru „${goal.title}”</p>
                            <div class="space-y-4">
                                <div class="relative"><span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-500 font-medium">RON</span><input type="number" id="moneyAmountInput" min="1" class="w-full pl-14 pr-4 py-4 bg-slate-50 dark:bg-slate-700 border border-slate-200 dark:border-slate-600 rounded-xl outline-none text-xl font-bold text-slate-800 dark:text-white" placeholder="0"></div>
                                <div class="flex gap-3 pt-2"><button onclick="window.appActions.closeModal()" class="flex-1 bg-slate-100 dark:bg-slate-700 text-slate-700 dark:text-slate-300 font-bold py-3 rounded-xl">Anulează</button><button onclick="window.appActions.applyMoney('${goalId}', '${mode}')" id="moneyActionBtn" class="flex-1 ${btnClass} font-bold py-3 rounded-xl transition-colors">${btnTitle}</button></div>
                            </div>
                        </div>
                    </div>
                `;
            },
            applyMoney: async (goalId, mode) => {
                const amountRaw = parseFloat(document.getElementById('moneyAmountInput').value);
                if (isNaN(amountRaw) || amountRaw <= 0) return alert('Sumă invalidă!');
                const goal = goals.find(g => g.id === goalId);
                if (!goal) return;
                if (mode === 'remove_self' && goal.owner !== currentUser.email) return alert('Poți scoate bani doar din obiectivul tău.');
                const signedAmount = mode === 'remove_self' ? -amountRaw : amountRaw;
                const oldAmount = Number(goal.current || 0);
                const btn = document.getElementById('moneyActionBtn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true;

                let newAmount = Math.max(0, oldAmount + signedAmount);
                const { data: rpcAmount, error: rpcError } = await supabase.rpc('adjust_goal_amount', {
                    p_goal_id: goalId,
                    p_delta: signedAmount
                });

                if (rpcError) {
                    const { error: updateError } = await supabase.from('goals').update({ current: newAmount }).eq('id', goalId);
                    if (updateError) { alert('Eroare: ' + updateError.message); window.appActions.closeModal(); return; }
                } else if (rpcAmount !== null && rpcAmount !== undefined) {
                    newAmount = Number(rpcAmount);
                }

                const { error: transError } = await supabase.from('transactions').insert([{
                    goal_id: goalId,
                    goal_title: goal.title,
                    amount: signedAmount,
                    from_role: currentUser.email,
                    to_role: goal.owner,
                    date: todayISO(),
                    timestamp: new Date().toISOString()
                }]);
                if (transError) console.error('transaction insert', transError);
                goal.current = newAmount;
                window.appActions.closeModal();
                renderMain();
                if (oldAmount < Number(goal.target || 0) && newAmount >= Number(goal.target || 0)) showConfetti();
                scheduleSoftFetch();
            },
            calcPress: (v) => {
                if (v === 'C') { calcExpression = ''; calcResult = '0'; renderMain(); return; }
                const value = v === '×' ? '*' : v === '÷' ? '/' : v;
                calcExpression += value;
                renderMain();
            },
            calcBackspace: () => { calcExpression = calcExpression.slice(0, -1); renderMain(); },
            calcEquals: () => {
                try {
                    if (!calcExpression || !/^[0-9+\-*/().\s]+$/.test(calcExpression)) throw new Error('Calcul invalid');
                    const result = Function('"use strict"; return (' + calcExpression + ')')();
                    if (!Number.isFinite(Number(result))) throw new Error('Rezultat invalid');
                    calcResult = String(Math.round(Number(result) * 100) / 100);
                } catch (error) {
                    calcResult = 'Eroare';
                }
                renderMain();
            },
            saveCalculation: async () => {
                if (!calcExpression || calcResult === '0' || calcResult === 'Eroare') return alert('Fă întâi un calcul valid.');
                const note = document.getElementById('calcNoteInput')?.value?.trim() || '';
                const btn = document.getElementById('saveCalcBtn');
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>'; btn.disabled = true;
                const { error } = await supabase.from('calculator_history').insert([{ user_email: currentUser.email, expression: calcExpression, result: calcResult, note }]);
                if (error) { alert('Eroare la salvare: ' + error.message); btn.innerHTML = 'Salvează Calcul'; btn.disabled = false; return; }
                await fetchData({ soft: true });
            }
        };

        checkAuth().catch((error) => {
            console.error('Start app error:', error);
            appContainer.innerHTML = `
                <div class="flex min-h-screen items-center justify-center p-6 bg-slate-50 dark:bg-slate-900">
                    <div class="bg-white dark:bg-slate-800 rounded-3xl p-6 shadow-sm border border-slate-100 dark:border-slate-700 text-center max-w-sm">
                        <div class="w-14 h-14 rounded-full bg-red-50 text-red-500 flex items-center justify-center mx-auto mb-4">!</div>
                        <h2 class="font-bold text-xl text-slate-800 dark:text-white mb-2">Eroare la pornire</h2>
                        <p class="text-sm text-slate-500 dark:text-slate-400 mb-4">${error.message || error}</p>
                        <button onclick="location.reload()" class="bg-indigo-600 text-white font-bold px-5 py-3 rounded-xl">Reîncarcă</button>
                    </div>
                </div>
            `;
        });
    </script>
</body>
</html>
